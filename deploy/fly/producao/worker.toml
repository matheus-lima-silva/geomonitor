app = "geomonitor-worker"
primary_region = "gru"

[deploy]
  strategy = "rolling"

[env]
  PORT = "8080"
  WORKER_ENV = "producao"
  WORKER_NAME = "geomonitor-worker"
  GEOMONITOR_API_URL = "https://geomonitor-api.fly.dev"
  WORKER_AUTO_POLL = "true"
  WORKER_POLL_INTERVAL_SECONDS = "15"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "20s"
  interval = "60s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
