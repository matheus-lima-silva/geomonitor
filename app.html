        function ProjectsView({ projects, inspections, searchTerm, saveToFirestore, deleteFromFirestore, onOpenProjectInspections }) {
            const baseProjectForm = {
                id: '',
                nome: '',
                tipo: 'Linha de Transmissão',
                tensao: '',
                extensao: '',
                torres: '',
                periodicidadeRelatorio: 'Anual',
                mesesEntregaRelatorio: [],
                anoBaseBienal: '',
                torresCoordenadas: [],
                dataCadastro: new Date().toISOString().split('T')[0]
            };
            const baseCreateFromKml = {
                id: '',
                nome: '',
                tipo: 'Linha de Transmissão',
                tensao: '',
                extensao: '',
                torres: '',
                periodicidadeRelatorio: 'Anual',
                mesesEntregaRelatorio: [],
                anoBaseBienal: ''
            };
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState(baseProjectForm);
            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [kmlReviewOpen, setKmlReviewOpen] = useState(false);
            const [kmlReviewMode, setKmlReviewMode] = useState('merge');
            const [kmlRows, setKmlRows] = useState([]);
            const [kmlImportErrors, setKmlImportErrors] = useState([]);
            const [createFromKmlData, setCreateFromKmlData] = useState(baseCreateFromKml);
            const [routeModalProject, setRouteModalProject] = useState(null);
            const [routeSelection, setRouteSelection] = useState([]);
            const mergeInputRef = useRef(null);
            const createInputRef = useRef(null);
            const mergeTargetRef = useRef(null);

            const filtered = projects.filter(p => {
                const t = searchTerm.toLowerCase();
                if (!t) return true;
                return String(p.id || '').toLowerCase().includes(t) ||
                       String(p.nome || '').toLowerCase().includes(t);
            });

            const reviewedKml = useMemo(() => validateTowerCoordinatesAsString(kmlRows), [kmlRows]);
            const routeProjectTowers = useMemo(() => {
                if (!routeModalProject) return [];
                const reviewed = validateTowerCoordinatesAsString(routeModalProject.torresCoordenadas || []);
                return reviewed.rows
                    .filter((r) => !r.error)
                    .sort((a, b) => Number(a.numero) - Number(b.numero));
            }, [routeModalProject]);

            const openNew = () => {
                setFormData({ ...baseProjectForm, dataCadastro: new Date().toISOString().split('T')[0] });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            const openEdit = (p) => {
                const reportConfig = getProjectReportConfig(p);
                setFormData({
                    ...baseProjectForm,
                    ...p,
                    periodicidadeRelatorio: reportConfig.periodicidadeRelatorio,
                    mesesEntregaRelatorio: reportConfig.mesesEntregaRelatorio,
                    anoBaseBienal: reportConfig.anoBaseBienal ?? '',
                    torresCoordenadas: Array.isArray(p.torresCoordenadas) ? p.torresCoordenadas : []
                });
                setIsEditing(true);
                setIsFormOpen(true);
            };

            const toggleMonth = (monthValue) => {
                const month = Number(monthValue);
                if (!Number.isInteger(month)) return;
                setFormData(prev => {
                    const current = normalizeReportMonths(prev.mesesEntregaRelatorio);
                    const exists = current.includes(month);
                    const nextMonths = exists
                        ? current.filter((m) => m !== month)
                        : [...current, month];
                    return {
                        ...prev,
                        mesesEntregaRelatorio: normalizeReportMonths(nextMonths)
                    };
                });
            };

            const toggleCreateFromKmlMonth = (monthValue) => {
                const month = Number(monthValue);
                if (!Number.isInteger(month)) return;
                setCreateFromKmlData(prev => {
                    const current = normalizeReportMonths(prev.mesesEntregaRelatorio);
                    const exists = current.includes(month);
                    const nextMonths = exists
                        ? current.filter((m) => m !== month)
                        : [...current, month];
                    return {
                        ...prev,
                        mesesEntregaRelatorio: normalizeReportMonths(nextMonths)
                    };
                });
            };

            const handleSave = async () => {
                if (!formData.id || !formData.nome) {
                    alert('Preencha ID e Nome');
                    return;
                }
                const periodicidadeRelatorio = normalizeReportPeriodicity(formData.periodicidadeRelatorio);
                const mesesEntregaRelatorio = normalizeReportMonths(formData.mesesEntregaRelatorio);
                const anoBaseBienal = periodicidadeRelatorio === 'Bienal'
                    ? Number(formData.anoBaseBienal)
                    : null;
                const scheduleValidation = validateReportSchedule({
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal
                });
                if (!scheduleValidation.ok) {
                    alert(scheduleValidation.message);
                    return;
                }
                const dataToSave = {
                    ...formData,
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal,
                    torresCoordenadas: Array.isArray(formData.torresCoordenadas) ? formData.torresCoordenadas : [],
                    dataCadastro: formData.dataCadastro || new Date().toISOString().split('T')[0]
                };
                await saveToFirestore('projects', formData.id, dataToSave);
                setIsFormOpen(false);
            };

            const handleDelete = async (id) => {
                await deleteFromFirestore('projects', id);
                setConfirmDelete(null);
            };

            const closeKmlReview = () => {
                setKmlReviewOpen(false);
                setKmlRows([]);
                setKmlImportErrors([]);
            };

            const parseKmlFile = async (file, mode, targetProject = null) => {
                if (!file) return;
                const text = await file.text();
                const parsed = parseKmlTowers(text);
                const baseId = String(file.name || 'PROJ').replace(/\.[^/.]+$/, '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12) || 'PROJ';
                if (mode === 'merge' && targetProject) {
                    openEdit(targetProject);
                }
                if (mode === 'create') {
                    setCreateFromKmlData({
                        ...baseCreateFromKml,
                        id: baseId,
                        nome: String(file.name || 'Empreendimento').replace(/\.[^/.]+$/, ''),
                        torres: String(parsed.rows.length || '')
                    });
                }
                setKmlReviewMode(mode);
                setKmlRows(parsed.rows);
                setKmlImportErrors(parsed.errors || []);
                setKmlReviewOpen(true);
            };

            const handleMergeInputChange = async (e) => {
                const file = e.target.files?.[0];
                await parseKmlFile(file, 'merge', mergeTargetRef.current);
                e.target.value = '';
                mergeTargetRef.current = null;
            };

            const handleCreateInputChange = async (e) => {
                const file = e.target.files?.[0];
                await parseKmlFile(file, 'create', null);
                e.target.value = '';
            };

            const startMergeKml = (targetProject = null) => {
                mergeTargetRef.current = targetProject;
                mergeInputRef.current?.click();
            };

            const startCreateFromKml = () => {
                createInputRef.current?.click();
            };

            const updateKmlRow = (index, patch) => {
                setKmlRows((prev) => {
                    const next = [...prev];
                    next[index] = { ...next[index], ...patch };
                    return next;
                });
            };

            const removeKmlRow = (index) => {
                setKmlRows((prev) => prev.filter((_, idx) => idx !== index));
            };

            const applyKmlImport = async () => {
                if (reviewedKml.hasErrors) {
                    alert('Existem linhas inválidas no KML. Corrija ou remova antes de aplicar.');
                    return;
                }
                if (kmlReviewMode === 'merge') {
                    setFormData((prev) => ({
                        ...prev,
                        torresCoordenadas: mergeTowerCoordinates(prev.torresCoordenadas || [], reviewedKml.rows)
                    }));
                    closeKmlReview();
                    setIsFormOpen(true);
                    return;
                }

                if (!createFromKmlData.id || !createFromKmlData.nome) {
                    alert('Preencha ID e Nome para criar o empreendimento por KML.');
                    return;
                }
                if (projects.some((p) => p.id === createFromKmlData.id)) {
                    alert('Já existe um empreendimento com esse ID.');
                    return;
                }

                const periodicidadeRelatorio = normalizeReportPeriodicity(createFromKmlData.periodicidadeRelatorio);
                const mesesEntregaRelatorio = normalizeReportMonths(createFromKmlData.mesesEntregaRelatorio);
                const anoBaseBienal = periodicidadeRelatorio === 'Bienal'
                    ? Number(createFromKmlData.anoBaseBienal)
                    : null;
                const scheduleValidation = validateReportSchedule({
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal
                });
                if (!scheduleValidation.ok) {
                    alert(scheduleValidation.message);
                    return;
                }

                const payload = {
                    id: createFromKmlData.id,
                    nome: createFromKmlData.nome,
                    tipo: createFromKmlData.tipo,
                    tensao: createFromKmlData.tensao || '',
                    extensao: createFromKmlData.extensao || '',
                    torres: createFromKmlData.torres || String(reviewedKml.rows.length),
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal,
                    torresCoordenadas: mergeTowerCoordinates([], reviewedKml.rows),
                    dataCadastro: new Date().toISOString().split('T')[0]
                };

                await saveToFirestore('projects', payload.id, payload);
                closeKmlReview();
            };

            const openRoutePlanner = (project) => {
                setRouteModalProject(project);
                setRouteSelection([]);
            };

            const toggleRouteTower = (towerNumber) => {
                const id = String(towerNumber);
                setRouteSelection((prev) => prev.includes(id)
                    ? prev.filter((n) => n !== id)
                    : [...prev, id]
                );
            };

            const selectedRoutePoints = routeSelection
                .map((num) => routeProjectTowers.find((t) => String(t.numero) === String(num)))
                .filter(Boolean);

            const handleOpenRoute = () => {
                if (selectedRoutePoints.length < 2) {
                    alert('Selecione pelo menos 2 torres para traçar a rota.');
                    return;
                }
                const chunks = chunkRoutePoints(selectedRoutePoints, 8);
                chunks.forEach((chunk, idx) => {
                    const previousChunk = idx > 0 ? chunks[idx - 1] : null;
                    const previousLast = previousChunk?.[previousChunk.length - 1];
                    const opts = idx > 0 && previousLast
                        ? { origin: `${previousLast.latitude},${previousLast.longitude}` }
                        : {};
                    const url = buildGoogleMapsMultiStopUrl(chunk, opts);
                    if (!url) return;
                    setTimeout(() => window.open(url, '_blank'), idx * 250);
                });
                if (chunks.length > 1) {
                    alert(`A rota foi dividida em ${chunks.length} etapas por limite de waypoints do Google Maps.`);
                }
            };

            return (
                <div className="space-y-6">
                    <input ref={mergeInputRef} type="file" accept=".kml,application/vnd.google-earth.kml+xml" className="hidden" onChange={handleMergeInputChange} />
                    <input ref={createInputRef} type="file" accept=".kml,application/vnd.google-earth.kml+xml" className="hidden" onChange={handleCreateInputChange} />

                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Empreendimentos</h2>
                        <div className="flex gap-2">

                                <Plus /> Novo

                motivo: item.motivo,
                obrigatoria: item.categoria === 'obrigatoria' ? 'S' : 'N',
                comentarios: (item.comentariosAnteriores || []).map((comment) => `${comment.data || '-'} ${comment.inspectionId ? `(${comment.inspectionId})` : ''}: ${comment.obs || ''}`.trim()).join(' | '),
                link_maps: item.mapsLink || ''
            }));

            const exportGuideCsv = () => {
                if (!selectedProject || selectedItems.length === 0) return;
                const headers = ['empreendimento', 'ano', 'torre', 'categoria', 'motivo', 'obrigatoria', 'comentarios', 'link_maps'];
                const rows = buildGuideRows();
                const escapeValue = (value) => {
                    const text = String(value ?? '');
                    if (!/[",\n;]/.test(text)) return text;
                    return `"${text.replace(/"/g, '""')}"`;
                };
                const csv = [headers.join(';')]
                    .concat(rows.map((row) => headers.map((key) => escapeValue(row[key])).join(';')))
                    .join('\n');
                downloadTextFile(`guia-campo-${selectedProject.id}-${year}.csv`, csv, 'text/csv;charset=utf-8');
            };

            const renderTowerItem = (item) => (
                <div key={`${item.categoria}-${item.torre}`}>
                    <label>
                        <input
                            type="checkbox"
                            checked={selectedTowers.includes(item.torre)}
                            onChange={() => toggleTower(item.torre)}
                        />
                        {' '}
                        <strong>Torre {item.torre}:</strong> {item.motivo}
                    </label>
                    {item.mapsLink && (
                        <div>
                            <small><a href={item.mapsLink} target="_blank" rel="noreferrer">Abrir no Maps</a></small>
                        </div>
                    )}
                    {item.comentariosAnteriores?.length > 0 && (
                        <div>
                            {item.comentariosAnteriores.map((comment, idx) => (
                                <div key={`${item.torre}-${idx}`}>
                                    <small>
                                        {comment.data || '-'} {comment.inspectionId ? `(${comment.inspectionId})` : ''}: {comment.obs}
                                    </small>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Planejamento de Visita</h2>
                    </div>
                    <div className="bg-white rounded-xl border shadow-sm p-4">
                        <label className="block text-xs font-medium text-slate-700 mb-1">Empreendimento</label>
                        <select className="w-full border p-2 rounded text-sm" value={projectId} onChange={(e) => setProjectId(e.target.value)}>
                            <option value="">Selecione...</option>
                            {projects.map((p) => (
                                <option key={p.id} value={p.id}>{p.id} - {p.nome}</option>
                            ))}
                        </select>
                    </div>

                    {selectedProject && (
                        <>
                            <div className="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-700">
                                <div><strong>Total torres:</strong> {planning.totalTorres}</div>
                                <div><strong>Meta anual:</strong> {planning.metaAmostragem}</div>
                                <div><strong>Obrigatórias:</strong> {planning.obrigatorias.length}</div>
                                <div><strong>Amostragem selecionada (auto):</strong> {planning.amostragemSelecionada.length}</div>
                                <div><strong>Não priorizar:</strong> {planning.naoPriorizar.length}</div>
                                <div><strong>Seed:</strong> {planning.seed}</div>
                            </div>

                            <div className="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-700">
                                <div><strong>Seleção atual:</strong> {selectedItems.length} torre(s)</div>
                                <div className="mt-2 flex gap-2">
                                    <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setSelectedTowers(allSelectable.map((item) => item.torre))}>Marcar todas</button>
                                    <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setSelectedTowers([...planning.obrigatorias, ...planning.amostragemSelecionada].map((item) => item.torre))}>Reset padrão</button>
                                    <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setSelectedTowers([])}>Limpar seleção</button>
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button
                                    className="bg-blue-600 text-white px-3 py-2 rounded text-sm hover:bg-blue-700 disabled:bg-slate-300"
                                    disabled={!towerInput}
                                    onClick={() => onApplySelection?.({ projectId: selectedProject.id, towerInput, towers: selectedItems })}
                                >
                                    Aplicar seleção na nova vistoria
                                </button>
                                <button className="px-3 py-2 rounded text-sm bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:bg-slate-300" disabled={!towerInput} onClick={() => setShowGuidePreview(true)}>Gerar guia (visual)</button>
                                <button className="px-3 py-2 rounded text-sm bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:bg-slate-300" disabled={!towerInput} onClick={exportGuideCsv}>Exportar guia CSV</button>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                <div className="bg-white rounded-xl border shadow-sm p-4">
                                    <h3 className="font-bold text-slate-800 mb-2">Obrigatórias</h3>
                                    <div className="space-y-1 text-sm">
                                        {planning.obrigatorias.map(renderTowerItem)}
                                        {planning.obrigatorias.length === 0 && <div className="text-slate-400">Nenhuma torre obrigatória.</div>}
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl border shadow-sm p-4">
                                    <h3 className="font-bold text-slate-800 mb-2">Selecionadas por amostragem</h3>
                                    <div className="space-y-1 text-sm">
                                        {planning.amostragemSelecionada.map(renderTowerItem)}
                                        {planning.amostragemSelecionada.length === 0 && <div className="text-slate-400">Nenhuma torre em amostragem automática.</div>}
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl border shadow-sm p-4">
                                    <h3 className="font-bold text-slate-800 mb-2">Não priorizar</h3>
                                    <div className="space-y-1 text-sm">
                                        {planning.naoPriorizar.map(renderTowerItem)}
                                        {planning.naoPriorizar.length === 0 && <div className="text-slate-400">Nenhuma torre nesta categoria.</div>}
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {showGuidePreview && selectedProject && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl w-full max-w-5xl shadow-2xl max-h-[90vh] overflow-y-auto p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold">Guia de Campo - {selectedProject.id}</h3>
                                    <button onClick={() => setShowGuidePreview(false)}><X /></button>
                                </div>
                                <div className="text-sm text-slate-700 mb-3">
                                    <div><strong>Empreendimento:</strong> {selectedProject.id} - {selectedProject.nome || '-'}</div>
                                    <div><strong>Ano:</strong> {year}</div>
                                    <div><strong>Total selecionado:</strong> {selectedItems.length}</div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm border rounded">
                                        <thead className="bg-slate-100">
                                            <tr>
                                                <th className="text-left p-2">Torre</th>
                                                <th className="text-left p-2">Categoria</th>
                                                <th className="text-left p-2">Motivo</th>
                                                <th className="text-left p-2">Maps</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {selectedItems.map((item) => (
                                                <tr key={`guide-${item.torre}`} className="border-t">
                                                    <td className="p-2">{item.torre}</td>
                                                    <td className="p-2">{item.categoria}</td>
                                                    <td className="p-2">{item.motivo}</td>
                                                    <td className="p-2">{item.mapsLink ? <a href={item.mapsLink} target="_blank" rel="noreferrer">Abrir</a> : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="flex gap-2 mt-4">
                                    <button className="px-4 py-2 rounded bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setShowGuidePreview(false)}>Fechar</button>
                                    <button className="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700" onClick={exportGuideCsv}>Exportar CSV</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
                    )}
                </div>
            );
        }

        function InspectionsView({
            inspections,
            projects,
            erosions,
            searchTerm,
            saveToFirestore,
            deleteFromFirestore,
            onOpenErosionDraft,
            forcedProjectFilterId,
            onClearForcedProjectFilter,
            planningDraft,
            onPlanningDraftConsumed
        }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState({ id: '', projetoId: '', dataInicio: '', dataFim: '', responsavel: '', obs: '', detalhesDias: [] });
            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [detailsModal, setDetailsModal] = useState(null);
            const [suggestedTowerInput, setSuggestedTowerInput] = useState('');
            const forcedProject = projects.find(p => p.id === forcedProjectFilterId) || null;

            const filtered = inspections.filter(i => {
                const t = searchTerm.toLowerCase();
                if (forcedProjectFilterId && i.projetoId !== forcedProjectFilterId) return false;
                if (!t) return true;
                return String(i.id || '').toLowerCase().includes(t) ||
                       String(i.projetoId || '').toLowerCase().includes(t) ||
                       String(i.responsavel || '').toLowerCase().includes(t);
            });

            useEffect(() => {
                if (!isFormOpen) return;
                setFormData(prev => {
                    const nextDays = generateDaysList(prev.dataInicio, prev.dataFim, prev.detalhesDias || []);
                    const same = JSON.stringify(nextDays) === JSON.stringify(prev.detalhesDias || []);
                    if (same) return prev;
                    return { ...prev, detalhesDias: nextDays };
                });
            }, [formData.dataInicio, formData.dataFim, isFormOpen]);

            const selectedProject = projects.find(p => p.id === formData.projetoId);

            useEffect(() => {
                if (!planningDraft) return;
                setIsFormOpen(true);
                setIsEditing(false);
                setFormData((prev) => ({
                    ...prev,
                    id: '',
                    projetoId: planningDraft.projectId || prev.projetoId || '',
                    detalhesDias: Array.isArray(prev.detalhesDias) ? prev.detalhesDias : []
                }));
                setSuggestedTowerInput(planningDraft.towerInput || '');
                onPlanningDraftConsumed?.();
            }, [planningDraft, onPlanningDraftConsumed]);

            const openNew = () => {
                setFormData({
                    id: '',
                    projetoId: forcedProjectFilterId || '',
                    dataInicio: '',
                    dataFim: '',
                    responsavel: '',
                    obs: '',
                    detalhesDias: []
                });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            useEffect(() => {
                if (!isFormOpen || isEditing) return;
                const generatedId = buildInspectionId(formData.projetoId, formData.dataInicio, inspections);
                if (!generatedId || generatedId === formData.id) return;
                setFormData(prev => ({ ...prev, id: generatedId }));
            }, [isFormOpen, isEditing, formData.projetoId, formData.dataInicio, inspections]);

            const openEdit = (i) => {
                setFormData({
                    ...i,
                    detalhesDias: Array.isArray(i.detalhesDias) ? i.detalhesDias : []
                });
                setIsEditing(true);
                setIsFormOpen(true);
            };

            const buildInspectionPayload = (baseData) => ({
                ...baseData,
                dataFim: baseData.dataFim || baseData.dataInicio,
                detalhesDias: (baseData.detalhesDias || []).map((d) => ({
                    ...d,
                    torresInput: d.torresInput ?? d.torres ?? '',
                    torres: d.torresInput ?? d.torres ?? '',
                    torresDetalhadas: Array.isArray(d.torresDetalhadas) ? d.torresDetalhadas : []
                }))
            });

            const handleSave = async ({ keepOpen = false } = {}) => {
                if (!formData.id || !formData.projetoId || !formData.dataInicio) {
                    alert('Preencha ID, Empreendimento e Data de Início.');
                    return null;
                }

                if (formData.dataFim && formData.dataFim < formData.dataInicio) {
                    alert('A Data de Fim não pode ser anterior à Data de Início.');
                    return null;
                }

                const payload = buildInspectionPayload(formData);
                await saveToFirestore('inspections', formData.id, payload);
                if (!keepOpen) setIsFormOpen(false);
                return formData.id;
            };

            const saveInspectionState = async () => {
                const id = await handleSave({ keepOpen: true });
                if (!id) throw new Error('Não foi possível salvar a vistoria antes de abrir a erosão.');
                return id;
            };

            const updateDayField = (dayIndex, patch) => {
                setFormData(prev => {
                    const nextDays = [...(prev.detalhesDias || [])];
                    nextDays[dayIndex] = { ...nextDays[dayIndex], ...patch };
                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const handleGenerateChecklist = (dayIndex) => {
                const day = formData.detalhesDias?.[dayIndex];
                if (!day) return;

                const parsed = parseTowerInput(day.torresInput || day.torres || '');
                if (parsed.invalidTokens.length > 0) {
                    alert(`Itens ignorados: ${parsed.invalidTokens.join(', ')}`);
                }
                if (parsed.exceededLimit) {
                    alert('Limite de expansão atingido para proteger o navegador. Refine os intervalos.');
                }

                let towers = parsed.numbers;
                const maxTowers = Number(selectedProject?.torres || 0);
                if (maxTowers > 0) {
                    const valid = towers.filter(n => n >= 0 && n <= maxTowers);
                    if (valid.length !== towers.length) {
                        alert(`Algumas torres foram removidas por exceder o limite do empreendimento (${maxTowers}).`);
                    }
                    towers = valid;
                }

                const existing = new Map(
                    ((day.torresDetalhadas || []).map(td => [String(td.numero), td]))
                );
                const detalhadas = towers.map(n => {
                    const key = String(n);
                    const prev = existing.get(key) || {};
                    return {
                        numero: key,
                        obs: prev.obs || '',
                        temErosao: !!prev.temErosao
                    };
                });

                updateDayField(dayIndex, {
                    torresInput: day.torresInput || day.torres || '',
                    torres: day.torresInput || day.torres || '',
                    torresDetalhadas: detalhadas
                });
            };

            const updateTowerDetail = (dayIndex, towerIndex, patch) => {
                setFormData(prev => {
                    const nextDays = [...(prev.detalhesDias || [])];
                    const day = nextDays[dayIndex];
                    if (!day) return prev;
                    const nextTowers = [...(day.torresDetalhadas || [])];
                    nextTowers[towerIndex] = { ...nextTowers[towerIndex], ...patch };
                    nextDays[dayIndex] = { ...day, torresDetalhadas: nextTowers };
                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const applySuggestedTowersToDay = (dayIndex) => {
                const day = formData.detalhesDias?.[dayIndex];
                if (!day || !suggestedTowerInput) return;
                updateDayField(dayIndex, { torresInput: suggestedTowerInput, torres: suggestedTowerInput });
                setTimeout(() => handleGenerateChecklist(dayIndex), 0);
            };

            const markTowerAsErosion = (dayIndex, towerNumber) => {
                setFormData(prev => {
                    const nextDays = [...(prev.detalhesDias || [])];
                    const day = nextDays[dayIndex];
                    if (!day) return prev;
                    const nextTowers = (day.torresDetalhadas || []).map(td =>
                        String(td.numero) === String(towerNumber) ? { ...td, temErosao: true } : td
                    );
                    nextDays[dayIndex] = { ...day, torresDetalhadas: nextTowers };
                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const openErosionFromTower = async (dayIndex, towerNumber) => {
                try {
                    if (!formData.projetoId || !formData.dataInicio) {
                        alert('Selecione o empreendimento e a data de início antes de abrir erosão.');
                        return;
                    }

                    const inspectionId = await saveInspectionState();
                    const towerCoords = getTowerCoords(selectedProject, towerNumber);
                    markTowerAsErosion(dayIndex, towerNumber);

                    onOpenErosionDraft?.({
                        projetoId: formData.projetoId,
                        vistoriaId: inspectionId,
                        torreRef: String(towerNumber),
                        latitude: towerCoords?.latitude || '',
                        longitude: towerCoords?.longitude || '',
                        origemDia: formData.detalhesDias?.[dayIndex]?.data || ''
                    });
                } catch (err) {
                    alert(err.message || 'Erro ao preparar erosão.');
                }
            };

            const handleDelete = async (id) => {
                await deleteFromFirestore('inspections', id);
                setConfirmDelete(null);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Vistorias</h2>
                        <button onClick={openNew} className="bg-blue-600 text-white px-4 py-2 rounded-md flex items-center gap-2 hover:bg-blue-700">
                            <Plus /> Nova Vistoria
                        </button>
                    </div>

                    {forcedProject && (
                        <div className="rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 flex items-center justify-between gap-3">
                            <div className="text-sm text-blue-900">
                                Filtrado por empreendimento: <strong>{forcedProject.nome || forcedProject.id}</strong> ({forcedProject.id})
                            </div>
                            <button
                                className="px-3 py-1.5 rounded-lg bg-white border border-blue-200 text-blue-700 text-xs hover:bg-blue-100"
                                onClick={() => onClearForcedProjectFilter?.()}
                            >
                                Limpar filtro
                            </button>
                        </div>
                    )}

                    <div className="space-y-4">
                        {filtered.map(i => {
                            const projeto = projects.find(p => p.id === i.projetoId);
                            return (
                                <div key={i.id} className="bg-white rounded-xl border shadow-sm p-5 hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <h3 className="font-bold text-slate-800">{i.id}</h3>
                                                <span className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">{i.projetoId}</span>
                                                {i.dataInicio && <span className="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded">{i.dataInicio}</span>}
                                                {Array.isArray(i.detalhesDias) && i.detalhesDias.length > 0 && (
                                                    <span className="px-2 py-1 bg-indigo-50 text-indigo-700 text-xs rounded">
                                                        {i.detalhesDias.length} dia(s)
                                                    </span>
                                                )}
                                            </div>
                                            <div className="text-sm text-slate-600 space-y-1">
                                                {i.responsavel && <p><strong>Responsável:</strong> {i.responsavel}</p>}
                                                {i.dataFim && <p><strong>Data Fim:</strong> {i.dataFim}</p>}
                                                {projeto && (
                                                    <p className="text-slate-500 text-xs mt-2">
                                                        <MapIcon className="w-3 h-3 inline mr-1" />
                                                        {projeto.nome}
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => setDetailsModal(i)} className="p-2 rounded-lg bg-slate-100 hover:bg-green-50 text-green-600" title="Ver detalhes">
                                                <Eye />
                                            </button>
                                            <button onClick={() => openEdit(i)} className="p-2 rounded-lg bg-slate-100 hover:bg-blue-50 text-blue-600">
                                                <Edit />
                                            </button>
                                            <button onClick={() => setConfirmDelete(i.id)} className="p-2 rounded-lg bg-slate-100 hover:bg-red-50 text-red-600">
                                                <Trash2 />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        {filtered.length === 0 && (
                            <p className="text-slate-400 text-center py-10">
                                Nenhuma vistoria encontrada.
                            </p>
                        )}
                    </div>

                    {detailsModal && (
                        <InspectionDetailsModal
                            inspection={detailsModal}
                            project={projects.find(p => p.id === detailsModal.projetoId)}
                            erosions={erosions}
                            inspections={filtered}
                            onClose={() => setDetailsModal(null)}
                            onNavigate={(newInspection) => setDetailsModal(newInspection)}
                        />
                    )}

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 overflow-y-auto p-4">
                            <div className="bg-white p-6 rounded-xl w-full max-w-6xl shadow-2xl my-8">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-lg font-bold">{isEditing ? 'Editar' : 'Nova'} Vistoria</h3>
                                    <button onClick={() => setIsFormOpen(false)}><X /></button>
                                </div>

                                <div className="space-y-4 max-h-[78vh] overflow-y-auto pr-2">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">ID</label>
                                            <input className="w-full border p-2 rounded text-sm bg-slate-50" value={formData.id} disabled />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Empreendimento *</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.projetoId} onChange={(e) => setFormData({...formData, projetoId: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                {projects.map(p => (
                                                    <option key={p.id} value={p.id}>{p.id} - {p.nome}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Responsável</label>
                                            <input className="w-full border p-2 rounded text-sm" value={formData.responsavel || ''} onChange={(e) => setFormData({...formData, responsavel: e.target.value})} placeholder="Nome do responsável" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Data Início *</label>
                                            <input type="date" className="w-full border p-2 rounded text-sm" value={formData.dataInicio || ''} onChange={(e) => setFormData({...formData, dataInicio: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Data Fim</label>
                                            <input type="date" className="w-full border p-2 rounded text-sm" value={formData.dataFim || ''} onChange={(e) => setFormData({...formData, dataFim: e.target.value})} />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-medium text-slate-700 mb-1">Observações</label>
                                        <textarea className="w-full border p-2 rounded text-sm" rows="3" value={formData.obs || ''} onChange={(e) => setFormData({...formData, obs: e.target.value})} placeholder="Observações gerais da vistoria..." />
                                    </div>

                                    {suggestedTowerInput && (
                                        <div className="rounded-lg border border-blue-200 bg-blue-50 p-3 text-sm">

        function ErosionsView({ erosions, projects, inspections, searchTerm, saveToFirestore, deleteFromFirestore, pendingDraft, onDraftConsumed, rulesConfig }) {

                if (!t) return true;
                return String(e.id || '').toLowerCase().includes(t) ||
                       String(e.projetoId || '').toLowerCase().includes(t) ||
                       String(e.torreRef ?? '').toLowerCase().includes(t);

                const origem = !previous && String(formData.obs || '').includes('Origem da vistoria') ? 'vistoria' : undefined;
                const followupEvent = buildFollowupEvent(previous, formData, {
                    updatedBy: '',
                    isCreate: !previous,
                    origem
                });
                const dataToSave = {
                    ...formData,
                    impacto: criticality.impacto,
                    score: criticality.score,
                    frequencia: criticality.frequencia,
                    intervencao: criticality.intervencao,
                    acompanhamentosResumo: appendFollowupEvent(previous?.acompanhamentosResumo, followupEvent)

                await saveToFirestore('erosions', formData.id, dataToSave);

                    alert('Coordenadas não informadas');

                    </body></html>
