                const collectDayTowers = (day) => {
                    const set = new Set();
                    (Array.isArray(day?.torresDetalhadas) ? day.torresDetalhadas : []).forEach((item) => {
                        const tower = normalizeTower(item?.numero);
                        if (tower) set.add(tower);
                    });
                    if (Array.isArray(day?.torres)) {
                        day.torres.forEach((item) => {
                            const tower = normalizeTower(item);
                            if (tower) set.add(tower);
                        });
                    } else {
                        const parsed = parseTowerInput(String(day?.torres || '')).numbers;
                        parsed.forEach((item) => set.add(String(item)));
                    }
                    const parsedInput = parseTowerInput(String(day?.torresInput || '')).numbers;
                    parsedInput.forEach((item) => set.add(String(item)));
                    return set;
                };
                const compareCandidates = (a, b) => {
                    if (!!a.hasBase !== !!b.hasBase) return a.hasBase ? -1 : 1;
                    if (Number.isFinite(a.distance) && Number.isFinite(b.distance) && a.distance !== b.distance) return a.distance - b.distance;
                    if (Number.isFinite(a.distance) && !Number.isFinite(b.distance)) return -1;
                    if (!Number.isFinite(a.distance) && Number.isFinite(b.distance)) return 1;
                    if ((a.avgScore ?? -1) !== (b.avgScore ?? -1)) return (b.avgScore ?? -1) - (a.avgScore ?? -1);
                    const byDate = String(b.lastDate || '').localeCompare(String(a.lastDate || ''));
                    if (byDate !== 0) return byDate;
                    return `${a.hotelNome || ''}|${a.hotelMunicipio || ''}`.localeCompare(`${b.hotelNome || ''}|${b.hotelMunicipio || ''}`);
                };

                const recommendHotelForTower = (tower) => {
                    if (!projectKey || !tower) {
                        return {
                            hotelSugeridoNome: '',
                            hotelSugeridoMunicipio: '',
                            hotelSugeridoLogisticaNota: '',
                            hotelSugeridoReservaNota: '',
                            hotelSugeridoEstadiaNota: '',
                            hotelSugeridoTorreBase: '',
                            hotelSugeridoDistanciaTorreAlvo: '',
                            hotelSugeridoNotaMedia: '',
                            hotelSugeridoUltimaData: ''
                        };
                    }

                    const targetNum = parseTowerNumber(targetTower);
                    const grouped = new Map();
                    (inspections || [])
                        .filter((inspection) => String(inspection?.projetoId || '').trim() === projectKey)
                        .forEach((inspection) => {
                            (inspection?.detalhesDias || []).forEach((day) => {
                                if (!collectDayTowers(day).has(String(tower))) return;
                                const hotelNome = String(day?.hotelNome || '').trim();
                                if (!hotelNome) return;

                                const hotelMunicipio = String(day?.hotelMunicipio || '').trim();
                                const hotelTorreBase = String(day?.hotelTorreBase || '').trim();
                                const key = `${hotelNome.toLowerCase()}|${hotelMunicipio.toLowerCase()}|${hotelTorreBase.toLowerCase()}`;

                                const logistica = parseHotelRating(day?.hotelLogisticaNota);
                                const reserva = parseHotelRating(day?.hotelReservaNota);
                                const estadia = parseHotelRating(day?.hotelEstadiaNota);
                                const entry = grouped.get(key) || {
                                    hotelNome,
                                    hotelMunicipio,
                                    hotelTorreBase,
                                    logisticaNotas: [],
                                    reservaNotas: [],
                                    estadiaNotas: [],
                                    lastDate: ''
                                };

                                if (Number.isFinite(logistica)) entry.logisticaNotas.push(logistica);
                                if (Number.isFinite(reserva)) entry.reservaNotas.push(reserva);
                                if (Number.isFinite(estadia)) entry.estadiaNotas.push(estadia);

                                const date = formatDate(inspection, day);
                                if (date && String(date).localeCompare(String(entry.lastDate || '')) > 0) entry.lastDate = date;
                                grouped.set(key, entry);
                            });
                        });

                    const candidates = [...grouped.values()].map((entry) => {
                        const avgLogistica = avg(entry.logisticaNotas);
                        const avgReserva = avg(entry.reservaNotas);
                        const avgEstadia = avg(entry.estadiaNotas);
                        const avgScore = avg([avgLogistica, avgReserva, avgEstadia]);
                        const baseNum = parseTowerNumber(entry.hotelTorreBase);
                        const distance = Number.isFinite(baseNum) && Number.isFinite(targetNum) ? Math.abs(baseNum - targetNum) : null;
                        return {
                            hotelNome: entry.hotelNome,
                            hotelMunicipio: entry.hotelMunicipio,
                            hotelTorreBase: entry.hotelTorreBase,
                            hasBase: !!entry.hotelTorreBase,
                            hotelLogisticaNota: Number.isFinite(avgLogistica) ? Math.round(avgLogistica * 10) / 10 : '',
                            hotelReservaNota: Number.isFinite(avgReserva) ? Math.round(avgReserva * 10) / 10 : '',
                            hotelEstadiaNota: Number.isFinite(avgEstadia) ? Math.round(avgEstadia * 10) / 10 : '',
                            avgScore: Number.isFinite(avgScore) ? Math.round(avgScore * 10) / 10 : null,
                            distance,
                            lastDate: entry.lastDate
                        };
                    }).sort(compareCandidates);

                    const selected = candidates[0];
                    if (!selected) {
                        return {
                            hotelSugeridoNome: '',
                            hotelSugeridoMunicipio: '',
                            hotelSugeridoLogisticaNota: '',
                            hotelSugeridoReservaNota: '',
                            hotelSugeridoEstadiaNota: '',
                            hotelSugeridoTorreBase: '',
                            hotelSugeridoDistanciaTorreAlvo: '',
                            hotelSugeridoNotaMedia: '',
                            hotelSugeridoUltimaData: ''
                        };
                    }

                    return {
                        hotelSugeridoNome: selected.hotelNome,
                        hotelSugeridoMunicipio: selected.hotelMunicipio,
                        hotelSugeridoLogisticaNota: selected.hotelLogisticaNota,
                        hotelSugeridoReservaNota: selected.hotelReservaNota,
                        hotelSugeridoEstadiaNota: selected.hotelEstadiaNota,
                        hotelSugeridoTorreBase: selected.hotelTorreBase,
                        hotelSugeridoDistanciaTorreAlvo: Number.isFinite(selected.distance) ? selected.distance : '',
                        hotelSugeridoNotaMedia: Number.isFinite(selected.avgScore) ? selected.avgScore : '',
                        hotelSugeridoUltimaData: selected.lastDate || ''
                    };
                };

                return allSelectableBase.map((item) => ({
                    ...item,
                    ...recommendHotelForTower(String(item?.torre || '').trim())
                }));
            }, [allSelectableBase, inspections, selectedProject?.id, targetTower]);

            const obrigatoriasItems = useMemo(
                () => allSelectable.filter((item) => item.categoria === 'obrigatoria'),
                [allSelectable]
            );
            const amostragemItems = useMemo(
                () => allSelectable.filter((item) => item.categoria === 'amostragem'),
                [allSelectable]
            );
            const naoPriorizarItems = useMemo(
                () => allSelectable.filter((item) => item.categoria === 'nao_priorizar'),
                [allSelectable]
            );

            const selectedItems = useMemo(
                () => allSelectable.filter((item) => selectedTowers.includes(item.torre)),
                [allSelectable, selectedTowers]
            );
            const towerInput = selectedItems.map((item) => item.torre).join(', ');

            const priorityHotel = useMemo(() => {
                if (!Array.isArray(selectedItems) || selectedItems.length === 0) return null;
                const compareItems = (a, b) => {
                    const hasNameA = !!String(a?.hotelSugeridoNome || '').trim();
                    const hasNameB = !!String(b?.hotelSugeridoNome || '').trim();
                    if (hasNameA !== hasNameB) return hasNameA ? -1 : 1;

                    const hasBaseA = !!String(a?.hotelSugeridoTorreBase || '').trim();
                    const hasBaseB = !!String(b?.hotelSugeridoTorreBase || '').trim();
                    if (hasBaseA !== hasBaseB) return hasBaseA ? -1 : 1;

                    const distA = Number(a?.hotelSugeridoDistanciaTorreAlvo);
                    const distB = Number(b?.hotelSugeridoDistanciaTorreAlvo);
                    const distAFinite = Number.isFinite(distA);
                    const distBFinite = Number.isFinite(distB);
                    if (distAFinite && distBFinite && distA !== distB) return distA - distB;
                    if (distAFinite && !distBFinite) return -1;
                    if (!distAFinite && distBFinite) return 1;

                    const scoreA = Number.isFinite(Number(a?.hotelSugeridoNotaMedia)) ? Number(a.hotelSugeridoNotaMedia) : -1;
                    const scoreB = Number.isFinite(Number(b?.hotelSugeridoNotaMedia)) ? Number(b.hotelSugeridoNotaMedia) : -1;
                    if (scoreA !== scoreB) return scoreB - scoreA;

                    return String(b?.hotelSugeridoUltimaData || '').localeCompare(String(a?.hotelSugeridoUltimaData || ''));
                };

                const byTarget = selectedItems.find((item) => String(item?.torre || '') === String(targetTower || '') && String(item?.hotelSugeridoNome || '').trim());
                if (byTarget) return byTarget;

                const withHotel = selectedItems.filter((item) => String(item?.hotelSugeridoNome || '').trim());
                if (withHotel.length === 0) return null;
                return [...withHotel].sort(compareItems)[0] || null;
            }, [selectedItems, targetTower]);

            const toggleTower = (tower) => {
                setSelectedTowers((prev) => prev.includes(tower)
                    ? prev.filter((item) => item !== tower)
                    : [...prev, tower]);
            };

            const buildGuideRows = () => selectedItems.map((item) => ({
                empreendimento: `${selectedProject?.id || ''}${selectedProject?.nome ? ` - ${selectedProject.nome}` : ''}`.trim(),
                ano: year,
                torre: item.torre,
                categoria: item.categoria,
                motivo: item.motivo,
                obrigatoria: item.categoria === 'obrigatoria' ? 'S' : 'N',
                comentarios: (item.comentariosAnteriores || []).map((comment) => `${comment.data || '-'} ${comment.inspectionId ? `(${comment.inspectionId})` : ''}: ${comment.obs || ''}`.trim()).join(' | '),
                link_maps: item.mapsLink || '',
                hotel_sugerido: item.hotelSugeridoNome || '',
                hotel_municipio: item.hotelSugeridoMunicipio || '',
                hotel_logistica: item.hotelSugeridoLogisticaNota ?? '',
                hotel_reserva: item.hotelSugeridoReservaNota ?? '',
                hotel_estadia: item.hotelSugeridoEstadiaNota ?? '',
                hotel_torre_base: item.hotelSugeridoTorreBase || '',
                distancia_torre_alvo: item.hotelSugeridoDistanciaTorreAlvo ?? ''
            }));

            const exportGuideCsv = () => {
                if (!selectedProject || selectedItems.length === 0) return;
                const headers = ['empreendimento', 'ano', 'torre', 'categoria', 'motivo', 'obrigatoria', 'comentarios', 'link_maps', 'hotel_sugerido', 'hotel_municipio', 'hotel_logistica', 'hotel_reserva', 'hotel_estadia', 'hotel_torre_base', 'distancia_torre_alvo'];
                const rows = buildGuideRows();
                const escapeValue = (value) => {
                    const text = String(value ?? '');
                    if (!/[",\n;]/.test(text)) return text;
                    return `"${text.replace(/"/g, '""')}"`;
                };
                const csv = [headers.join(';')]
                    .concat(rows.map((row) => headers.map((key) => escapeValue(row[key])).join(';')))
                    .join('\n');
                downloadTextFile(`guia-campo-${selectedProject.id}-${year}.csv`, csv, 'text/csv;charset=utf-8');
            };

            const renderTowerItem = (item) => (
                <div key={`${item.categoria}-${item.torre}`}>
                    <label>
                        <input
                            type="checkbox"
                            checked={selectedTowers.includes(item.torre)}
                            onChange={() => toggleTower(item.torre)}
                        />
                        {' '}
                        <strong>Torre {item.torre}:</strong> {item.motivo}
                    </label>
                    {item.mapsLink && (
                        <div>
                            <small><a href={item.mapsLink} target="_blank" rel="noreferrer">Abrir no Maps</a></small>
                        </div>
                    )}
                    {item.comentariosAnteriores?.length > 0 && (
                        <div>
                            {item.comentariosAnteriores.map((comment, idx) => (
                                <div key={`${item.torre}-${idx}`}>
                                    <small>
                                        {comment.data || '-'} {comment.inspectionId ? `(${comment.inspectionId})` : ''}: {comment.obs}
                                    </small>
                                </div>
                            ))}
                        </div>
                    )}
                    {item.hotelSugeridoNome ? (
                        <div>
                            <small>
                                Hotel sugerido: <strong>{item.hotelSugeridoNome}</strong>
                                {item.hotelSugeridoMunicipio ? ` (${item.hotelSugeridoMunicipio})` : ''}
                                {item.hotelSugeridoTorreBase ? ` | Torre base: ${item.hotelSugeridoTorreBase}` : ''}
                                {item.hotelSugeridoDistanciaTorreAlvo !== '' ? ` | Distância da torre-alvo: ${item.hotelSugeridoDistanciaTorreAlvo}` : ''}
                            </small>
                            <div>
                                <small>
                                    Notas - Logística: {Number.isFinite(Number(item.hotelSugeridoLogisticaNota)) ? Number(item.hotelSugeridoLogisticaNota) : '-'}
                                    {' | '}Reserva: {Number.isFinite(Number(item.hotelSugeridoReservaNota)) ? Number(item.hotelSugeridoReservaNota) : '-'}
                                    {' | '}Estadia: {Number.isFinite(Number(item.hotelSugeridoEstadiaNota)) ? Number(item.hotelSugeridoEstadiaNota) : '-'}
                                </small>
                            </div>
                        </div>
                    ) : (
                        <div><small>Sem histórico de hospedagem para esta torre.</small></div>
                    )}
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Planejamento de Visita</h2>
                    </div>
                    <div className="bg-white rounded-xl border shadow-sm p-4">
                        <label className="block text-xs font-medium text-slate-700 mb-1">Empreendimento</label>
                        <select className="w-full border p-2 rounded text-sm" value={projectId} onChange={(e) => setProjectId(e.target.value)}>
                            <option value="">Selecione...</option>
                            {projects.map((p) => (
                                <option key={p.id} value={p.id}>{p.id} - {p.nome}</option>
                            ))}
                        </select>
                    </div>

                    {selectedProject && (
                        <>
                            <div className="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-700">
                                <div><strong>Total torres:</strong> {planning.totalTorres}</div>
                                <div><strong>Meta anual:</strong> {planning.metaAmostragem}</div>
                                <div><strong>Obrigatórias:</strong> {planning.obrigatorias.length}</div>
                                <div><strong>Amostragem selecionada (auto):</strong> {planning.amostragemSelecionada.length}</div>
                                <div><strong>Não priorizar:</strong> {planning.naoPriorizar.length}</div>
                                <div><strong>Seed:</strong> {planning.seed}</div>
                            </div>

                            <div className="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-700">
                                <div><strong>Seleção atual:</strong> {selectedItems.length} torre(s)</div>
                                <div><strong>Torre-alvo (última da sequência):</strong> {targetTower || 'N/D'}</div>
                                {priorityHotel ? (
                                    <div>
                                        <strong>Hotel prioritário da última torre{targetTower ? ` (T${targetTower})` : ''}:</strong> {priorityHotel.hotelSugeridoNome}
                                        {priorityHotel.hotelSugeridoMunicipio ? ` (${priorityHotel.hotelSugeridoMunicipio})` : ''}
                                        {priorityHotel.hotelSugeridoTorreBase ? ` | Torre base ${priorityHotel.hotelSugeridoTorreBase}` : ''}
                                        {priorityHotel.hotelSugeridoDistanciaTorreAlvo !== '' ? ` | Distância ${priorityHotel.hotelSugeridoDistanciaTorreAlvo}` : ''}
                                    </div>
                                ) : (
                                    <div>Sem histórico de hotel para priorização da torre-alvo.</div>
                                )}
                                <div className="mt-2 flex gap-2">
                                    <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setSelectedTowers(allSelectable.map((item) => item.torre))}>Marcar todas</button>
                                    <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setSelectedTowers([...planning.obrigatorias, ...planning.amostragemSelecionada].map((item) => item.torre))}>Reset padrão</button>
                                    <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setSelectedTowers([])}>Limpar seleção</button>
                                </div>
                            </div>

                            <div className="flex gap-2">
                                <button
                                    className="bg-blue-600 text-white px-3 py-2 rounded text-sm hover:bg-blue-700 disabled:bg-slate-300"
                                    disabled={!towerInput}
                                    onClick={() => onApplySelection?.({ projectId: selectedProject.id, towerInput, towers: selectedItems })}
                                >
                                    Aplicar seleção na nova vistoria
                                </button>
                                <button className="px-3 py-2 rounded text-sm bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:bg-slate-300" disabled={!towerInput} onClick={() => setShowGuidePreview(true)}>Gerar guia (visual)</button>
                                <button className="px-3 py-2 rounded text-sm bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:bg-slate-300" disabled={!towerInput} onClick={exportGuideCsv}>Exportar guia CSV</button>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                <div className="bg-white rounded-xl border shadow-sm p-4">
                                    <h3 className="font-bold text-slate-800 mb-2">Obrigatórias</h3>
                                    <div className="space-y-1 text-sm">
                                        {obrigatoriasItems.map(renderTowerItem)}
                                        {obrigatoriasItems.length === 0 && <div className="text-slate-400">Nenhuma torre obrigatória.</div>}
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl border shadow-sm p-4">
                                    <h3 className="font-bold text-slate-800 mb-2">Selecionadas por amostragem</h3>
                                    <div className="space-y-1 text-sm">
                                        {amostragemItems.map(renderTowerItem)}
                                        {amostragemItems.length === 0 && <div className="text-slate-400">Nenhuma torre em amostragem automática.</div>}
                                    </div>
                                </div>
                                <div className="bg-white rounded-xl border shadow-sm p-4">
                                    <h3 className="font-bold text-slate-800 mb-2">Não priorizar</h3>
                                    <div className="space-y-1 text-sm">
                                        {naoPriorizarItems.map(renderTowerItem)}
                                        {naoPriorizarItems.length === 0 && <div className="text-slate-400">Nenhuma torre nesta categoria.</div>}
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {showGuidePreview && selectedProject && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl w-full max-w-6xl shadow-2xl max-h-[90vh] overflow-y-auto p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold">Guia de Campo - {selectedProject.id}</h3>
                                    <button onClick={() => setShowGuidePreview(false)}><X /></button>
                                </div>
                                <div className="text-sm text-slate-700 mb-3">
                                    <div><strong>Empreendimento:</strong> {selectedProject.id} - {selectedProject.nome || '-'}</div>
                                    <div><strong>Ano:</strong> {year}</div>
                                    <div><strong>Total selecionado:</strong> {selectedItems.length}</div>
                                    <div><strong>Torre-alvo:</strong> {targetTower || 'N/D'}</div>
                                    {priorityHotel && (
                                        <div><strong>Hotel prioritário da última torre{targetTower ? ` (T${targetTower})` : ''}:</strong> {priorityHotel.hotelSugeridoNome}{priorityHotel.hotelSugeridoMunicipio ? ` (${priorityHotel.hotelSugeridoMunicipio})` : ''}</div>
                                    )}
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm border rounded">
                                        <thead className="bg-slate-100">
                                            <tr>
                                                <th className="text-left p-2">Torre</th>
                                                <th className="text-left p-2">Categoria</th>
                                                <th className="text-left p-2">Motivo</th>
                                                <th className="text-left p-2">Hotel sugerido</th>
                                                <th className="text-left p-2">Município</th>
                                                <th className="text-left p-2">Logística</th>
                                                <th className="text-left p-2">Reserva</th>
                                                <th className="text-left p-2">Estadia</th>
                                                <th className="text-left p-2">Torre base</th>
                                                <th className="text-left p-2">Distância alvo</th>
                                                <th className="text-left p-2">Maps</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {selectedItems.map((item) => (
                                                <tr key={`guide-${item.torre}`} className="border-t">
                                                    <td className="p-2">{item.torre}</td>
                                                    <td className="p-2">{item.categoria}</td>
                                                    <td className="p-2">{item.motivo}</td>
                                                    <td className="p-2">{item.hotelSugeridoNome || '-'}</td>
                                                    <td className="p-2">{item.hotelSugeridoMunicipio || '-'}</td>
                                                    <td className="p-2">{Number.isFinite(Number(item.hotelSugeridoLogisticaNota)) ? Number(item.hotelSugeridoLogisticaNota) : '-'}</td>
                                                    <td className="p-2">{Number.isFinite(Number(item.hotelSugeridoReservaNota)) ? Number(item.hotelSugeridoReservaNota) : '-'}</td>
                                                    <td className="p-2">{Number.isFinite(Number(item.hotelSugeridoEstadiaNota)) ? Number(item.hotelSugeridoEstadiaNota) : '-'}</td>
                                                    <td className="p-2">{item.hotelSugeridoTorreBase || '-'}</td>
                                                    <td className="p-2">{item.hotelSugeridoDistanciaTorreAlvo !== '' ? item.hotelSugeridoDistanciaTorreAlvo : '-'}</td>
                                                    <td className="p-2">{item.mapsLink ? <a href={item.mapsLink} target="_blank" rel="noreferrer">Abrir</a> : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="flex gap-2 mt-4">
                                    <button className="px-4 py-2 rounded bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setShowGuidePreview(false)}>Fechar</button>
                                    <button className="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700" onClick={exportGuideCsv}>Exportar CSV</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        function InspectionsView({
            inspections,
            projects,
            erosions,
            searchTerm,
            saveToFirestore,
            deleteFromFirestore,
            onOpenErosionDraft,
            forcedProjectFilterId,
            onClearForcedProjectFilter,
            planningDraft,
            onPlanningDraftConsumed
        }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState({ id: '', projetoId: '', dataInicio: '', dataFim: '', responsavel: '', obs: '', detalhesDias: [] });
            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [detailsModal, setDetailsModal] = useState(null);
            const [suggestedTowerInput, setSuggestedTowerInput] = useState('');
            const autoPendingCheckRef = useRef('');
            const forcedProject = projects.find(p => p.id === forcedProjectFilterId) || null;

            const filtered = inspections.filter(i => {
                const t = searchTerm.toLowerCase();
                if (forcedProjectFilterId && i.projetoId !== forcedProjectFilterId) return false;
                if (!t) return true;
                return String(i.id || '').toLowerCase().includes(t) ||
                       String(i.projetoId || '').toLowerCase().includes(t) ||
                       String(i.responsavel || '').toLowerCase().includes(t);
            });

            const pendingSummaryByInspection = useMemo(() => {
                const summary = new Map();
                (inspections || []).forEach((inspection) => {
                    const inspectionId = String(inspection?.id || '').trim();
                    const projectId = String(inspection?.projetoId || '').trim();
                    if (!inspectionId || !projectId) {
                        if (inspectionId) summary.set(inspectionId, { count: 0, towers: [] });
                        return;
                    }
                    const pending = (erosions || []).filter((erosion) => {
                        if (String(erosion?.projetoId || '').trim() !== projectId) return false;
                        const pendency = getInspectionPendency(erosion, inspectionId);
                        const hasVisitDate = pendency?.status === 'visitada' && String(pendency?.dia || '').trim();
                        return !hasVisitDate;
                    });
                    const towers = [...new Set(pending.map((item) => String(item?.torreRef || '').trim()).filter(Boolean))]
                        .sort((a, b) => compareTowerNumbers(a, b));
                    summary.set(inspectionId, { count: pending.length, towers });
                });
                return summary;
            }, [inspections, erosions]);

            const normalizeTowerKey = (value) => {
                const text = String(value ?? '').trim();
                if (!text) return '';
                const numeric = Number(text);
                if (Number.isFinite(numeric)) return String(numeric);
                return text.toUpperCase();
            };

            const collectDayTowerKeys = (day) => {
                const detailed = Array.isArray(day?.torresDetalhadas) ? day.torresDetalhadas.map((item) => item?.numero) : [];
                let source = detailed;
                if (source.length === 0 && Array.isArray(day?.torres)) source = day.torres;
                if (source.length === 0) {
                    const typed = String(day?.torresInput ?? day?.torres ?? '').trim();
                    if (typed) source = parseTowerInput(typed).numbers;
                }
                return [...new Set(source.map((item) => normalizeTowerKey(item)).filter(Boolean))];
            };

            const findDuplicateTowersAcrossDays = (details) => {
                const days = Array.isArray(details) ? details : [];
                const map = new Map();
                days.forEach((day) => {
                    const dayLabel = toBrDate(day?.data) || String(day?.data || '').trim() || 'Dia sem data';
                    collectDayTowerKeys(day).forEach((tower) => {
                        if (!map.has(tower)) map.set(tower, new Set());
                        map.get(tower).add(dayLabel);
                    });
                });
                return [...map.entries()]
                    .map(([tower, daySet]) => ({ tower, days: [...daySet] }))
                    .filter((item) => item.days.length > 1)
                    .sort((a, b) => {
                        const aNum = Number(a.tower);
                        const bNum = Number(b.tower);
                        if (Number.isFinite(aNum) && Number.isFinite(bNum)) return aNum - bNum;
                        return String(a.tower).localeCompare(String(b.tower));
                    });
            };

            const confirmDuplicateTowersAcrossDays = (details) => {
                const duplicateTowers = findDuplicateTowersAcrossDays(details);
                if (duplicateTowers.length === 0) return true;
                const sample = duplicateTowers
                    .slice(0, 8)
                    .map((item) => `- Torre ${item.tower}: ${item.days.join(', ')}`)
                    .join('\n');
                const overflow = duplicateTowers.length > 8 ? `\n... e mais ${duplicateTowers.length - 8} torre(s).` : '';
                return window.confirm(
                    `Há torres registradas em mais de um dia nesta vistoria:\n${sample}${overflow}\n\nIsso pode estar correto em caso de revisita.\nClique em OK para continuar ou Cancelar para revisar.`
                );
            };

            useEffect(() => {
                if (!isFormOpen) return;
                setFormData(prev => {
                    const nextDays = generateDaysList(prev.dataInicio, prev.dataFim, prev.detalhesDias || []);
                    const same = JSON.stringify(nextDays) === JSON.stringify(prev.detalhesDias || []);
                    if (same) return prev;
                    return { ...prev, detalhesDias: nextDays };
                });
            }, [formData.dataInicio, formData.dataFim, isFormOpen]);

            const selectedProject = projects.find(p => p.id === formData.projetoId);

            const resolveInspectionProjectId = (explicitProjectId = '') =>
                String(explicitProjectId || formData.projetoId || '').trim();

            const syncInspectionPendencies = async (inspectionId, explicitProjectId = '') => {
                const projectId = resolveInspectionProjectId(explicitProjectId);
                if (!projectId || !inspectionId) return;
                const projectErosions = (erosions || []).filter((item) => String(item?.projetoId || '').trim() === projectId);
                await Promise.all(projectErosions.map((erosion) => saveToFirestore('erosions', erosion.id, {
                    ...erosion,
                    vistoriaId: inspectionId,
                    vistoriaIds: [...new Set([inspectionId, ...normalizeErosionInspectionIds(erosion)])],
                    pendenciasVistoria: upsertInspectionPendency(erosion, inspectionId)
                })));
            };

            const getPendingErosionsForInspection = (inspectionId, explicitProjectId = '') => {
                const projectId = resolveInspectionProjectId(explicitProjectId);
                if (!projectId || !inspectionId) return [];
                const projectErosions = (erosions || []).filter((item) => String(item?.projetoId || '').trim() === projectId);
                return projectErosions.filter((erosion) => {
                    const pendency = getInspectionPendency(erosion, inspectionId);
                    const hasVisitDate = pendency?.status === 'visitada' && String(pendency?.dia || '').trim();
                    return !hasVisitDate;
                });
            };

            const ensurePendingTowersVisible = (pendingErosions) => {
                setFormData((prev) => {
                    const targetDay = prev.detalhesDias?.[0]?.data || '';
                    if (!targetDay) return prev;

                    const pendingTowers = [...new Set(
                        (pendingErosions || [])
                            .map((item) => String(item?.torreRef || '').trim())
                            .filter(Boolean)
                    )];

                    const nextDays = (prev.detalhesDias || []).map((day) => {
                        if (day.data !== targetDay) return day;

                        const map = new Map((day.torresDetalhadas || []).map((item) => [String(item?.numero || '').trim(), item]));
                        pendingTowers.forEach((tower) => {
                            const existing = map.get(tower);
                            if (!existing) {
                                map.set(tower, { numero: tower, obs: '', temErosao: true });
                                return;
                            }
                            map.set(tower, { ...existing, temErosao: true });
                        });

                        const merged = [...map.values()].sort((a, b) => compareTowerNumbers(a.numero, b.numero));
                        return {
                            ...day,
                            torres: merged.map((item) => item.numero).join(', '),
                            torresInput: merged.map((item) => item.numero).join(', '),
                            torresDetalhadas: merged
                        };
                    });

                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const checkInspectionPendencies = async ({
                inspectionId,
                projectId = '',
                syncBeforeCheck = false,
                notifyWhenPending = true
            } = {}) => {
                const normalizedInspectionId = String(inspectionId || '').trim();
                const normalizedProjectId = resolveInspectionProjectId(projectId);
                if (!normalizedInspectionId || !normalizedProjectId) return [];

                if (syncBeforeCheck) {
                    await syncInspectionPendencies(normalizedInspectionId, normalizedProjectId);
                }

                const pending = getPendingErosionsForInspection(normalizedInspectionId, normalizedProjectId);
                if (pending.length > 0) {
                    ensurePendingTowersVisible(pending);
                    if (notifyWhenPending) {
                        const towers = [...new Set(pending.map((item) => String(item?.torreRef || '').trim()).filter(Boolean))]
                            .sort((a, b) => compareTowerNumbers(a, b));
                        alert(`Esta vistoria possui erosões pendentes de visita: ${towers.join(', ') || '-'}. As torres foram carregadas para marcação.`);
                    }
                }
                return pending;
            };

            useEffect(() => {
                if (!planningDraft) return;
                setIsFormOpen(true);
                setIsEditing(false);
                autoPendingCheckRef.current = '';
                setFormData((prev) => ({
                    ...prev,
                    id: '',
                    projetoId: planningDraft.projectId || prev.projetoId || '',
                    detalhesDias: Array.isArray(prev.detalhesDias) ? prev.detalhesDias : []
                }));
                setSuggestedTowerInput(planningDraft.towerInput || '');
                onPlanningDraftConsumed?.();
            }, [planningDraft, onPlanningDraftConsumed]);

            const openNew = () => {
                autoPendingCheckRef.current = '';
                setFormData({
                    id: '',
                    projetoId: forcedProjectFilterId || '',
                    dataInicio: '',
                    dataFim: '',
                    responsavel: '',
                    obs: '',
                    detalhesDias: []
                });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            useEffect(() => {
                if (!isFormOpen || isEditing) return;
                const generatedId = buildInspectionId(formData.projetoId, formData.dataInicio, inspections);
                if (!generatedId || generatedId === formData.id) return;
                setFormData(prev => ({ ...prev, id: generatedId }));
            }, [isFormOpen, isEditing, formData.projetoId, formData.dataInicio, inspections]);

            useEffect(() => {
                if (!isFormOpen || isEditing) return;
                const inspectionId = String(formData.id || '').trim();
                const projectId = String(formData.projetoId || '').trim();
                const hasDays = Array.isArray(formData.detalhesDias) && formData.detalhesDias.length > 0;
                if (!inspectionId || !projectId || !hasDays) return;

                const checkKey = `${inspectionId}|${projectId}`;
                if (autoPendingCheckRef.current === checkKey) return;
                autoPendingCheckRef.current = checkKey;

                (async () => {
                    try {
                        await checkInspectionPendencies({
                            inspectionId,
                            projectId,
                            syncBeforeCheck: false,
                            notifyWhenPending: true
                        });
                    } catch (err) {
                        alert(err.message || 'Erro ao verificar pendências de erosão nesta vistoria.');
                    }
                })();
            }, [isFormOpen, isEditing, formData.id, formData.projetoId, formData.detalhesDias, erosions]);

            const openEdit = async (i) => {
                setFormData({
                    ...i,
                    detalhesDias: Array.isArray(i.detalhesDias) ? i.detalhesDias : []
                });
                setIsEditing(true);
                setIsFormOpen(true);
                autoPendingCheckRef.current = '';
                try {
                    await checkInspectionPendencies({
                        inspectionId: i.id,
                        projectId: i.projetoId,
                        syncBeforeCheck: false,
                        notifyWhenPending: true
                    });
                } catch (err) {
                    alert(err.message || 'Erro ao verificar pendências de erosão nesta vistoria.');
                }
            };

            const buildInspectionPayload = (baseData) => ({
                ...baseData,
                dataFim: baseData.dataFim || baseData.dataInicio,
                detalhesDias: (baseData.detalhesDias || []).map((d) => ({
                    ...d,
                    torresInput: d.torresInput ?? d.torres ?? '',
                    torres: d.torresInput ?? d.torres ?? '',
                    torresDetalhadas: Array.isArray(d.torresDetalhadas) ? d.torresDetalhadas : [],
                    hotelNome: d.hotelNome || '',
                    hotelMunicipio: d.hotelMunicipio || '',
                    hotelLogisticaNota: d.hotelLogisticaNota ?? '',
                    hotelReservaNota: d.hotelReservaNota ?? '',
                    hotelEstadiaNota: d.hotelEstadiaNota ?? '',
                    hotelTorreBase: d.hotelTorreBase || ''
                }))
            });

            const handleSave = async ({ keepOpen = false } = {}) => {
                if (!formData.id || !formData.projetoId || !formData.dataInicio) {
                    alert('Preencha ID, Empreendimento e Data de Início.');
                    return null;
                }

                if (formData.dataFim && formData.dataFim < formData.dataInicio) {
                    alert('A Data de Fim não pode ser anterior à Data de Início.');
                    return null;
                }

                if (!keepOpen && !confirmDuplicateTowersAcrossDays(formData.detalhesDias)) {
                    return null;
                }

                const payload = buildInspectionPayload(formData);
                await saveToFirestore('inspections', formData.id, payload);
                await syncInspectionPendencies(formData.id, formData.projetoId);
                if (!keepOpen) {
                    const pending = getPendingErosionsForInspection(formData.id, formData.projetoId);
                    if (pending.length > 0) {
                        ensurePendingTowersVisible(pending);
                        const towers = [...new Set(pending.map((item) => String(item?.torreRef || '').trim()).filter(Boolean))]
                            .sort((a, b) => compareTowerNumbers(a, b));
                        alert(`Existem erosões pendentes de visita nesta vistoria: ${towers.join(', ') || '-'}. As torres foram carregadas para marcar a data da visita.`);
                        return null;
                    }
                }
                if (!keepOpen) setIsFormOpen(false);
                return formData.id;
            };

            const saveInspectionState = async () => {
                const id = await handleSave({ keepOpen: true });
                if (!id) throw new Error('Não foi possível salvar a vistoria antes de abrir a erosão.');
                return id;
            };

            const updateDayField = (dayIndex, patch) => {
                setFormData(prev => {
                    const nextDays = [...(prev.detalhesDias || [])];
                    nextDays[dayIndex] = { ...nextDays[dayIndex], ...patch };
                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const handleGenerateChecklist = (dayIndex) => {
                const day = formData.detalhesDias?.[dayIndex];
                if (!day) return;

                const parsed = parseTowerInput(day.torresInput || day.torres || '');
                if (parsed.invalidTokens.length > 0) {
                    alert(`Itens ignorados: ${parsed.invalidTokens.join(', ')}`);
                }
                if (parsed.exceededLimit) {
                    alert('Limite de expansão atingido para proteger o navegador. Refine os intervalos.');
                }

                let towers = parsed.numbers;
                const maxTowers = Number(selectedProject?.torres || 0);
                if (maxTowers > 0) {
                    const valid = towers.filter(n => n >= 0 && n <= maxTowers);
                    if (valid.length !== towers.length) {
                        alert(`Algumas torres foram removidas por exceder o limite do empreendimento (${maxTowers}).`);
                    }
                    towers = valid;
                }

                const existing = new Map(
                    ((day.torresDetalhadas || []).map(td => [String(td.numero), td]))
                );
                const detalhadas = towers.map(n => {
                    const key = String(n);
                    const prev = existing.get(key) || {};
                    return {
                        numero: key,
                        obs: prev.obs || '',
                        temErosao: !!prev.temErosao
                    };
                });

                updateDayField(dayIndex, {
                    torresInput: day.torresInput || day.torres || '',
                    torres: day.torresInput || day.torres || '',
                    torresDetalhadas: detalhadas
                });
            };

            const updateTowerDetail = (dayIndex, towerIndex, patch) => {
                setFormData(prev => {
                    const nextDays = [...(prev.detalhesDias || [])];
                    const day = nextDays[dayIndex];
                    if (!day) return prev;
                    const nextTowers = [...(day.torresDetalhadas || [])];
                    nextTowers[towerIndex] = { ...nextTowers[towerIndex], ...patch };
                    nextDays[dayIndex] = { ...day, torresDetalhadas: nextTowers };
                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const applySuggestedTowersToDay = (dayIndex) => {
                const day = formData.detalhesDias?.[dayIndex];
                if (!day || !suggestedTowerInput) return;
                updateDayField(dayIndex, { torresInput: suggestedTowerInput, torres: suggestedTowerInput });
                setTimeout(() => handleGenerateChecklist(dayIndex), 0);
            };

            const markTowerAsErosion = (dayIndex, towerNumber) => {
                setFormData(prev => {
                    const nextDays = [...(prev.detalhesDias || [])];
                    const day = nextDays[dayIndex];
                    if (!day) return prev;
                    const nextTowers = (day.torresDetalhadas || []).map(td =>
                        String(td.numero) === String(towerNumber) ? { ...td, temErosao: true } : td
                    );
                    nextDays[dayIndex] = { ...day, torresDetalhadas: nextTowers };
                    return { ...prev, detalhesDias: nextDays };
                });
            };

            const markPendingErosionVisit = async (dayIndex, towerNumber) => {
                try {
                    const selectedDay = formData.detalhesDias?.[dayIndex]?.data || '';
                    const defaultDate = toBrDate(selectedDay) || toBrDate(new Date().toISOString().slice(0, 10));
                    const typed = window.prompt('Informe a data da visita (DD/MM/AAAA):', defaultDate);
                    if (typed === null) return;
                    const visitDate = String(typed || '').trim();
                    if (!isBrDateValid(visitDate)) {
                        alert('Data inválida. Use o formato DD/MM/AAAA.');
                        return;
                    }
                    const inspectionId = await saveInspectionState();
                    const projectId = String(formData.projetoId || '').trim();
                    const towerKey = String(towerNumber || '').trim();
                    const targetErosions = (erosions || []).filter((item) =>
                        String(item?.projetoId || '').trim() === projectId
                        && String(item?.torreRef || '').trim() === towerKey
                    );
                    if (targetErosions.length === 0) {
                        alert('Não há erosão cadastrada nessa torre para marcar visita.');
                        return;
                    }
                    await Promise.all(targetErosions.map((erosion) => saveToFirestore('erosions', erosion.id, {
                        ...erosion,
                        vistoriaId: inspectionId,
                        vistoriaIds: [...new Set([inspectionId, ...normalizeErosionInspectionIds(erosion)])],
                        pendenciasVistoria: upsertInspectionPendency(erosion, inspectionId, {
                            status: 'visitada',
                            dia: visitDate
                        })
                    })));
                    alert(`Visita da erosão marcada em ${visitDate}.`);
                } catch (err) {
                    alert(err.message || 'Erro ao marcar visita da erosão.');
                }
            };

            const openErosionFromTower = async (dayIndex, towerNumber) => {
                try {
                    if (!formData.projetoId || !formData.dataInicio) {
                        alert('Selecione o empreendimento e a data de início antes de abrir erosão.');
                        return;
                    }

                    const inspectionId = await saveInspectionState();
                    const towerCoords = getTowerCoords(selectedProject, towerNumber);
                    markTowerAsErosion(dayIndex, towerNumber);

                    onOpenErosionDraft?.({
                        projetoId: formData.projetoId,
                        vistoriaId: inspectionId,
                        torreRef: String(towerNumber),
                        latitude: towerCoords?.latitude || '',
                        longitude: towerCoords?.longitude || '',
                        origemDia: formData.detalhesDias?.[dayIndex]?.data || ''
                    });
                } catch (err) {
                    alert(err.message || 'Erro ao preparar erosão.');
                }
            };

            const handleDelete = async (id) => {
                await deleteFromFirestore('inspections', id);
                setConfirmDelete(null);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Vistorias</h2>
                        <button onClick={openNew} className="bg-blue-600 text-white px-4 py-2 rounded-md flex items-center gap-2 hover:bg-blue-700">
                            <Plus /> Nova Vistoria
                        </button>
                    </div>

                    {forcedProject && (
                        <div className="rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 flex items-center justify-between gap-3">
                            <div className="text-sm text-blue-900">
                                Filtrado por empreendimento: <strong>{forcedProject.nome || forcedProject.id}</strong> ({forcedProject.id})
                            </div>
                            <button
                                className="px-3 py-1.5 rounded-lg bg-white border border-blue-200 text-blue-700 text-xs hover:bg-blue-100"
                                onClick={() => onClearForcedProjectFilter?.()}
                            >
                                Limpar filtro
                            </button>
                        </div>
                    )}

                    <div className="space-y-4">
                        {filtered.map(i => {
                            const projeto = projects.find(p => p.id === i.projetoId);
                            const pendingSummary = pendingSummaryByInspection.get(i.id) || { count: 0, towers: [] };
                            const pendingCount = Number(pendingSummary.count || 0);
                            return (
                                <div key={i.id} className="bg-white rounded-xl border shadow-sm p-5 hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-2">
                                                <h3 className="font-bold text-slate-800">{i.id}</h3>
                                                <span className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded">{i.projetoId}</span>
                                                {i.dataInicio && <span className="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded">{i.dataInicio}</span>}
                                                {Array.isArray(i.detalhesDias) && i.detalhesDias.length > 0 && (
                                                    <span className="px-2 py-1 bg-indigo-50 text-indigo-700 text-xs rounded">
                                                        {i.detalhesDias.length} dia(s)
                                                    </span>
                                                )}
                                                {pendingCount > 0 && (
                                                    <span
                                                        className="px-2 py-1 bg-amber-100 text-amber-800 text-xs rounded"
                                                        title={pendingSummary.towers.length > 0 ? `Torres pendentes: ${pendingSummary.towers.join(', ')}` : 'Existem erosões pendentes sem data de visita'}
                                                    >
                                                        {pendingCount} pendente(s)
                                                    </span>
                                                )}
                                            </div>
                                            <div className="text-sm text-slate-600 space-y-1">
                                                {i.responsavel && <p><strong>Responsável:</strong> {i.responsavel}</p>}
                                                {i.dataFim && <p><strong>Data Fim:</strong> {i.dataFim}</p>}
                                                {pendingCount > 0 && (
                                                    <p className="text-amber-700 text-xs">
                                                        Erosões sem data de visita: {pendingSummary.towers.length > 0 ? pendingSummary.towers.join(', ') : '-'}
                                                    </p>
                                                )}
                                                {projeto && (
                                                    <p className="text-slate-500 text-xs mt-2">
                                                        <MapIcon className="w-3 h-3 inline mr-1" />
                                                        {projeto.nome}
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => setDetailsModal(i)} className="p-2 rounded-lg bg-slate-100 hover:bg-green-50 text-green-600" title="Ver detalhes">
                                                <Eye />
                                            </button>
                                            <button onClick={() => openEdit(i)} className="p-2 rounded-lg bg-slate-100 hover:bg-blue-50 text-blue-600">
                                                <Edit />
                                            </button>
                                            <button onClick={() => setConfirmDelete(i.id)} className="p-2 rounded-lg bg-slate-100 hover:bg-red-50 text-red-600">
                                                <Trash2 />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        {filtered.length === 0 && (
                            <p className="text-slate-400 text-center py-10">
                                Nenhuma vistoria encontrada.
                            </p>
                        )}
                    </div>

                    {detailsModal && (
                        <InspectionDetailsModal
                            inspection={detailsModal}
                            project={projects.find(p => p.id === detailsModal.projetoId)}
                            erosions={erosions}
                            inspections={filtered}
                            onClose={() => setDetailsModal(null)}
                            onNavigate={(newInspection) => setDetailsModal(newInspection)}
                        />
                    )}

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 overflow-y-auto p-4">
                            <div className="bg-white p-6 rounded-xl w-full max-w-6xl shadow-2xl my-8">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-lg font-bold">{isEditing ? 'Editar' : 'Nova'} Vistoria</h3>
                                    <button onClick={() => setIsFormOpen(false)}><X /></button>
                                </div>

                                <div className="space-y-4 max-h-[78vh] overflow-y-auto pr-2">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">ID</label>
                                            <input className="w-full border p-2 rounded text-sm bg-slate-50" value={formData.id} disabled />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Empreendimento *</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.projetoId} onChange={(e) => setFormData({...formData, projetoId: e.target.value})}>

                                                                            const visitedEntry = linkedTowerErosions

                    {confirmDelete && (
