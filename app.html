                    const dataWithMeta = {
                        ...data,
                        ultimaAtualizacao: new Date().toISOString(),
                        atualizadoPor: actorName
                    };
                    await setDoc(doc(db, 'shared', 'geomonitor', colName, docId), dataWithMeta);
                    showToast('ok', 'Dados salvos com sucesso!');
                } catch (e) {
                    showToast('err', 'Erro ao salvar: ' + e.message);
                }
            };

            const deleteFromFirestore = async (colName, docId) => {
                try {
                    const { doc, deleteDoc } = window.firebaseModules;
                    await deleteDoc(doc(db, 'shared', 'geomonitor', colName, docId));
                    showToast('ok', 'Registo excluído!');
                } catch (e) {
                    showToast('err', 'Erro ao excluir: ' + e.message);
                }
            };

            const saveRulesConfig = async (nextRules) => {
                const normalized = normalizeRulesConfig(nextRules);
                await saveToFirestore('config', 'rules', normalized);
                setRulesConfig(normalized);
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.firebaseModules) {
                        try {
                            const { initializeApp, getApps, getAuth, onAuthStateChanged, getFirestore } = window.firebaseModules;
                            
                            const apps = getApps();
                            if (!apps || apps.length === 0) {
                                app = initializeApp(firebaseConfig);
                            } else {
                                app = apps[0];
                            }
                            
                            auth = getAuth(app);
                            db = getFirestore(app);
                            
                            onAuthStateChanged(auth, (user) => {
                                setAuthUser(user);
                                setAuthLoading(false);
                            });
                            
                            setInitialized(true);
                        } catch (e) {
                            console.error('Erro ao inicializar Firebase:', e);
                            setAuthLoading(false);
                        } finally {
                            clearInterval(timer);
                        }
                    }
                }, 100);
                
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!authUser || !initialized) return;

                const { collection, onSnapshot, doc } = window.firebaseModules;

                const un1 = onSnapshot(collection(db, 'shared', 'geomonitor', 'projects'), (s) => {
                    setProjects(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const un2 = onSnapshot(collection(db, 'shared', 'geomonitor', 'inspections'), (s) => {
                    setInspections(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => 
                        new Date(b.dataInicio || b.data) - new Date(a.dataInicio || a.data)
                    ));
                });

                const unLicenses = onSnapshot(collection(db, 'shared', 'geomonitor', 'operatingLicenses'), (s) => {
                    setLicenses(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const un3 = onSnapshot(collection(db, 'shared', 'geomonitor', 'erosions'), (s) => {
                    setErosions(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });

                const un4 = onSnapshot(doc(db, 'shared', 'geomonitor', 'users', authUser.uid), (snap) => {
                    if (snap.exists()) {
                        setCurrentUserProfile({ id: snap.id, ...snap.data() });
                    } else {
                        setCurrentUserProfile(null);
                    }
                });

                const un5 = onSnapshot(doc(db, 'shared', 'geomonitor', 'config', 'rules'), (snap) => {
                    if (snap.exists()) {
                        setRulesConfig(normalizeRulesConfig(snap.data()));
                    } else {
                        setRulesConfig(normalizeRulesConfig(RULES_DATABASE));
                    }
                });

                return () => {
                    un1(); un2(); un3(); un4(); un5(); unLicenses();
                };
            }, [authUser, initialized]);

            useEffect(() => {
                if (!authUser || !initialized || !currentUserProfile) return;
                if (!canAccessAdminMenu(currentUserProfile)) {
                    setUsers([]);
                    return;
                }
                const { collection, onSnapshot } = window.firebaseModules;
                const un = onSnapshot(collection(db, 'shared', 'geomonitor', 'users'), (s) => {
                    setUsers(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => un();
            }, [authUser, initialized, currentUserProfile]);

            useEffect(() => {
                if (!authUser || !initialized) return;
                if (currentUserProfile) return;
                if (!window.firebaseModules || !db) return;

                const bootstrapProfile = async () => {
                    try {
                        const { doc, setDoc, getDoc } = window.firebaseModules;
                        const userRef = doc(db, 'shared', 'geomonitor', 'users', authUser.uid);
                        const existing = await getDoc(userRef);
                        if (existing.exists()) return;

                        await setDoc(userRef, {
                            id: authUser.uid,
                            nome: authUser.displayName || '',
                            email: authUser.email || '',
                            cargo: '',
                            departamento: '',
                            telefone: '',
                            perfil: 'Utilizador',
                            status: 'Pendente',
                            perfilAtualizadoPrimeiroLogin: false,
                            createdAt: new Date().toISOString()
                        });
                    } catch (e) {
                        console.error('Erro ao criar perfil base por uid:', e);
                    }
                };

                bootstrapProfile();
            }, [authUser, initialized, currentUserProfile]);

            useEffect(() => {
                if (activeTab === 'admin' && !canAccessAdminMenu(currentUserProfile)) {
                    setActiveTab('dashboard');
                }
            }, [activeTab, currentUserProfile]);

            useEffect(() => {
                pendingToastShownRef.current = false;
                setDismissPendingBanner(false);
            }, [authUser?.uid]);

            const isAdminProfile = String(currentUserProfile?.perfil || '').trim() === 'Administrador';
            const pendingUsers = users.filter(u => normalizeUserStatus(u.status) === 'Pendente');
            const pendingUsersCount = isAdminProfile ? pendingUsers.length : 0;

            useEffect(() => {
                if (!isAdminProfile) return;
                if (pendingUsersCount > 0 && !pendingToastShownRef.current) {
                    showToast('', `Existem ${pendingUsersCount} utilizador(es) pendente(s) de aprovação.`);
                    pendingToastShownRef.current = true;
                }
                if (pendingUsersCount === 0) {
                    pendingToastShownRef.current = false;
                    setDismissPendingBanner(false);
                }
            }, [isAdminProfile, pendingUsersCount]);

            if (!initialized || authLoading) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-white">
                        <Activity /> <span className="ml-2">Inicializando...</span>
                    </div>
                );
            }

            if (!authUser) {
                return <AuthScreen />;
            }

            if (loading) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-white">
                        <Activity /> <span className="ml-2">A carregar dados...</span>
                    </div>
                );
            }

            if (!currentUserProfile) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-slate-100 p-6">
                        <div className="bg-white border rounded-xl shadow-sm p-8 max-w-md w-full text-center">
                            <h2 className="text-xl font-bold text-slate-800 mb-2">A configurar o seu perfil</h2>
                            <p className="text-sm text-slate-600 mb-6">Aguarde alguns instantes.</p>
                            <button
                                className="px-4 py-2 bg-slate-100 rounded-lg text-slate-700 hover:bg-slate-200"
                                onClick={async () => {
                                    const { signOut } = window.firebaseModules;
                                    await signOut(auth);
                                }}
                            >
                                Sair
                            </button>
                        </div>
                    </div>
                );
            }

            const accessStatus = normalizeUserStatus(currentUserProfile.status);
            if (accessStatus !== 'Ativo') {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-slate-100 p-6">
                        <div className="bg-white border rounded-xl shadow-sm p-8 max-w-md w-full text-center">
                            <h2 className="text-xl font-bold text-slate-800 mb-2">
                                {accessStatus === 'Pendente' ? 'Acesso pendente de aprovação' : 'Acesso desativado'}
                            </h2>
                            <p className="text-sm text-slate-600 mb-6">
                                {accessStatus === 'Pendente'
                                    ? 'A sua conta foi criada com sucesso e está aguardando aprovação de um administrador.'
                                    : 'A sua conta está inativa. Entre em contato com um administrador.'}
                            </p>
                            <button
                                className="px-4 py-2 bg-slate-100 rounded-lg text-slate-700 hover:bg-slate-200"
                                onClick={async () => {
                                    const { signOut } = window.firebaseModules;
                                    await signOut(auth);
                                }}
                            >
                                Sair
                            </button>
                        </div>
                    </div>
                );
            }

            const hasFirstLoginFlag = currentUserProfile?.perfilAtualizadoPrimeiroLogin === true;
            const profileComplete = isFirstLoginProfileComplete(currentUserProfile);
            const needsFirstProfileUpdate = !hasFirstLoginFlag && !profileComplete;

            if (needsFirstProfileUpdate) {
                return (
                    <MandatoryProfileUpdateView
                        authUser={authUser}
                        currentUserProfile={currentUserProfile}
                        saveToFirestore={saveToFirestore}
                    />
                );
            }

            const hasAdminMenuAccess = canAccessAdminMenu(currentUserProfile);
            const openProjectInspections = (projectId) => {
                setInspectionProjectFilterId(projectId || null);
                setActiveTab('inspections');
            };

            const menu = [
                { id: 'dashboard', icon: <Activity />, label: 'Monitorização' },
                { id: 'projects', icon: <MapIcon />, label: 'Empreendimentos' },
                { id: 'licenses', icon: <Scale />, label: 'Licenças LO' },
                { id: 'inspections', icon: <ClipboardList />, label: 'Vistorias' },
                { id: 'erosions', icon: <AlertTriangle />, label: 'Erosões' },
                { id: 'visit-planning', icon: <Scale />, label: 'Planejamento' },
                ...(hasAdminMenuAccess ? [{ id: 'admin', icon: <Shield />, label: 'Administração' }] : [])
            ];

            return (
                <div className="flex h-screen bg-slate-50">
                    <aside className={`${sidebarCollapsed ? 'w-20' : 'w-72'} bg-slate-900 text-slate-300 flex flex-col shadow-xl transition-all duration-300`}>
                        <div className="p-6 border-b border-slate-800 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <button 
                                    className="p-2 hover:bg-slate-800 rounded-lg transition-all"
                                    onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
                                    title={sidebarCollapsed ? 'Expandir menu' : 'Recolher menu'}
                                >
                                    {sidebarCollapsed ? <Menu className="text-slate-300" /> : <ChevronLeft className="text-slate-300" />}
                                </button>
                                {!sidebarCollapsed && (
                                    <h1 className="text-xl font-bold text-white flex items-center gap-2">
                                        <Activity className="text-blue-500" /> GeoMonitor
                                    </h1>
                                )}
                            </div>
                            {!sidebarCollapsed && (
                                <button 
                                    className="text-xs text-slate-300 hover:text-white hover:bg-slate-700 border border-slate-600 px-3 py-1.5 rounded-lg transition-all"
                                    onClick={async () => {
                                        const { signOut } = window.firebaseModules;
                                        await signOut(auth);
                                    }}
                                >
                                    Sair
                                </button>
                            )}
                        </div>

                        {!sidebarCollapsed && (
                            <div className="px-6 pt-4 pb-2 border-b border-slate-800">
                                <button 
                                    onClick={() => setShowProfileModal(true)}
                                    className="w-full text-left hover:bg-slate-800 rounded-lg p-2 transition-all"
                                >
                                    <div className="flex items-center gap-2 mb-1">
                                        <User className="text-blue-500 w-4 h-4" />
                                        <div className="text-xs text-slate-400">Meu Perfil</div>
                                    </div>
                                    <div className="text-sm text-white font-medium truncate">
                                        {currentUserProfile?.nome || authUser.email || authUser.uid}
                                    </div>
                                    {currentUserProfile && (
                                        <div className="text-xs text-slate-400 mt-0.5">{currentUserProfile.cargo || 'Sem cargo'}</div>
                                    )}
                                </button>
                            </div>
                        )}

                        <nav className="flex-1 p-4 space-y-2">
                            {menu.map(m => (
                                <button
                                    key={m.id}
                                    onClick={() => setActiveTab(m.id)}
                                    className={`w-full flex items-center ${sidebarCollapsed ? 'justify-center' : 'gap-3'} px-4 py-3 rounded-lg text-left transition-all ${
                                        activeTab === m.id 
                                            ? 'bg-blue-600 text-white' 
                                            : 'hover:bg-slate-800'
                                    }`}
                                    title={sidebarCollapsed ? m.label : ''}
                                >
                                    {m.icon}
                                    {!sidebarCollapsed && <span className="font-medium">{m.label}</span>}
                                </button>
                            ))}
                        </nav>

                        {!sidebarCollapsed && (
                            <div className="p-4 border-t border-slate-800">
                                <div className="flex items-center gap-2 bg-slate-800 rounded-lg px-3 py-2.5">
                                    <Search className="text-slate-400" />
                                    <input 
                                        className="bg-transparent outline-none text-sm text-slate-100 placeholder:text-slate-400 w-full"
                                        placeholder="Procurar..."
                                        value={globalSearchTerm}
                                        onChange={(e) => setGlobalSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                        )}
                    </aside>

                    <main
                        className="flex-1 p-8 overflow-y-auto"
                        onMouseDown={() => setSidebarCollapsed(true)}
                        onTouchStart={() => setSidebarCollapsed(true)}
                    >
                        {isAdminProfile && pendingUsersCount > 0 && !dismissPendingBanner && (
                            <div className="max-w-7xl mx-auto mb-4">
                                <div className="rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 flex items-center justify-between gap-3">
                                    <div className="text-sm text-amber-900">
                                        <strong>{pendingUsersCount}</strong> utilizador(es) aguardando aprovação.
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button
                                            className="px-3 py-1.5 rounded-lg bg-amber-600 text-white text-xs hover:bg-amber-700"
                                            onClick={() => setActiveTab('admin')}
                                        >
                                            Ir para aprovação
                                        </button>
                                        <button
                                            className="px-3 py-1.5 rounded-lg bg-white text-amber-800 border border-amber-200 text-xs hover:bg-amber-100"
                                            onClick={() => setDismissPendingBanner(true)}
                                        >
                                            Dispensar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="max-w-7xl mx-auto">
                            {activeTab === 'dashboard' && (
                                <DashboardView projects={projects} licenses={licenses} inspections={inspections} erosions={erosions} searchTerm={globalSearchTerm} />
                            )}
                            {activeTab === 'projects' && (
                                <ProjectsView
                                    projects={projects}
                                    inspections={inspections}
                                    searchTerm={globalSearchTerm}
                                    saveToFirestore={saveToFirestore}
                                    deleteFromFirestore={deleteFromFirestore}
                                    onOpenProjectInspections={openProjectInspections}
                                />
                            )}
                            {activeTab === 'licenses' && (
                                <LicensesView
                                    licenses={licenses}
                                    projects={projects}
                                    erosions={erosions}
                                    saveToFirestore={saveToFirestore}
                                    deleteFromFirestore={deleteFromFirestore}
                                />
                            )}
                            {activeTab === 'inspections' && (
                                <InspectionsView
                                    inspections={inspections}
                                    projects={projects}
                                    erosions={erosions}
                                    searchTerm={globalSearchTerm}
                                    saveToFirestore={saveToFirestore}
                                    deleteFromFirestore={deleteFromFirestore}
                                    forcedProjectFilterId={inspectionProjectFilterId}
                                    onClearForcedProjectFilter={() => setInspectionProjectFilterId(null)}
                                    onOpenErosionDraft={(draft) => {
                                        setPendingErosionDraft(draft);
                                        setActiveTab('erosions');
                                    }}
                                    planningDraft={inspectionPlanningDraft}
                                    onPlanningDraftConsumed={() => setInspectionPlanningDraft(null)}
                                />
                            )}
                            {activeTab === 'erosions' && (
                                <ErosionsView
                                    erosions={erosions}
                                    projects={projects}
                                    inspections={inspections}
                                    searchTerm={globalSearchTerm}
                                    saveToFirestore={saveToFirestore}
                                    deleteFromFirestore={deleteFromFirestore}
                                    pendingDraft={pendingErosionDraft}
                                    onDraftConsumed={() => setPendingErosionDraft(null)}
                                    rulesConfig={rulesConfig}
                                    currentUserName={resolveActorName()}
                                />
                            )}
                            {activeTab === 'visit-planning' && (
                                <VisitPlanningView
                                    projects={projects}
                                    inspections={inspections}
                                    erosions={erosions}
                                    onApplySelection={(payload) => {
                                        setInspectionPlanningDraft(payload);
                                        setInspectionProjectFilterId(payload.projectId || null);
                                        setActiveTab('inspections');
                                    }}
                                />
                            )}
                            {activeTab === 'admin' && hasAdminMenuAccess && (
                                <AdminView
                                    users={users}
                                    searchTerm={globalSearchTerm}
                                    saveToFirestore={saveToFirestore}
                                    deleteFromFirestore={deleteFromFirestore}
                                    rulesConfig={rulesConfig}
                                    saveRulesConfig={saveRulesConfig}
                                    canApproveUsers={isAdminProfile}
                                />
                            )}
                        </div>

                        {showProfileModal && (
                            <ProfileModal 
                                authUser={authUser} 
                                currentUserProfile={currentUserProfile} 
                                saveToFirestore={saveToFirestore} 
                                onClose={() => setShowProfileModal(false)} 
                                showToast={showToast} 
                            />
                        )}

                        {toast.text && (
                            <div className={`fixed bottom-6 right-6 z-50 rounded-xl border shadow-lg px-4 py-3 text-sm flex items-center gap-2 max-w-sm ${
                                toast.kind === 'ok' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                                toast.kind === 'err' ? 'bg-red-50 border-red-200 text-red-800' :
                                'bg-slate-50 border-slate-200 text-slate-800'
                            }`}>
                                <div className="flex-1">{toast.text}</div>
                                <button onClick={() => setToast({ kind: '', text: '' })}><X /></button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function AuthScreen() {
            const [mode, setMode] = useState('login');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [nome, setNome] = useState('');
            const [showPass, setShowPass] = useState(false);
            const [showConfirmPass, setShowConfirmPass] = useState(false);
            const [busy, setBusy] = useState(false);
            const [msg, setMsg] = useState({ kind: '', text: '' });

            const submit = async () => {
                setMsg({ kind: '', text: '' });
                setBusy(true);
                try {
                    const { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } = window.firebaseModules;
                    
                    if (!email) throw new Error('Informe o email.');
                    
                    if (mode === 'reset') {
                        await sendPasswordResetEmail(auth, email);
                        setMode('login');
                        setMsg({ kind: 'ok', text: 'Email de redefinição enviado. Verifique a sua caixa de entrada.' });
                    } else if (mode === 'signup') {
                        if (!nome || nome.trim().length < 3) throw new Error('Nome deve ter pelo menos 3 caracteres.');
                        if (!pass || pass.length < 6) throw new Error('Senha mínimo 6 caracteres.');
                        if (!confirmPass || pass !== confirmPass) throw new Error('As senhas não coincidem.');
                        
                        const cred = await createUserWithEmailAndPassword(auth, email, pass);
                        const { doc, setDoc } = window.firebaseModules;
                        await setDoc(
                            doc(db, 'shared', 'geomonitor', 'users', cred.user.uid),
                            {
                                id: cred.user.uid,
                                nome: nome.trim(),
                                email: email.trim(),
                                cargo: '',
                                departamento: '',
                                telefone: '',
                                perfil: 'Utilizador',
                                status: 'Pendente',
                                perfilAtualizadoPrimeiroLogin: false,
                                createdAt: new Date().toISOString()
                            },
                            { merge: true }
                        );
                        setMsg({ kind: 'ok', text: 'Conta criada. Aguarde aprovação de um administrador para acessar o sistema.' });
                    } else {
                        await signInWithEmailAndPassword(auth, email, pass);
                    }
                } catch (e) {
                    setMsg({ kind: 'err', text: e.message || String(e) });
                } finally {
                    setBusy(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6">
                    <div className="w-full max-w-md bg-white border border-slate-200 rounded-xl shadow-lg p-8">
                        <div className="flex items-center justify-center mb-6">
                            <div className="bg-blue-600 p-3 rounded-xl shadow-md">
                                <Activity className="text-white w-8 h-8" />
                            </div>
                        </div>
                        
                        <div className="text-center mb-6">
                            <h1 className="text-2xl font-bold text-slate-800">GeoMonitor</h1>
                            <p className="text-sm text-slate-500 mt-1">Sistema de Monitorização Geotécnica</p>
                        </div>

                        <div className="flex gap-2 mb-6">
                            <button
                                className={`flex-1 py-2.5 rounded-lg text-sm font-medium border transition-all ${
                                    mode === 'login' 
                                        ? 'bg-blue-600 text-white border-blue-600' 
                                        : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'
                                }`}
                                onClick={() => {
                                    setMode('login');
                                    setPass('');
                                    setConfirmPass('');
                                    setShowPass(false);
                                    setShowConfirmPass(false);
                                }}
                            >
                                Entrar
                            </button>
                            <button
                                className={`flex-1 py-2.5 rounded-lg text-sm font-medium border transition-all ${
                                    mode === 'signup' 
                                        ? 'bg-blue-600 text-white border-blue-600' 
                                        : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'
                                }`}
                                onClick={() => {
                                    setMode('signup');
                                    setPass('');
                                    setConfirmPass('');
                                    setShowPass(false);
                                    setShowConfirmPass(false);
                                }}
                            >
                                Criar conta
                            </button>
                            <button
                                className={`py-2.5 px-3 rounded-lg text-sm font-medium border transition-all ${
                                    mode === 'reset' 
                                        ? 'bg-blue-600 text-white border-blue-600' 
                                        : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50'
                                }`}
                                onClick={() => {
                                    setMode('reset');
                                    setPass('');
                                    setConfirmPass('');
                                    setShowPass(false);
                                    setShowConfirmPass(false);
                                }}
                                title="Recuperar senha"
                            >
                                ?
                            </button>
                        </div>

                        <div className="space-y-4">
                            {mode === 'signup' && (
                                <div>
                                    <label className="text-xs font-semibold text-slate-700 flex items-center gap-1">
                                        <User className="w-3 h-3" /> Nome completo
                                    </label>
                                    <input
                                        className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                        value={nome}
                                        onChange={(e) => setNome(e.target.value)}
                                        type="text"
                                        placeholder="O seu nome"
                                    />
                                </div>
                            )}
                            
                            <div>
                                <label className="text-xs font-semibold text-slate-700">Email</label>
                                <input
                                    className="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    type="email"
                                    placeholder="email@dominio.com"
                                />
                            </div>

                            {mode !== 'reset' && (
                                <div>
                                    <label className="text-xs font-semibold text-slate-700">Senha</label>
                                    <div className="flex gap-2">
                                        <input
                                            className="flex-1 border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                            value={pass}
                                            onChange={(e) => setPass(e.target.value)}
                                            type={showPass ? 'text' : 'password'}
                                            placeholder="••••••"
                                        />
                                        <button
                                            type="button"

                       String(e.projetoId || '').toLowerCase().includes(t);

            const currentYear = new Date().getFullYear();

            const reportOccurrences = buildEffectiveReportOccurrences({

                endYear: nextYear
            }).sort((a, b) => a.sortDate - b.sortDate || String(a.scopeId || '').localeCompare(String(b.scopeId || '')));

            const reportByMonth = reportOccurrences.reduce((acc, item) => {
                const key = item.monthKey;

                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-gradient-to-br from-red-50 to-red-100 border border-red-200 p-4 rounded-lg">

                            <div className="text-2xl font-bold text-orange-700">{porImpacto['Alto']}</div>
                        </div>

                            <div className="text-xs font-semibold text-yellow-700 uppercase tracking-wide mb-1">Médio</div>
                            <div className="text-2xl font-bold text-yellow-700">{porImpacto['Médio']}</div>

        function LicensesView({ licenses, projects, erosions, saveToFirestore, deleteFromFirestore }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({
                id: '',
                numero: '',
                orgaoAmbiental: '',
                esfera: 'Federal',
                uf: '',
                descricao: '',
                inicioVigencia: '',
                fimVigencia: '',
                status: 'ativa',
                periodicidadeRelatorio: 'Anual',
                mesesEntregaRelatorio: [1],
                anoBaseBienal: '',
                exigeAcompanhamentoErosivo: true,
                cobertura: [],
                observacoes: ''
            });
            const agencyOptions = useMemo(() => getAgencyOptions({ licenses, erosions }), [licenses, erosions]);

            const toggleMonth = (monthValue) => {
                const month = Number(monthValue);
                setFormData((prev) => {
                    const current = normalizeReportMonths(prev.mesesEntregaRelatorio);
                    const exists = current.includes(month);
                    const next = exists ? current.filter((item) => item !== month) : [...current, month];
                    return { ...prev, mesesEntregaRelatorio: normalizeReportMonths(next) };
                });
            };

            const openNew = () => {
                setIsEditing(false);
                setFormData({
                    id: '',
                    numero: '',
                    orgaoAmbiental: '',
                    esfera: 'Federal',
                    uf: '',
                    descricao: '',
                    inicioVigencia: '',
                    fimVigencia: '',
                    status: 'ativa',
                    periodicidadeRelatorio: 'Anual',
                    mesesEntregaRelatorio: [1],
                    anoBaseBienal: '',
                    exigeAcompanhamentoErosivo: true,
                    cobertura: [],
                    observacoes: ''
                });
                setIsFormOpen(true);
            };

            const openEdit = (item) => {
                setIsEditing(true);
                setFormData({
                    ...item,
                    esfera: LICENSE_SPHERE_OPTIONS.includes(String(item?.esfera || '').trim()) ? item.esfera : 'Federal',
                    uf: String(item?.uf || '').trim().toUpperCase(),
                    orgaoAmbiental: String(item?.orgaoAmbiental || '').trim(),
                    cobertura: (item.cobertura || []).map((row) => ({
                        projetoId: String(row?.projetoId || '').trim(),
                        torresInput: (Array.isArray(row?.torres) ? row.torres : []).join(', '),
                        descricaoEscopo: String(row?.descricaoEscopo || '').trim()
                    }))
                });
                setIsFormOpen(true);
            };

            const handleDelete = async (id) => {
                if (!window.confirm(`Excluir LO ${id}?`)) return;
                await deleteFromFirestore('operatingLicenses', id);
            };

            const handleSave = async () => {
                const esfera = LICENSE_SPHERE_OPTIONS.includes(String(formData.esfera || '').trim()) ? formData.esfera : 'Federal';
                const uf = esfera === 'Estadual' ? String(formData.uf || '').trim().toUpperCase() : '';
                if (!String(formData.numero || '').trim()) return alert('Informe o número da LO.');
                if (!String(formData.orgaoAmbiental || '').trim()) return alert('Informe o órgão ambiental.');
                if (esfera === 'Estadual' && !BRAZIL_UF_OPTIONS.includes(uf)) return alert('UF obrigatória para esfera estadual.');
                if (!String(formData.inicioVigencia || '').trim()) return alert('Informe o início de vigência.');
                if (formData.fimVigencia && formData.fimVigencia < formData.inicioVigencia) {
                    return alert('Fim de vigência não pode ser anterior ao início.');
                }
                const scheduleValidation = validateReportSchedule({
                    periodicidadeRelatorio: formData.periodicidadeRelatorio,
                    mesesEntregaRelatorio: formData.mesesEntregaRelatorio,
                    anoBaseBienal: formData.anoBaseBienal
                });
                if (!scheduleValidation.ok) return alert(scheduleValidation.message);

                const cobertura = (formData.cobertura || []).map((row) => {
                    const torres = parseTowerInput(row?.torresInput || '').numbers.map((item) => String(item));
                    return {
                        projetoId: String(row?.projetoId || '').trim(),
                        torres,
                        descricaoEscopo: String(row?.descricaoEscopo || '').trim()
                    };
                }).filter((row) => row.projetoId && row.torres.length > 0);
                if (cobertura.length === 0) return alert('Adicione ao menos um escopo de cobertura com torres.');

                const id = String(formData.id || '').trim().toUpperCase()
                    || (`LO-${String(formData.numero || '').trim().toUpperCase().replace(/[^A-Z0-9]+/g, '-') || Date.now()}`);

                await saveToFirestore('operatingLicenses', id, {
                    ...formData,
                    id,
                    numero: String(formData.numero || '').trim(),
                    orgaoAmbiental: String(formData.orgaoAmbiental || '').trim(),
                    esfera,
                    uf,
                    periodicidadeRelatorio: normalizeReportPeriodicity(formData.periodicidadeRelatorio),
                    mesesEntregaRelatorio: normalizeReportMonths(formData.mesesEntregaRelatorio),
                    anoBaseBienal: normalizeReportPeriodicity(formData.periodicidadeRelatorio) === 'Bienal'
                        ? Number(formData.anoBaseBienal)
                        : '',
                    exigeAcompanhamentoErosivo: true,
                    cobertura

                setIsFormOpen(false);

                                    </div>
                                </div>

                                    <div><strong>Esfera:</strong> {item.esfera || '-'}</div>

                                    <div><strong>Condicionante erosão:</strong> Sim</div>

                    </div>

                    {isFormOpen && (

                                <div className="mt-4 p-3 bg-slate-50 rounded border">
                                    <div className="font-semibold text-sm text-slate-700 mb-2">Cobertura por empreendimento/torres</div>
                                    {(formData.cobertura || []).map((row, idx) => (
                                        <div key={`coverage-row-${idx}`} className="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2">
                                            <select className="w-full border p-2 rounded text-sm" value={row.projetoId || ''} onChange={(e) => setFormData((prev) => ({ ...prev, cobertura: prev.cobertura.map((it, i) => i === idx ? { ...it, projetoId: e.target.value } : it) }))}>
                                                <option value="">Empreendimento...</option>
                                                {projects.map((project) => <option key={project.id} value={project.id}>{project.id} - {project.nome}</option>)}
                                            </select>
                                            <input className="w-full border p-2 rounded text-sm" value={row.torresInput || ''} onChange={(e) => setFormData((prev) => ({ ...prev, cobertura: prev.cobertura.map((it, i) => i === idx ? { ...it, torresInput: e.target.value } : it) }))} placeholder="Torres (1-3, 8)" />
                                            <input className="w-full border p-2 rounded text-sm" value={row.descricaoEscopo || ''} onChange={(e) => setFormData((prev) => ({ ...prev, cobertura: prev.cobertura.map((it, i) => i === idx ? { ...it, descricaoEscopo: e.target.value } : it) }))} placeholder="Descrição (opcional)" />
                                            <button className="px-2 py-2 rounded text-xs bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setFormData((prev) => ({ ...prev, cobertura: prev.cobertura.filter((_, i) => i !== idx) }))}>Remover</button>
                                        </div>
                                    ))}
                                    <button className="px-3 py-2 rounded text-sm bg-slate-100 text-slate-700 hover:bg-slate-200" onClick={() => setFormData((prev) => ({ ...prev, cobertura: [...(prev.cobertura || []), { projetoId: '', torresInput: '', descricaoEscopo: '' }] }))}>
                                        Adicionar escopo
                                    </button>
                                </div>

                                <div className="mt-3 text-sm text-slate-700"><strong>Condicionante:</strong> exige acompanhamento de processos erosivos.</div>
                                <textarea className="w-full border p-2 rounded text-sm mt-3" rows="3" value={formData.observacoes || ''} onChange={(e) => setFormData((prev) => ({ ...prev, observacoes: e.target.value }))} placeholder="Observações" />

                                <div className="flex gap-2 mt-4">
                                    <button className="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700" onClick={handleSave}>Salvar</button>
                                    <button className="px-4 bg-slate-100 text-slate-700 py-2 rounded hover:bg-slate-200" onClick={() => setIsFormOpen(false)}>Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProjectsView({ projects, inspections, searchTerm, saveToFirestore, deleteFromFirestore, onOpenProjectInspections }) {
            const baseProjectForm = {
                id: '',
                nome: '',
                tipo: 'Linha de Transmissão',
                tensao: '',
                extensao: '',
                torres: '',
                periodicidadeRelatorio: 'Anual',
                mesesEntregaRelatorio: [],
                anoBaseBienal: '',
                torresCoordenadas: [],
                linhaCoordenadas: [],
                linhaFonteKml: '',
                dataCadastro: new Date().toISOString().split('T')[0]
            };
            const baseCreateFromKml = {
                id: '',
                nome: '',
                tipo: 'Linha de Transmissão',
                tensao: '',
                extensao: '',
                torres: '',
                periodicidadeRelatorio: 'Anual',
                mesesEntregaRelatorio: [],
                anoBaseBienal: ''
            };
            const emptyKmlMeta = {
                sigla: '',
                nome: '',
                torres: 0,
                extensao: '',
                lineStringFound: false,
                sourceLabel: '',
                linhaCoordenadas: [],
                linhaNome: '',
                linhaFonteKml: ''
            };
            const emptyKmlMergeSnapshot = {
                id: '',
                nome: '',
                extensao: '',
                torres: ''
            };
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState(baseProjectForm);
            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [kmlReviewOpen, setKmlReviewOpen] = useState(false);
            const [kmlReviewMode, setKmlReviewMode] = useState('merge');
            const [kmlRows, setKmlRows] = useState([]);
            const [kmlImportErrors, setKmlImportErrors] = useState([]);
            const [createFromKmlData, setCreateFromKmlData] = useState(baseCreateFromKml);
            const [kmlMeta, setKmlMeta] = useState(emptyKmlMeta);
            const [kmlMergeSnapshot, setKmlMergeSnapshot] = useState(emptyKmlMergeSnapshot);
            const [applyKmlMetadataOnMerge, setApplyKmlMetadataOnMerge] = useState(false);
            const [routeModalProject, setRouteModalProject] = useState(null);
            const [routeSelection, setRouteSelection] = useState([]);
            const mergeInputRef = useRef(null);
            const createInputRef = useRef(null);
            const mergeTargetRef = useRef(null);

            const filtered = projects.filter(p => {
                const t = searchTerm.toLowerCase();
                if (!t) return true;
                return String(p.id || '').toLowerCase().includes(t) ||
                       String(p.nome || '').toLowerCase().includes(t);
            });

            const reviewedKml = useMemo(() => validateTowerCoordinatesAsString(kmlRows), [kmlRows]);
            const routeProjectTowers = useMemo(() => {
                if (!routeModalProject) return [];
                const reviewed = validateTowerCoordinatesAsString(routeModalProject.torresCoordenadas || []);
                return reviewed.rows
                    .filter((r) => !r.error)
                    .sort((a, b) => compareTowerNumbers(a.numero, b.numero));
            }, [routeModalProject]);

            const openNew = () => {
                setFormData({ ...baseProjectForm, dataCadastro: new Date().toISOString().split('T')[0] });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            const openEdit = (p) => {
                const reportConfig = getProjectReportConfig(p);
                setFormData({
                    ...baseProjectForm,
                    ...p,
                    periodicidadeRelatorio: reportConfig.periodicidadeRelatorio,
                    mesesEntregaRelatorio: reportConfig.mesesEntregaRelatorio,
                    anoBaseBienal: reportConfig.anoBaseBienal ?? '',
                    torresCoordenadas: Array.isArray(p.torresCoordenadas) ? p.torresCoordenadas : [],
                    linhaCoordenadas: Array.isArray(p.linhaCoordenadas) ? p.linhaCoordenadas : [],
                    linhaFonteKml: String(p.linhaFonteKml || '')
                });
                setIsEditing(true);
                setIsFormOpen(true);
            };

            const toggleMonth = (monthValue) => {
                const month = Number(monthValue);
                if (!Number.isInteger(month)) return;
                setFormData(prev => {
                    const current = normalizeReportMonths(prev.mesesEntregaRelatorio);
                    const exists = current.includes(month);
                    const nextMonths = exists
                        ? current.filter((m) => m !== month)
                        : [...current, month];
                    return {
                        ...prev,
                        mesesEntregaRelatorio: normalizeReportMonths(nextMonths)
                    };
                });
            };

            const toggleCreateFromKmlMonth = (monthValue) => {
                const month = Number(monthValue);
                if (!Number.isInteger(month)) return;
                setCreateFromKmlData(prev => {
                    const current = normalizeReportMonths(prev.mesesEntregaRelatorio);
                    const exists = current.includes(month);
                    const nextMonths = exists
                        ? current.filter((m) => m !== month)
                        : [...current, month];
                    return {
                        ...prev,
                        mesesEntregaRelatorio: normalizeReportMonths(nextMonths)
                    };
                });
            };

            const handleSave = async () => {
                if (!formData.id || !formData.nome) {
                    alert('Preencha ID e Nome');
                    return;
                }
                const periodicidadeRelatorio = normalizeReportPeriodicity(formData.periodicidadeRelatorio);
                const mesesEntregaRelatorio = normalizeReportMonths(formData.mesesEntregaRelatorio);
                const anoBaseBienal = periodicidadeRelatorio === 'Bienal'
                    ? Number(formData.anoBaseBienal)
                    : null;
                const scheduleValidation = validateReportSchedule({
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal
                });
                if (!scheduleValidation.ok) {
                    alert(scheduleValidation.message);
                    return;
                }
                const dataToSave = {
                    ...formData,
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal,
                    torresCoordenadas: Array.isArray(formData.torresCoordenadas) ? formData.torresCoordenadas : [],
                    linhaCoordenadas: Array.isArray(formData.linhaCoordenadas) ? formData.linhaCoordenadas : [],
                    linhaFonteKml: String(formData.linhaFonteKml || ''),
                    dataCadastro: formData.dataCadastro || new Date().toISOString().split('T')[0]
                };
                await saveToFirestore('projects', formData.id, dataToSave);
                setIsFormOpen(false);
            };

            const handleDelete = async (id) => {
                await deleteFromFirestore('projects', id);
                setConfirmDelete(null);
            };

            const closeKmlReview = () => {
                setKmlReviewOpen(false);
                setKmlRows([]);
                setKmlImportErrors([]);
                setKmlMeta(emptyKmlMeta);
                setKmlMergeSnapshot(emptyKmlMergeSnapshot);
                setApplyKmlMetadataOnMerge(false);
            };

            const parseKmlFile = async (file, mode, targetProject = null) => {
                if (!file) return;
                const text = await file.text();
                const parsed = parseKmlTowers(text);
                const parsedMeta = parsed?.meta || emptyKmlMeta;
                const baseId = String(file.name || 'PROJ').replace(/\.[^/.]+$/, '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12) || 'PROJ';
                if (mode === 'merge') {
                    if (targetProject) openEdit(targetProject);
                    const source = targetProject || formData || {};
                    setKmlMergeSnapshot({
                        id: String(source.id || ''),
                        nome: String(source.nome || ''),
                        extensao: String(source.extensao || ''),
                        torres: String(source.torres || '')
                    });
                } else {
                    setKmlMergeSnapshot(emptyKmlMergeSnapshot);
                }
                if (mode === 'create') {
                    setIsFormOpen(false);
                    setIsEditing(false);
                    setCreateFromKmlData({
                        ...baseCreateFromKml,
                        id: String(parsedMeta.sigla || baseId).toUpperCase(),
                        nome: String(parsedMeta.linhaNome || parsedMeta.nome || file.name || 'Empreendimento').replace(/\.[^/.]+$/, ''),
                        extensao: String(parsedMeta.extensao || ''),
                        torres: String(parsedMeta.torres ?? parsed.rows.length ?? '')
                    });
                }
                setKmlMeta(parsedMeta);
                setApplyKmlMetadataOnMerge(false);
                setKmlReviewMode(mode);
                setKmlRows(parsed.rows);
                setKmlImportErrors(parsed.errors || []);
                setKmlReviewOpen(true);
            };

            const handleMergeInputChange = async (e) => {
                const file = e.target.files?.[0];
                await parseKmlFile(file, 'merge', mergeTargetRef.current);
                e.target.value = '';
                mergeTargetRef.current = null;
            };

            const handleCreateInputChange = async (e) => {
                const file = e.target.files?.[0];
                await parseKmlFile(file, 'create', null);
                e.target.value = '';
            };

            const startMergeKml = (targetProject = null) => {
                mergeTargetRef.current = targetProject;
                mergeInputRef.current?.click();
            };

            const startCreateFromKml = () => {
                createInputRef.current?.click();
            };

            const updateKmlRow = (index, patch) => {
                setKmlRows((prev) => {
                    const next = [...prev];
                    next[index] = { ...next[index], ...patch };
                    return next;
                });
            };

            const removeKmlRow = (index) => {
                setKmlRows((prev) => prev.filter((_, idx) => idx !== index));
            };

            const applyKmlImport = async () => {
                if (reviewedKml.hasErrors) {
                    alert('Existem linhas inválidas no KML. Corrija ou remova antes de aplicar.');
                    return;
                }
                if (kmlReviewMode === 'merge') {
                    setFormData((prev) => {
                        const next = {
                            ...prev,
                            torresCoordenadas: mergeTowerCoordinates(prev.torresCoordenadas || [], reviewedKml.rows)
                        };
                        if (Array.isArray(kmlMeta.linhaCoordenadas) && kmlMeta.linhaCoordenadas.length > 0) {
                            next.linhaCoordenadas = kmlMeta.linhaCoordenadas;
                            next.linhaFonteKml = String(kmlMeta.linhaFonteKml || '');
                        }
                        if (applyKmlMetadataOnMerge) {
                            next.torres = String(kmlMeta.torres ?? reviewedKml.rows.length ?? '');
                            if (kmlMeta.extensao) next.extensao = String(kmlMeta.extensao);
                            if (kmlMeta.linhaNome || kmlMeta.nome) next.nome = String(kmlMeta.linhaNome || kmlMeta.nome);
                        }
                        return next;
                    });
                    closeKmlReview();
                    setIsFormOpen(true);
                    return;
                }

                if (!createFromKmlData.id || !createFromKmlData.nome) {
                    alert('Preencha ID e Nome para criar o empreendimento por KML.');
                    return;
                }
                if (projects.some((p) => p.id === createFromKmlData.id)) {
                    alert('Já existe um empreendimento com esse ID.');
                    return;
                }

                const periodicidadeRelatorio = normalizeReportPeriodicity(createFromKmlData.periodicidadeRelatorio);
                const mesesEntregaRelatorio = normalizeReportMonths(createFromKmlData.mesesEntregaRelatorio);
                const anoBaseBienal = periodicidadeRelatorio === 'Bienal'
                    ? Number(createFromKmlData.anoBaseBienal)
                    : null;
                const scheduleValidation = validateReportSchedule({
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal
                });
                if (!scheduleValidation.ok) {
                    alert(scheduleValidation.message);
                    return;
                }

                const payload = {
                    id: createFromKmlData.id,
                    nome: createFromKmlData.nome,
                    tipo: createFromKmlData.tipo,
                    tensao: createFromKmlData.tensao || '',
                    extensao: createFromKmlData.extensao || '',
                    torres: createFromKmlData.torres || String(reviewedKml.rows.length),
                    periodicidadeRelatorio,
                    mesesEntregaRelatorio,
                    anoBaseBienal,
                    torresCoordenadas: mergeTowerCoordinates([], reviewedKml.rows),
                    linhaCoordenadas: Array.isArray(kmlMeta.linhaCoordenadas) ? kmlMeta.linhaCoordenadas : [],
                    linhaFonteKml: String(kmlMeta.linhaFonteKml || ''),
                    dataCadastro: new Date().toISOString().split('T')[0]
                };

                await saveToFirestore('projects', payload.id, payload);
                setIsFormOpen(false);
                setIsEditing(false);
                closeKmlReview();
            };

            const openRoutePlanner = (project) => {
                setRouteModalProject(project);
                setRouteSelection([]);
            };

            const toggleRouteTower = (towerNumber) => {
                const id = String(towerNumber);
                setRouteSelection((prev) => prev.includes(id)
                    ? prev.filter((n) => n !== id)
                    : [...prev, id]
                );
            };

            const selectedRoutePoints = routeSelection
                .map((num) => routeProjectTowers.find((t) => String(t.numero) === String(num)))
                .filter(Boolean);

            const handleOpenRoute = () => {
                if (selectedRoutePoints.length < 2) {
                    alert('Selecione pelo menos 2 torres para traçar a rota.');
                    return;
                }
                const chunks = chunkRoutePoints(selectedRoutePoints, 8);
                chunks.forEach((chunk, idx) => {
                    const previousChunk = idx > 0 ? chunks[idx - 1] : null;
                    const previousLast = previousChunk?.[previousChunk.length - 1];
                    const opts = idx > 0 && previousLast
                        ? { origin: `${previousLast.latitude},${previousLast.longitude}` }
                        : {};
                    const url = buildGoogleMapsMultiStopUrl(chunk, opts);
                    if (!url) return;
                    setTimeout(() => window.open(url, '_blank'), idx * 250);
                });
                if (chunks.length > 1) {
                    alert(`A rota foi dividida em ${chunks.length} etapas por limite de waypoints do Google Maps.`);
                }
            };

            const exportProjectToKml = (project) => {
                const source = project || {};
                const toNumber = (value) => {
                    const num = Number(String(value ?? '').trim().replace(',', '.'));
                    return Number.isFinite(num) ? num : null;
                };
                const escapeXml = (value) => String(value ?? '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&apos;');
                const lineCoordinates = (Array.isArray(source.linhaCoordenadas) ? source.linhaCoordenadas : [])
                    .map((point) => {
                        const latitude = toNumber(point?.latitude);
                        const longitude = toNumber(point?.longitude);
                        const altitude = toNumber(point?.altitude);
                        if (latitude === null || longitude === null) return null;
                        if (latitude < -90 || latitude > 90 || longitude < -180 || longitude > 180) return null;
                        return { latitude, longitude, altitude: altitude === null ? 0 : altitude };
                    })
                    .filter(Boolean);
                const reviewedTowers = validateTowerCoordinatesAsString(source.torresCoordenadas || []).rows
                    .filter((row) => !row.error)
                    .sort((a, b) => compareTowerNumbers(a.numero, b.numero));

                if (lineCoordinates.length < 2 && reviewedTowers.length === 0) {
                    throw new Error('Este empreendimento não possui geometria suficiente para exportar KML.');
                }

                const projectTitle = escapeXml(source.nome || source.id || 'Empreendimento');
                const lineName = escapeXml(source.linhaFonteKml || `${source.nome || source.id || 'Linha'} C1`);
                const projectId = escapeXml(source.id || '');
                const linePlacemark = lineCoordinates.length >= 2
                    ? [
                        '    <Placemark>',
                        `      <name>${lineName}</name>`,
                        projectId ? `      <description>${projectId}</description>` : '',
                        '      <LineString>',
                        '        <coordinates>',
                        `          ${lineCoordinates.map((p) => `${p.longitude},${p.latitude},${p.altitude}`).join(' ')}`,
                        '        </coordinates>',
                        '      </LineString>',
                        '    </Placemark>'
                    ].filter(Boolean).join('\n')
                    : '';
                const towerPlacemarks = reviewedTowers
                    .map((tower) => {
                        const latitude = toNumber(tower.latitude);
                        const longitude = toNumber(tower.longitude);
                        if (latitude === null || longitude === null) return '';
                        return [
                            '    <Placemark>',
                            `      <name>${escapeXml(`Torre ${tower.numero}`)}</name>`,
                            '      <Point>',
                            `        <coordinates>${longitude},${latitude},0</coordinates>`,
                            '      </Point>',
                            '    </Placemark>'
                        ].join('\n');
                    })
                    .filter(Boolean)
                    .join('\n');
                return [
                    '<?xml version="1.0" encoding="UTF-8"?>',
                    '<kml xmlns="http://www.opengis.net/kml/2.2">',
                    '  <Document>',
                    `    <name>${projectTitle}</name>`,
                    linePlacemark,
                    towerPlacemarks,
                    '  </Document>',
                    '</kml>'
                ].filter(Boolean).join('\n');
            };

            const handleExportProjectKml = (project) => {
                try {
                    const kml = exportProjectToKml(project);
                    const safeId = String(project?.id || 'empreendimento')
                        .toUpperCase()
                        .replace(/[^A-Z0-9_-]/g, '')
                        .slice(0, 40) || 'EMPREENDIMENTO';
                    const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `${safeId}.kml`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                } catch (e) {
                    alert(e.message || 'Erro ao exportar KML.');
                }
            };

            return (
                <div className="space-y-6">
                    <input ref={mergeInputRef} type="file" accept=".kml,application/vnd.google-earth.kml+xml" className="hidden" onChange={handleMergeInputChange} />
                    <input ref={createInputRef} type="file" accept=".kml,application/vnd.google-earth.kml+xml" className="hidden" onChange={handleCreateInputChange} />

                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800">Empreendimentos</h2>
                        <div className="flex gap-2">
                            <button onClick={openNew} className="bg-blue-600 text-white px-4 py-2 rounded-md flex items-center gap-2 hover:bg-blue-700">
                                <Plus /> Novo
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filtered.map(p => {
                            const stats = getProjectInspectionStats(p.id, inspections);
                            const reportConfig = getProjectReportConfig(p);
                            const gpsCount = validateTowerCoordinatesAsString(p.torresCoordenadas || []).rows.filter((r) => !r.error).length;
                            const lineCount = Array.isArray(p.linhaCoordenadas) ? p.linhaCoordenadas.length : 0;
                            const hasKmlData = gpsCount > 0;
                            const hasExportGeometry = gpsCount > 0 || lineCount >= 2;
                            return (
                                <div key={p.id} className="bg-white rounded-xl shadow-sm border p-5 hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="font-bold text-lg text-slate-800">{p.nome || p.id}</h3>
                                            <p className="text-xs text-slate-500">Código: {p.id}</p>
                                            <p className="text-xs text-slate-500">{p.dataCadastro || 'S/D'}</p>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => openEdit(p)} className="p-2 rounded-lg bg-slate-100 hover:bg-blue-50 text-blue-600">
                                                <Edit />
                                            </button>
                                            <button onClick={() => setConfirmDelete(p.id)} className="p-2 rounded-lg bg-slate-100 hover:bg-red-50 text-red-600">
                                                <Trash2 />
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap gap-2 text-xs text-slate-500 mb-3">
                                        <span className="px-2 py-1 bg-slate-100 rounded">{p.tipo}</span>
                                        {p.tensao && <span className="px-2 py-1 bg-blue-50 text-blue-700 rounded">{p.tensao} kV</span>}
                                        {p.extensao && <span className="px-2 py-1 bg-green-50 text-green-700 rounded">{p.extensao} km</span>}
                                    </div>

                                    <div className="text-xs text-slate-600 space-y-1 mb-4">
                                        <div><strong>Vistorias:</strong> {stats.count}</div>
                                        <div><strong>Tempo de vistoria:</strong> {stats.spanDays ? `${stats.spanDays} dia(s)` : 'S/D'}</div>
                                        <div><strong>Dias efetivamente vistoriados:</strong> {stats.visitedDays}</div>
                                        <div><strong>Torres com GPS:</strong> {gpsCount}</div>
                                        <div><strong>Periodicidade:</strong> {reportConfig.periodicidadeRelatorio}</div>
                                        <div><strong>Meses de entrega:</strong> {formatReportMonths(reportConfig.mesesEntregaRelatorio)}</div>
                                        {reportConfig.periodicidadeRelatorio === 'Bienal' && (
                                            <div><strong>Ano base (bienal):</strong> {reportConfig.anoBaseBienal || 'Não definido'}</div>
                                        )}
                                    </div>

                                    <div className={`grid gap-2 ${hasKmlData ? 'grid-cols-2 mb-2' : 'grid-cols-1'}`}>
                                        <button
                                            onClick={() => onOpenProjectInspections?.(p.id)}
                                            className="text-sm px-3 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700"
                                        >
                                            Vistorias
                                        </button>
                                        {hasKmlData && (
                                            <button
                                                onClick={() => openRoutePlanner(p)}
                                                className="text-sm px-3 py-2 rounded-lg bg-emerald-50 hover:bg-emerald-100 text-emerald-700"
                                            >
                                                Traçar rota
                                            </button>
                                        )}
                                    </div>
                                    {!hasKmlData && (
                                        <button
                                            onClick={() => startMergeKml(p)}
                                            className="w-full mt-2 text-xs px-3 py-2 rounded-lg bg-blue-50 hover:bg-blue-100 text-blue-700 flex items-center justify-center gap-1"
