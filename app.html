                            <div className="flex gap-2">
                                <button className="flex-1 bg-slate-100 text-slate-700 py-2 rounded text-sm hover:bg-slate-200" onClick={handleExportCsv}>Exportar CSV</button>
                                <button className="flex-1 bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700" onClick={handleExportPdf}>Exportar PDF</button>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filtered.map(e => {
                            const projeto = projects.find(p => p.id === e.projetoId);
                            const vistoria = inspections.find(v => v.id === e.vistoriaId);
                            const hasCoordinates = e.latitude && e.longitude;
                            return (
                                <div key={e.id} className="bg-white rounded-xl shadow-sm border p-5 hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex-1">
                                            <h3 className="font-bold text-slate-800 mb-1">{e.id}</h3>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded">{e.projetoId}</span>
                                                {String(e.torreRef ?? '').trim() && (
                                                    <span className="px-2 py-1 bg-slate-100 text-slate-700 text-xs rounded">
                                                        {formatTowerLabel(e.torreRef)}
                                                    </span>
                                                )}
                                                <span className={`px-2 py-1 rounded-full text-xs font-bold ${
                                                    e.impacto === 'Muito Alto' ? 'bg-red-100 text-red-700' :
                                                    e.impacto === 'Alto' ? 'bg-orange-100 text-orange-700' :
                                                    e.impacto === 'Médio' ? 'bg-yellow-100 text-yellow-700' :
                                                    'bg-green-100 text-green-700'
                                                }`}>
                                                    {e.impacto}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-2 text-sm text-slate-600 mb-4">
                                        {projeto && (
                                            <div className="flex items-center gap-2 text-slate-500 text-xs">
                                                <MapIcon className="w-3 h-3" />
                                                {projeto.nome}
                                            </div>
                                        )}
                                        {e.tipo && <div><strong>Tipo:</strong> {e.tipo}</div>}
                                        {e.estagio && <div><strong>Estágio:</strong> {e.estagio}</div>}
                                        {e.localTipo && <div><strong>Local:</strong> {e.localTipo}</div>}
                                        {e.localTipo === 'Outros' && e.localDescricao && <div><strong>Detalhe local:</strong> {e.localDescricao}</div>}
                                        {vistoria && (
                                            <div className="text-xs text-slate-500 mt-2">
                                                <ClipboardList className="w-3 h-3 inline mr-1" />
                                                Vistoria: {vistoria.id}
                                            </div>
                                        )}
                                        {e.status && (
                                            <div className="mt-2 pt-2 border-t border-slate-200">
                                                <span className={`text-xs px-2 py-1 rounded ${
                                                    e.status === 'Ativo' ? 'bg-red-100 text-red-700' :
                                                    e.status === 'Monitoramento' ? 'bg-yellow-100 text-yellow-700' :
                                                    'bg-green-100 text-green-700'
                                                }`}>
                                                    {e.status}
                                                </span>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-1 pt-3 border-t">
                                        <button onClick={() => setDetailsModal(e)} className="p-2 rounded-lg bg-slate-100 hover:bg-green-50 text-green-600" title="Ver detalhes">
                                            <Eye />
                                        </button>
                                        {hasCoordinates && (
                                            <button onClick={() => openGoogleMapsRoute(e.latitude, e.longitude)} className="p-2 rounded-lg bg-green-50 hover:bg-green-100 text-green-600 transition-colors" title="Navegar no Google Maps">
                                                <Navigation />
                                            </button>
                                        )}
                                        <button onClick={() => openEdit(e)} className="p-2 rounded-lg bg-slate-100 hover:bg-blue-50 text-blue-600">
                                            <Edit />
                                        </button>
                                        <button onClick={() => setConfirmDelete(e.id)} className="p-2 rounded-lg bg-slate-100 hover:bg-red-50 text-red-600">
                                            <Trash2 />
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                        {filtered.length === 0 && (
                            <p className="text-slate-400 col-span-3 text-center py-10">
                                Nenhuma erosão encontrada.
                            </p>
                        )}
                    </div>

                    {detailsModal && (
                        <ErosionDetailsModal 
                            erosion={detailsModal} 
                            project={projects.find(p => p.id === detailsModal.projetoId)} 
                            inspection={inspections.find(i => i.id === detailsModal.vistoriaId)} 
                            onClose={() => setDetailsModal(null)} 
                            openGoogleMapsRoute={openGoogleMapsRoute} 
                        />
                    )}

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 overflow-y-auto">
                            <div className="bg-white p-6 rounded-xl w-full max-w-3xl shadow-2xl my-8">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-lg font-bold">{isEditing ? 'Editar' : 'Nova'} Erosão</h3>
                                    <button onClick={() => setIsFormOpen(false)}><X /></button>
                                </div>

                                <div className="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">ID</label>
                                            <input className="w-full border p-2 rounded text-sm bg-slate-50" value={formData.id} disabled />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Empreendimento *</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.projetoId} onChange={(e) => setFormData({...formData, projetoId: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                {projects.map(p => (
                                                    <option key={p.id} value={p.id}>{p.id}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Vistoria</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.vistoriaId} onChange={(e) => setFormData({...formData, vistoriaId: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                {inspections.filter(i => i.projetoId === formData.projetoId).map(i => (
                                                    <option key={i.id} value={i.id}>{i.id}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Torre Ref.</label>
                                            <input className="w-full border p-2 rounded text-sm" value={formData.torreRef} onChange={(e) => setFormData({...formData, torreRef: e.target.value})} placeholder="Ex: T-123" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Local da erosão *</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.localTipo || ''} onChange={(e) => setFormData({...formData, localTipo: e.target.value, localDescricao: e.target.value === 'Outros' ? (formData.localDescricao || '') : ''})}>
                                                <option value="">Selecione...</option>
                                                {EROSION_LOCATION_OPTIONS.map((option) => (
                                                    <option key={option} value={option}>{option}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Detalhe do local</label>
                                            <input
                                                className="w-full border p-2 rounded text-sm"
                                                value={formData.localDescricao || ''}
                                                onChange={(e) => setFormData({...formData, localDescricao: e.target.value})}
                                                placeholder={formData.localTipo === 'Outros' ? 'Obrigatório para Outros' : 'Opcional'}
                                                disabled={formData.localTipo !== 'Outros'}
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Tipo</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.tipo} onChange={(e) => setFormData({...formData, tipo: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                <option value="sulco">Sulco</option>
                                                <option value="ravina">Ravina</option>
                                                <option value="voçoroca">Voçoroca</option>
                                                <option value="deslizamento">Deslizamento</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Estágio</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.estagio} onChange={(e) => setFormData({...formData, estagio: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                <option value="inicial">Inicial</option>
                                                <option value="intermediario">Intermediário</option>
                                                <option value="avancado">Avançado</option>
                                                <option value="critico">Crítico</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Profundidade (m)</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.profundidade} onChange={(e) => setFormData({...formData, profundidade: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                <option value="<0.5">&lt; 0.5m</option>
                                                <option value="0.5-1.5">0.5 - 1.5m</option>
                                                <option value="1.5-3.0">1.5 - 3.0m</option>
                                                <option value=">3.0">&gt; 3.0m</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Declividade (°)</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.declividade} onChange={(e) => setFormData({...formData, declividade: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                <option value="<15">&lt; 15°</option>
                                                <option value="15-30">15 - 30°</option>
                                                <option value="30-45">30 - 45°</option>
                                                <option value=">45">&gt; 45°</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Largura (m)</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.largura} onChange={(e) => setFormData({...formData, largura: e.target.value})}>
                                                <option value="">Selecione...</option>
                                                <option value="<1">&lt; 1m</option>
                                                <option value="1-3">1 - 3m</option>
                                                <option value="3-5">3 - 5m</option>
                                                <option value=">5">&gt; 5m</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1 flex items-center gap-1">
                                                <MapPin className="w-3 h-3" /> Latitude
                                            </label>
                                            <input type="number" step="0.000001" className="w-full border p-2 rounded text-sm" value={formData.latitude} onChange={(e) => setFormData({...formData, latitude: e.target.value})} placeholder="-23.550520" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1 flex items-center gap-1">
                                                <MapPin className="w-3 h-3" /> Longitude
                                            </label>
                                            <input type="number" step="0.000001" className="w-full border p-2 rounded text-sm" value={formData.longitude} onChange={(e) => setFormData({...formData, longitude: e.target.value})} placeholder="-46.633308" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-700 mb-1">Status</label>
                                            <select className="w-full border p-2 rounded text-sm" value={formData.status} onChange={(e) => setFormData({...formData, status: e.target.value})}>
                                                <option value="Ativo">Ativo</option>
                                                <option value="Monitorado">Monitorado</option>
                                                <option value="Resolvido">Resolvido</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-medium text-slate-700 mb-1">Observações</label>
                                        <textarea className="w-full border p-2 rounded text-sm" rows="3" value={formData.obs || ''} onChange={(e) => setFormData({...formData, obs: e.target.value})} placeholder="Observações sobre a erosão..." />
                                    </div>

                                    {(formData.tipo || formData.estagio || formData.profundidade || formData.declividade || formData.largura) && (
                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                            <div className="text-xs font-semibold text-blue-900 uppercase mb-2">Cálculo Automático de Criticidade</div>
                                            <div className="text-sm text-blue-800">
                                                {(() => {
                                                    const calc = calculateCriticality(formData, rulesConfig);
                                                    return (
                                                        <div className="space-y-1">
                                                            <div><strong>Impacto:</strong> {calc.impacto}</div>
                                                            <div><strong>Score:</strong> {calc.score}</div>
                                                            <div><strong>Frequência de Revisita:</strong> {calc.frequencia}</div>
                                                            <div><strong>Intervenção Sugerida:</strong> {calc.intervencao}</div>
                                                        </div>
                                                    );
                                                })()}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-2 pt-4 border-t mt-4">
                                    <button onClick={handleSave} className="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700 flex items-center justify-center gap-2">
                                        <Save /> Salvar
                                    </button>
                                    <button onClick={() => setIsFormOpen(false)} className="px-4 bg-slate-100 text-slate-700 py-2 rounded hover:bg-slate-200">
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmDelete && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white p-6 rounded-xl shadow-2xl max-w-md">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-red-600">
                                    <AlertTriangle /> Confirmar Exclusão
                                </h3>
                                <p className="text-slate-600 mb-6">
                                    Tem a certeza que deseja excluir a erosão <strong>{confirmDelete}</strong>?
                                </p>
                                <div className="flex gap-2">
                                    <button onClick={() => handleDelete(confirmDelete)} className="flex-1 bg-red-600 text-white py-2 rounded hover:bg-red-700">
                                        Excluir
                                    </button>
                                    <button onClick={() => setConfirmDelete(null)} className="flex-1 bg-slate-100 text-slate-700 py-2 rounded hover:bg-slate-200">
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ErosionDetailsModal({ erosion, project, inspection, onClose, openGoogleMapsRoute }) {
            const hasCoordinates = erosion.latitude && erosion.longitude;
            
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl w-full max-w-4xl shadow-2xl max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-white border-b p-6 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <Eye /> Detalhes da Erosão
                            </h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                <X />
                            </button>
                        </div>

                        <div className="p-6 space-y-6">
                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-slate-50 p-4 rounded-lg">
                                    <div className="text-xs font-semibold text-slate-500 uppercase mb-1">ID Erosão</div>
                                    <div className="text-lg font-bold text-slate-800">{erosion.id}</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-lg">
                                    <div className="text-xs font-semibold text-slate-500 uppercase mb-1">Empreendimento</div>
                                    <div className="text-lg font-bold text-slate-800">{erosion.projetoId}</div>
                                    {project && <div className="text-sm text-slate-600 mt-1">{project.nome}</div>}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-slate-50 p-4 rounded-lg">
                                    <div className="text-xs font-semibold text-slate-500 uppercase mb-1">Torre</div>
                                    <div className="text-lg font-bold text-slate-800">{formatTowerLabel(erosion.torreRef)}</div>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-lg">
                                    <div className="text-xs font-semibold text-slate-500 uppercase mb-1">Nível de Impacto</div>
                                    <span className={`inline-block px-3 py-1.5 rounded-full text-sm font-bold ${
                                        erosion.impacto === 'Muito Alto' ? 'bg-red-100 text-red-700' :
                                        erosion.impacto === 'Alto' ? 'bg-orange-100 text-orange-700' :
                                        erosion.impacto === 'Médio' ? 'bg-yellow-100 text-yellow-700' :
                                        'bg-green-100 text-green-700'
                                    }`}>
                                        {erosion.impacto}
                                    </span>
                                </div>
                            </div>

                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <h4 className="font-semibold text-blue-900 mb-3">Características Físicas</h4>
                                <div className="grid grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <div className="text-blue-700 font-medium">Tipo</div>
                                        <div className="text-blue-900">{erosion.tipo || 'Não informado'}</div>
                                    </div>
                                    <div>
                                        <div className="text-blue-700 font-medium">Estágio</div>
                                        <div className="text-blue-900">{erosion.estagio || 'Não informado'}</div>
                                    </div>
                                    <div>
                                        <div className="text-blue-700 font-medium">Profundidade</div>
                                        <div className="text-blue-900">{erosion.profundidade || 'Não informado'}</div>
                                    </div>
                                    <div>
                                        <div className="text-blue-700 font-medium">Largura</div>
                                        <div className="text-blue-900">{erosion.largura || 'Não informado'}</div>
                                    </div>
                                    <div>
                                        <div className="text-blue-700 font-medium">Declividade</div>
                                        <div className="text-blue-900">{erosion.declividade || 'Não informado'}</div>
                                    </div>
                                    <div>
                                        <div className="text-blue-700 font-medium">Status</div>
                                        <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${
                                            erosion.status === 'Ativo' ? 'bg-green-100 text-green-700' :
                                            erosion.status === 'Monitorado' ? 'bg-yellow-100 text-yellow-700' :
                                            'bg-slate-100 text-slate-700'
                                        }`}>
                                            {erosion.status}
                                        </span>
                                    </div>
                                    <div>
                                        <div className="text-blue-700 font-medium">Local da erosão</div>
                                        <div className="text-blue-900">{erosion.localTipo || 'Não informado'}</div>
                                    </div>
                                    {erosion.localTipo === 'Outros' && (
                                        <div>
                                            <div className="text-blue-700 font-medium">Detalhe do local</div>
                                            <div className="text-blue-900">{erosion.localDescricao || 'Não informado'}</div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-orange-50 border border-orange-200 rounded-lg p-4">
                                <h4 className="font-semibold text-orange-900 mb-3 flex items-center gap-2">
                                    <AlertTriangle className="w-4 h-4" />
                                    Análise de Criticidade
                                </h4>
                                <div className="grid grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <div className="text-orange-700 font-medium">Score de Risco</div>
                                        <div className="text-2xl font-bold text-orange-900">{erosion.score || 'N/A'}</div>
                                    </div>
                                    <div>
                                        <div className="text-orange-700 font-medium">Frequência de Revisita</div>
                                        <div className="text-orange-900">{erosion.frequencia || 'Não definida'}</div>
                                    </div>
                                    <div className="col-span-2">
                                        <div className="text-orange-700 font-medium mb-1">Intervenção Recomendada</div>
                                        <div className="text-orange-900 font-semibold">{erosion.intervencao || 'Não definida'}</div>
                                    </div>
                                </div>
                            </div>

                            {hasCoordinates && (
                                <div className="bg-green-50 border border-green-200 rounded-lg p-4">
                                    <h4 className="font-semibold text-green-900 mb-3 flex items-center gap-2">
                                        <MapPin className="w-4 h-4" />
                                        Localização Geográfica
                                    </h4>
                                    <div className="flex items-center justify-between">
                                        <div className="text-sm">
                                            <div className="text-green-700 font-medium mb-1">Coordenadas</div>
                                            <div className="text-green-900 font-mono">{formatCoordinates(erosion.latitude, erosion.longitude)}</div>
                                            <div className="text-xs text-green-600 mt-1">
                                                Lat: {erosion.latitude}, Long: {erosion.longitude}
                                            </div>
                                        </div>
                                        <button
                                            onClick={() => openGoogleMapsRoute(erosion.latitude, erosion.longitude)}
                                            className="flex items-center gap-2 px-4 py-2.5 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium transition-colors"
                                        >
                                            <Navigation className="w-4 h-4" />
                                            Traçar Rota
                                        </button>
                                    </div>
                                </div>
                            )}

                            {inspection && (
                                <div className="bg-purple-50 border border-purple-200 rounded-lg p-4">
                                    <h4 className="font-semibold text-purple-900 mb-2 flex items-center gap-2">
                                        <ClipboardList className="w-4 h-4" />
                                        Vistoria Associada
                                    </h4>
                                    <div className="text-sm text-purple-800">
                                        <div><strong>ID:</strong> {inspection.id}</div>
                                        <div><strong>Período:</strong> {inspection.dataInicio} até {inspection.dataFim || 'Em andamento'}</div>
                                        {inspection.responsavel && <div><strong>Responsável:</strong> {inspection.responsavel}</div>}
                                    </div>
                                </div>
                            )}

                            {erosion.obs && (
                                <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
                                    <h4 className="font-semibold text-slate-800 mb-2">Observações</h4>
                                    <p className="text-sm text-slate-600 whitespace-pre-wrap">{erosion.obs}</p>
                                </div>
                            )}

                            <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
                                <h4 className="font-semibold text-slate-800 mb-2">Histórico de acompanhamento</h4>
                                <div className="space-y-2">
                                    {normalizeFollowupHistory(erosion.acompanhamentosResumo)
                                        .slice()
                                        .sort((a, b) => String(b.timestamp || '').localeCompare(String(a.timestamp || '')))
                                        .map((item, idx) => (
                                            <div key={`${item.timestamp}-${idx}`} className="rounded border border-slate-200 bg-white p-2 text-sm">

        function UsersView({ users, searchTerm, saveToFirestore, deleteFromFirestore, canApproveUsers }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState({ id: '', nome: '', email: '', cargo: '', departamento: '', telefone: '', perfil: 'Utilizador', status: 'Ativo' });
            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);

            const filtered = users.filter(u => {
                const t = searchTerm.toLowerCase();
                if (!t) return true;
                return String(u.nome || '').toLowerCase().includes(t) ||
                       String(u.email || '').toLowerCase().includes(t) ||
                       String(u.cargo || '').toLowerCase().includes(t) ||
                       normalizeUserStatus(u.status).toLowerCase().includes(t);
            });

            const openNew = () => {
                setFormData({ id: '', nome: '', email: '', cargo: '', departamento: '', telefone: '', perfil: 'Utilizador', status: 'Pendente', dataCadastro: new Date().toISOString().split('T')[0] });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            const openEdit = (u) => {
                setFormData({ ...u, status: normalizeUserStatus(u.status) });
                setIsEditing(true);
                setIsFormOpen(true);
            };

            const handleSave = async () => {
                if (!formData.id || !formData.nome || !formData.email) {
                    alert('Preencha UID, Nome e Email');
                    return;
                }
                const uid = String(formData.id).trim();
                if (!uid) {
                    alert('UID inválido.');
                    return;
                }
                const dataToSave = {
                    ...formData,
                    id: uid,
                    status: normalizeUserStatus(formData.status),
                    dataCadastro: formData.dataCadastro || new Date().toISOString().split('T')[0]
                };
                await saveToFirestore('users', uid, dataToSave);
                setIsFormOpen(false);
            };

            const handleDelete = async (id) => {
                await deleteFromFirestore('users', id);
                setConfirmDelete(null);
            };

            const handleApproveUser = async (uid) => {
                const user = users.find(u => u.id === uid);
                if (!user) return;
                await saveToFirestore('users', uid, { ...user, status: 'Ativo' });
            };

            const handleRejectUser = async (uid) => {
                const user = users.find(u => u.id === uid);
                if (!user) return;
                await saveToFirestore('users', uid, { ...user, status: 'Inativo' });
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <Users /> Utilizadores
                        </h2>
                        <button onClick={openNew} className="bg-blue-600 text-white px-4 py-2 rounded-md flex items-center gap-2 hover:bg-blue-700">
                            <UserPlus /> Novo Utilizador
                        </button>
                    </div>

                    <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-slate-50 text-slate-600 text-xs uppercase tracking-wider">
                                    <tr>
                                        <th className="p-4 text-left font-semibold">Nome</th>
                                        <th className="p-4 text-left font-semibold">Email</th>
                                        <th className="p-4 text-left font-semibold">Cargo</th>
                                        <th className="p-4 text-left font-semibold">Departamento</th>
                                        <th className="p-4 text-left font-semibold">Perfil</th>
                                        <th className="p-4 text-left font-semibold">Status</th>
                                        <th className="p-4 text-center font-semibold">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {filtered.map(u => (
                                        <tr key={u.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
                                                        {u.nome?.charAt(0)?.toUpperCase() || 'U'}
                                                    </div>
                                                    <div>
                                                        <div className="font-semibold text-slate-800">{u.nome}</div>
                                                        <div className="text-xs text-slate-500">{u.id}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex items-center gap-2 text-slate-700">
                                                    <Mail className="w-4 h-4 text-slate-400" />
                                                    {u.email}
                                                </div>
                                            </td>
                                            <td className="p-4 text-slate-700">{u.cargo || '-'}</td>
                                            <td className="p-4 text-slate-700">{u.departamento || '-'}</td>
                                            <td className="p-4">
                                                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold flex items-center gap-1 w-fit ${
                                                    u.perfil === 'Administrador' ? 'bg-purple-100 text-purple-700' :
                                                    u.perfil === 'Gerente' ? 'bg-blue-100 text-blue-700' :
                                                    'bg-slate-100 text-slate-700'
                                                }`}>
                                                    {u.perfil === 'Administrador' && <Shield className="w-3 h-3" />}
                                                    {u.perfil}
                                                </span>
                                            </td>
                                            <td className="p-4">
                                                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold ${
                                                    normalizeUserStatus(u.status) === 'Ativo' ? 'bg-green-100 text-green-700' :
                                                    normalizeUserStatus(u.status) === 'Pendente' ? 'bg-yellow-100 text-yellow-700' :
                                                    'bg-red-100 text-red-700'
                                                }`}>
                                                    {normalizeUserStatus(u.status)}
                                                </span>
                                            </td>
                                            <td className="p-4">
                                                <div className="flex gap-1 justify-center">
                                                    {canApproveUsers && normalizeUserStatus(u.status) === 'Pendente' && (
                                                        <>
                                                            <button onClick={() => handleApproveUser(u.id)} className="p-2 rounded-lg bg-green-100 hover:bg-green-200 text-green-700 transition-colors" title="Aprovar usuário">
                                                                <Save />
                                                            </button>
                                                            <button onClick={() => handleRejectUser(u.id)} className="p-2 rounded-lg bg-yellow-100 hover:bg-yellow-200 text-yellow-700 transition-colors" title="Rejeitar usuário">
                                                                <X />
                                                            </button>
                                                        </>
                                                    )}
                                                    <button onClick={() => openEdit(u)} className="p-2 rounded-lg bg-slate-100 hover:bg-blue-50 text-blue-600 transition-colors">
                                                        <Edit />
                                                    </button>
                                                    <button onClick={() => setConfirmDelete(u.id)} className="p-2 rounded-lg bg-slate-100 hover:bg-red-50 text-red-600 transition-colors">
                                                        <Trash2 />
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {filtered.length === 0 && (
                                        <tr>
                                            <td colSpan="7" className="p-12 text-center text-slate-400">
                                                <Users className="w-12 h-12 mx-auto mb-3 opacity-30" />
                                                <div className="text-sm">Nenhum utilizador encontrado.</div>
                                                <button onClick={openNew} className="mt-4 text-blue-600 hover:text-blue-700 text-sm font-medium">
                                                    + Adicionar primeiro utilizador
                                                </button>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl w-full max-w-3xl shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="sticky top-0 bg-white border-b p-6 flex justify-between items-center">
                                    <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        {isEditing ? <Edit /> : <UserPlus />}
                                        {isEditing ? 'Editar' : 'Novo'} Utilizador
                                    </h3>
                                    <button onClick={() => setIsFormOpen(false)} className="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                        <X />
                                    </button>
                                </div>

                                <div className="p-6 space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2">UID do Utilizador</label>
                                            <input
                                                className={`w-full border border-slate-300 p-2.5 rounded-lg text-sm ${isEditing ? 'bg-slate-50' : ''}`}
                                                value={formData.id}
                                                onChange={(e) => setFormData({...formData, id: e.target.value.trim()})}
                                                disabled={isEditing}
                                                placeholder="UID do Firebase Auth"
                                            />
                                            {!isEditing && (
                                                <p className="text-xs text-slate-500 mt-1">Use o UID do utilizador já criado no Firebase Authentication.</p>
                                            )}
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2">Status</label>
                                            <select
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                                value={formData.status}
                                                onChange={(e) => setFormData({...formData, status: e.target.value})}
                                                disabled={!canApproveUsers}
                                            >
                                                <option value="Pendente">Pendente</option>
                                                <option value="Ativo">Ativo</option>
                                                <option value="Inativo">Inativo</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2">Nome Completo *</label>
                                            <input
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                                value={formData.nome}
                                                onChange={(e) => setFormData({...formData, nome: e.target.value})}
                                                placeholder="Nome completo"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2 flex items-center gap-1">
                                                <Mail className="w-3 h-3" /> Email *
                                            </label>
                                            <input
                                                type="email"
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                                value={formData.email}
                                                onChange={(e) => setFormData({...formData, email: e.target.value})}
                                                placeholder="usuario@empresa.com"
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2">Cargo</label>
                                            <input
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                                value={formData.cargo}
                                                onChange={(e) => setFormData({...formData, cargo: e.target.value})}
                                                placeholder="Ex: Engenheiro"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2">Departamento</label>
                                            <input
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                                value={formData.departamento}
                                                onChange={(e) => setFormData({...formData, departamento: e.target.value})}
                                                placeholder="Ex: Geotecnia"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-700 mb-2 flex items-center gap-1">
                                                <Phone className="w-3 h-3" /> Telefone
                                            </label>
                                            <input
                                                type="tel"
                                                className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                                value={formData.telefone}
                                                onChange={(e) => {
                                                    const formatted = formatPhone(e.target.value);
                                                    setFormData({...formData, telefone: formatted});
                                                }}
                                                placeholder="(00) 00000-0000"
                                                maxLength="15"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-semibold text-slate-700 mb-2 flex items-center gap-1">
                                            <Shield className="w-3 h-3" /> Perfil de Acesso
                                        </label>
                                        <select
                                            className="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                                            value={formData.perfil}
                                            onChange={(e) => setFormData({...formData, perfil: e.target.value})}
                                            disabled={!canApproveUsers}
                                        >
                                            <option value="Utilizador">Utilizador - Visualização e criação de registos</option>
                                            <option value="Gerente">Gerente - Edição e aprovação</option>
                                            <option value="Administrador">Administrador - Acesso total</option>
                                        </select>
                                        <p className="text-xs text-slate-500 mt-2">
                                            {formData.perfil === 'Administrador' && '✓ Acesso completo ao sistema'}
                                            {formData.perfil === 'Gerente' && '✓ Pode editar e aprovar alterações'}
                                            {formData.perfil === 'Utilizador' && '✓ Pode visualizar e criar novos registos'}
                                        </p>
                                    </div>

                                    <div className="flex gap-3 pt-4 border-t">
                                        <button onClick={handleSave} className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2 font-semibold transition-colors">
                                            <Save /> Salvar Utilizador
                                        </button>
                                        <button onClick={() => setIsFormOpen(false)} className="px-6 bg-slate-100 text-slate-700 py-3 rounded-lg hover:bg-slate-200 font-semibold transition-colors">
                                            Cancelar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmDelete && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl max-w-md w-full">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-red-600">
                                    <AlertTriangle /> Confirmar Exclusão
                                </h3>
                                <p className="text-slate-600 mb-6">
                                    Tem a certeza que deseja excluir o utilizador <strong>{users.find(u => u.id === confirmDelete)?.nome}</strong>?
                                    <br /><span className="text-sm text-slate-500 mt-2 block">Esta ação não pode ser desfeita.</span>
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => handleDelete(confirmDelete)} className="flex-1 bg-red-600 text-white py-2.5 rounded-lg hover:bg-red-700 font-semibold transition-colors">
                                        Excluir
                                    </button>
                                    <button onClick={() => setConfirmDelete(null)} className="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-lg hover:bg-slate-200 font-semibold transition-colors">
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

                                </div>
                                <p className="text-xs text-blue-600 mt-2">
                                    Para alterar o seu perfil de acesso, entre em contacto com um administrador.
                                </p>
                            </div>

                            <div className="flex gap-3 pt-4 border-t">
                                <button onClick={handleSave} className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2 font-semibold transition-colors">
                                    <Save /> Salvar Alterações
                                </button>
                                <button onClick={onClose} className="px-6 bg-slate-100 text-slate-700 py-3 rounded-lg hover:bg-slate-200 font-semibold transition-colors">
                                    Cancelar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function RulesView({ rulesConfig, saveRulesConfig }) {
            const [selectedCriterio, setSelectedCriterio] = useState('tipo');
            const [draftRules, setDraftRules] = useState(() => normalizeRulesConfig(rulesConfig));
            const [saving, setSaving] = useState(false);

            const criterios = {
                tipo: ['sulco', 'ravina', 'voçoroca', 'deslizamento'],
                estagio: ['inicial', 'intermediario', 'avancado', 'critico'],
                profundidade: ['<0.5', '0.5-1.5', '1.5-3.0', '>3.0'],
                declividade: ['<15', '15-30', '30-45', '>45'],
                largura: ['<1', '1-3', '3-5', '>5']
            };

            useEffect(() => {
                setDraftRules(normalizeRulesConfig(rulesConfig));
            }, [rulesConfig]);

            const patchRule = (key, patch) => {
                setDraftRules(prev => ({
                    ...prev,
                    [key]: {
                        ...(prev[key] || {}),
                        ...patch
                    }
                }));
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    await saveRulesConfig(draftRules);
                } finally {
                    setSaving(false);
                }
            };

            const handleResetDefault = () => {
                setDraftRules(normalizeRulesConfig(RULES_DATABASE));
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                <Scale /> Regras de Negócio
                            </h2>
                            <p className="text-slate-500 mt-1">
                                Matriz de mapeamento de critérios para avaliação de erosões (Princípio do Pior Caso).
                            </p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleResetDefault} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 text-sm font-medium">
                                Restaurar padrão
                            </button>
                            <button onClick={handleSave} disabled={saving} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-60 text-sm font-medium">
                                {saving ? 'Salvando...' : 'Salvar alterações'}
                            </button>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                        <h3 className="font-semibold text-lg mb-4">Matriz de Critérios</h3>

                        <div className="flex gap-2 mb-4 overflow-x-auto">
                            {Object.keys(criterios).map(c => (
                                <button
                                    key={c}
                                    onClick={() => setSelectedCriterio(c)}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${
                                        selectedCriterio === c
                                            ? 'bg-blue-600 text-white'
                                            : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                    }`}
                                >
                                    {c.charAt(0).toUpperCase() + c.slice(1)}
                                </button>
                            ))}
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-slate-50">
                                    <tr>
                                        <th className="p-3 text-left font-semibold">Valor</th>
                                        <th className="p-3 text-left font-semibold">Impacto</th>
                                        <th className="p-3 text-center font-semibold">Score</th>
                                        <th className="p-3 text-left font-semibold">Frequência</th>
                                        <th className="p-3 text-left font-semibold">Intervenção</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {criterios[selectedCriterio].map(valor => {
                                        const key = `${selectedCriterio}|${valor}`;
                                        const regra = draftRules[key] || RULES_DATABASE[key];
                                        return (
                                            <tr key={valor} className="hover:bg-slate-50">
                                                <td className="p-3 font-medium">{valor}</td>
                                                <td className="p-3">
                                                    <select
                                                        className="w-full border p-2 rounded text-xs"
                                                        value={regra.impacto}
                                                        onChange={(e) => patchRule(key, { impacto: e.target.value })}
                                                    >
                                                        <option value="Baixo">Baixo</option>
                                                        <option value="Médio">Médio</option>
                                                        <option value="Alto">Alto</option>
                                                        <option value="Muito Alto">Muito Alto</option>
                                                    </select>
                                                </td>
                                                <td className="p-3">
                                                    <input
                                                        type="number"
                                                        min="1"
                                                        max="4"
                                                        className="w-20 border p-2 rounded text-center mx-auto block"
                                                        value={regra.score}
                                                        onChange={(e) => patchRule(key, { score: Number(e.target.value || 1) })}
                                                    />
                                                </td>
                                                <td className="p-3">
                                                    <input
                                                        className="w-full border p-2 rounded text-xs"
                                                        value={regra.frequencia}
                                                        onChange={(e) => patchRule(key, { frequencia: e.target.value })}
                                                    />
                                                </td>
                                                <td className="p-3">
                                                    <input
                                                        className="w-full border p-2 rounded text-xs"
                                                        value={regra.intervencao}
                                                        onChange={(e) => patchRule(key, { intervencao: e.target.value })}
                                                    />
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-5">
                        <h4 className="font-semibold text-blue-900 mb-2 flex items-center gap-2">
                            <AlertTriangle className="w-4 h-4" />
                            Princípio do Pior Caso
                        </h4>
                        <p className="text-sm text-blue-800 leading-relaxed">
                            Quando uma erosão possui múltiplos critérios avaliados, o sistema adota automaticamente o
                            <strong> critério de maior criticidade</strong>.
                        </p>
                    </div>
                </div>
            );
        }

        function MandatoryProfileUpdateView({ authUser, currentUserProfile, saveToFirestore }) {
            const [formData, setFormData] = useState({
                nome: currentUserProfile?.nome || '',
                cargo: currentUserProfile?.cargo || '',
                departamento: currentUserProfile?.departamento || '',
                telefone: currentUserProfile?.telefone || ''
            });
            const [saving, setSaving] = useState(false);

            const handleSave = async () => {
                const required = ['nome', 'cargo', 'departamento', 'telefone'];
                const missing = required.some(k => String(formData[k] || '').trim().length === 0);
                if (missing) {
                    alert('Preencha nome, cargo, departamento e telefone.');
                    return;
                }

                setSaving(true);
                try {
                    await saveToFirestore('users', authUser.uid, {
                        id: authUser.uid,
                        nome: formData.nome.trim(),
                        email: currentUserProfile?.email || authUser.email,
                        cargo: formData.cargo.trim(),
                        departamento: formData.departamento.trim(),
                        telefone: formData.telefone.trim(),
                        perfil: currentUserProfile?.perfil || 'Utilizador',
                        status: currentUserProfile?.status || 'Ativo',
                        perfilAtualizadoPrimeiroLogin: true,
                        createdAt: currentUserProfile?.createdAt || new Date().toISOString()
                    });
                } finally {
                    setSaving(false);
                }
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-slate-100 p-6">
                    <div className="bg-white rounded-xl shadow-2xl border w-full max-w-2xl p-8">
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Complete seu perfil</h2>
                        <p className="text-sm text-slate-600 mb-6">
                            Antes de acessar o sistema, atualize os dados obrigatórios do seu perfil.
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Nome *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.nome}
                                    onChange={(e) => setFormData({...formData, nome: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Cargo *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.cargo}
                                    onChange={(e) => setFormData({...formData, cargo: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Departamento *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.departamento}
                                    onChange={(e) => setFormData({...formData, departamento: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Telefone *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.telefone}
                                    onChange={(e) => {
                                        const formatted = formatPhone(e.target.value);
                                        setFormData({...formData, telefone: formatted});
                                    }}
                                />
                            </div>
                        </div>

                        <div className="flex gap-3 pt-6">
                            <button
                                onClick={handleSave}
                                disabled={saving}
                                className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 disabled:opacity-60 font-semibold"
                            >
                                {saving ? 'Salvando...' : 'Salvar e continuar'}
                            </button>
                            <button
                                className="px-6 bg-slate-100 text-slate-700 py-3 rounded-lg hover:bg-slate-200 font-semibold"
                                onClick={async () => {
                                    const { signOut } = window.firebaseModules;
                                    await signOut(auth);
                                }}
                            >
                                Sair
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeoMonitorApp />);
    </script>
</body>
</html>
