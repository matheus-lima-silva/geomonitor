        function InspectionDetailsModal({ inspection, project, erosions, inspections, onClose, onNavigate }) {
            const relatedErosions = erosions?.filter(e => e.vistoriaId === inspection.id) || [];
            
            const currentIndex = inspections.findIndex(i => i.id === inspection.id);
            const hasPrevious = currentIndex > 0;
            const hasNext = currentIndex < inspections.length - 1;
            const escapeHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
            const hasHotelData = (day) => !!String(day?.hotelNome || '').trim()
                || !!String(day?.hotelMunicipio || '').trim()
                || !!String(day?.hotelTorreBase || '').trim()
                || String(day?.hotelLogisticaNota || '').trim() !== ''
                || String(day?.hotelReservaNota || '').trim() !== ''
                || String(day?.hotelEstadiaNota || '').trim() !== '';

            const handlePrevious = () => {
                if (hasPrevious) {
                    onNavigate(inspections[currentIndex - 1]);
                }
            };

            const handleNext = () => {
                if (hasNext) {
                    onNavigate(inspections[currentIndex + 1]);
                }
            };

            const handleExportDetailsPdf = () => {
                const win = window.open('', '_blank');
                if (!win) return;

                const days = Array.isArray(inspection?.detalhesDias) ? inspection.detalhesDias : [];
                const dayCardsHtml = days.map((dia, idx) => {
                    const dateLabel = dia?.data ? new Date(`${dia.data}T00:00:00`).toLocaleDateString('pt-BR') : 'Data não informada';
                    const towers = Array.isArray(dia?.torresDetalhadas) ? dia.torresDetalhadas : [];
                    const towersHtml = towers.length > 0
                        ? towers.map((t) => `
                            <div class="tower-row ${t?.temErosao ? 'tower-erosion' : ''}">
                                <strong>${escapeHtml(formatTowerLabel(t?.numero))}</strong>
                                <span>${escapeHtml(t?.obs ? ` - ${t.obs}` : ' - sem observações')}</span>
                            </div>
                        `).join('')
                        : '<div class="empty">Sem torres detalhadas neste dia.</div>';
                    const hotelHtml = hasHotelData(dia)
                        ? `
                            <div class="hotel-box">
                                <div class="hotel-title">Dados de hospedagem</div>
                                <div><strong>Hotel:</strong> ${escapeHtml(dia?.hotelNome || '-')}</div>
                                <div><strong>Município:</strong> ${escapeHtml(dia?.hotelMunicipio || '-')}</div>
                                <div><strong>Torre base da hospedagem:</strong> ${escapeHtml(dia?.hotelTorreBase || '-')}</div>
                                <div><strong>Notas:</strong> Logística ${Number.isFinite(Number(dia?.hotelLogisticaNota)) ? Number(dia.hotelLogisticaNota) : '-'} | Reserva ${Number.isFinite(Number(dia?.hotelReservaNota)) ? Number(dia.hotelReservaNota) : '-'} | Estadia ${Number.isFinite(Number(dia?.hotelEstadiaNota)) ? Number(dia.hotelEstadiaNota) : '-'}</div>
                            </div>
                        `
                        : '';
                    return `
                        <div class="day-card avoid-break">
                            <div class="day-head">
                                <span class="date">${escapeHtml(dateLabel)}</span>
                                ${dia?.clima ? `<span class="chip sky">${escapeHtml(dia.clima)}</span>` : ''}
                                ${(dia?.torresInput || dia?.torres) ? `<span class="chip gray">Torres: ${escapeHtml(dia.torresInput || dia.torres)}</span>` : ''}
                            </div>
                            <div class="day-subtitle">Torres visitadas</div>
                            <div class="tower-list">${towersHtml}</div>
                            ${hotelHtml}
                        </div>
                    `;
                }).join('');

                const erosionsHtml = relatedErosions.length > 0
                    ? relatedErosions.map((e) => `
                        <div class="erosion-row avoid-break">
                            <div><strong>${escapeHtml(e?.id || '-')}</strong></div>
                            <div>${escapeHtml(String(e?.torreRef ?? '').trim() ? formatTowerLabel(e.torreRef) : '-')} • ${escapeHtml(e?.tipo || '-')} • ${escapeHtml(e?.estagio || '-')}</div>
                            <div><strong>Impacto:</strong> ${escapeHtml(e?.impacto || '-')}</div>
                        </div>
                    `).join('')
                    : '<div class="empty">Nenhuma erosão vinculada a esta vistoria.</div>';

                win.document.write(`
                    <html>
                    <head>
                        <title>Detalhes da Vistoria ${escapeHtml(inspection?.id || '-')}</title>
                        <style>
                            @page { size: A4; margin: 12mm; }
                            * { box-sizing: border-box; }
                            body { font-family: 'Segoe UI', Arial, sans-serif; color: #0f172a; font-size: 12px; margin: 0; background: #f8fafc; }
                            .wrapper { max-width: 100%; }
                            .header { background: linear-gradient(135deg, #dbeafe 0%, #e2e8f0 100%); border: 1px solid #cbd5e1; border-radius: 10px; padding: 14px; }
                            .title { font-size: 19px; font-weight: 700; margin: 0 0 4px 0; color: #1e3a8a; }
                            .meta { color: #475569; font-size: 11px; }
                            .section { margin-top: 12px; border: 1px solid #dbe4ee; border-radius: 10px; background: #ffffff; padding: 12px; }
                            .section-title { font-size: 13px; font-weight: 700; margin: 0 0 8px 0; color: #0f172a; }
                            .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
                            .row { line-height: 1.4; color: #1f2937; }
                            .label { color: #475569; font-weight: 600; }
                            .day-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 8px; background: #fff; }
                            .day-head { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
                            .date { font-weight: 700; color: #0f172a; }
                            .chip { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; }
                            .chip.sky { background: #e0f2fe; color: #0369a1; }
                            .chip.gray { background: #f1f5f9; color: #334155; }
                            .day-subtitle { font-weight: 700; color: #334155; margin: 4px 0 6px; }
                            .tower-list { display: grid; gap: 5px; }
                            .tower-row { border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; padding: 6px; }
                            .tower-erosion { border-color: #fecaca; background: #fef2f2; }
                            .hotel-box { margin-top: 8px; border: 1px solid #bfdbfe; border-radius: 6px; background: #eff6ff; padding: 8px; }
                            .hotel-title { color: #1d4ed8; font-weight: 700; margin-bottom: 4px; }
                            .erosion-row { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; padding: 8px; margin-bottom: 8px; }
                            .empty { border: 1px dashed #cbd5e1; border-radius: 8px; padding: 10px; color: #64748b; background: #f8fafc; }
                            .avoid-break { page-break-inside: avoid; }
                        </style>
                    </head>
                    <body>
                        <div class="wrapper">
                            <div class="header avoid-break">
                                <h1 class="title">Detalhes da Vistoria ${escapeHtml(inspection?.id || '-')}</h1>
                                <div class="meta">Empreendimento: ${escapeHtml(inspection?.projetoId || '-')} ${project?.nome ? `(${escapeHtml(project.nome)})` : ''}</div>
                                <div class="meta">Gerado em: ${escapeHtml(new Date().toLocaleString('pt-BR'))}</div>
                            </div>

                            <div class="section avoid-break">
                                <h2 class="section-title">Resumo</h2>
                                <div class="summary-grid">
                                    <div class="row"><span class="label">ID:</span> ${escapeHtml(inspection?.id || '-')}</div>
                                    <div class="row"><span class="label">Empreendimento:</span> ${escapeHtml(inspection?.projetoId || '-')}</div>
                                    <div class="row"><span class="label">Data Início:</span> ${escapeHtml(inspection?.dataInicio || '-')}</div>
                                    <div class="row"><span class="label">Data Fim:</span> ${escapeHtml(inspection?.dataFim || '-')}</div>
                                    <div class="row"><span class="label">Responsável:</span> ${escapeHtml(inspection?.responsavel || '-')}</div>
                                    <div class="row"><span class="label">Dias registados:</span> ${escapeHtml(days.length)}</div>
                                </div>
                                ${inspection?.obs ? `<div class="row" style="margin-top:8px;"><span class="label">Observações:</span> ${escapeHtml(inspection.obs).replace(/\n/g, '<br />')}</div>` : ''}
                            </div>

                            <div class="section">
                                <h2 class="section-title">Diário de Campo Detalhado</h2>
                                ${dayCardsHtml || '<div class="empty">Sem dias detalhados.</div>'}
                            </div>

                            <div class="section">
                                <h2 class="section-title">Erosões Identificadas (${escapeHtml(relatedErosions.length)})</h2>
                                ${erosionsHtml}
                            </div>
                        </div>
                    </body>
                    </html>
                `);
                win.document.close();
                win.print();
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl w-full max-w-4xl shadow-2xl max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-white border-b p-6 flex justify-between items-center">
                            <div className="flex items-center gap-4 flex-1">
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <ClipboardList className="text-blue-600" />
                                    Detalhes da Vistoria: {inspection.id}
                                </h3>
                                <div className="text-sm text-slate-500">
                                    ({currentIndex + 1} de {inspections.length})
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={handlePrevious} disabled={!hasPrevious} className={`p-2 rounded-lg transition-colors ${hasPrevious ? 'hover:bg-slate-100 text-slate-700' : 'text-slate-300 cursor-not-allowed'}`} title="Vistoria anterior">
                                    <ChevronLeft />
                                </button>
                                <button onClick={handleNext} disabled={!hasNext} className={`p-2 rounded-lg transition-colors ${hasNext ? 'hover:bg-slate-100 text-slate-700' : 'text-slate-300 cursor-not-allowed'}`} title="Próxima vistoria">
                                    <svg className="lucide-icon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                                </button>
                                <button onClick={handleExportDetailsPdf} className="px-3 py-2 rounded-lg text-sm bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-2" title="Gerar PDF">
                                    <svg className="lucide-icon" viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h4"/></svg>
                                    Gerar PDF
                                </button>
                                <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-lg transition-colors ml-2">
                                    <X />
                                </button>
                            </div>
                        </div>

                        <div className="p-6 space-y-6">
                            <div className="grid grid-cols-2 gap-6">
                                <div className="bg-slate-50 rounded-lg p-4">
                                    <h4 className="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2">
                                        <MapIcon className="w-4 h-4" /> Empreendimento
                                    </h4>
                                    {project ? (
                                        <div className="space-y-2 text-sm">
                                            <div><strong>ID:</strong> {project.id}</div>
                                            <div><strong>Nome:</strong> {project.nome}</div>
                                            <div><strong>Tipo:</strong> {project.tipo}</div>
                                            {project.tensao && <div><strong>Tensão:</strong> {project.tensao} kV</div>}
                                        </div>
                                    ) : (
                                        <p className="text-sm text-slate-500">Projeto não encontrado</p>
                                    )}
                                </div>

                                <div className="bg-slate-50 rounded-lg p-4">
                                    <h4 className="text-sm font-semibold text-slate-700 mb-3">Informações da Vistoria</h4>
                                    <div className="space-y-2 text-sm">
                                        <div><strong>ID:</strong> {inspection.id}</div>
                                        <div><strong>Data Início:</strong> {inspection.dataInicio}</div>
                                        {inspection.dataFim && <div><strong>Data Fim:</strong> {inspection.dataFim}</div>}
                                        {inspection.responsavel && <div><strong>Responsável:</strong> {inspection.responsavel}</div>}
                                    </div>
                                </div>
                            </div>

                            {inspection.obs && (
                                <div className="bg-slate-50 rounded-lg p-4">
                                    <h4 className="text-sm font-semibold text-slate-700 mb-2">Observações</h4>
                                    <p className="text-sm text-slate-600 whitespace-pre-wrap">{inspection.obs}</p>
                                </div>
                            )}

                            {Array.isArray(inspection.detalhesDias) && inspection.detalhesDias.length > 0 && (
                                <div className="bg-slate-50 rounded-lg p-4">
                                    <h4 className="text-sm font-semibold text-slate-700 mb-3">Diário de Campo Detalhado</h4>
                                    <div className="space-y-3">
                                        {inspection.detalhesDias.map((dia, idx) => (
                                            <div key={`${dia.data || idx}`} className="bg-white border rounded-lg p-3">
                                                <div className="flex flex-wrap gap-2 items-center mb-2">
                                                    <span className="text-sm font-semibold text-slate-800">
                                                        {dia.data ? new Date(`${dia.data}T00:00:00`).toLocaleDateString('pt-BR') : 'Data não informada'}
                                                    </span>
                                                    {dia.clima && <span className="px-2 py-1 text-xs rounded bg-sky-100 text-sky-700">{dia.clima}</span>}
                                                    {(dia.torresInput || dia.torres) && (
                                                        <span className="px-2 py-1 text-xs rounded bg-slate-100 text-slate-700">
                                                            Torres: {dia.torresInput || dia.torres}
                                                        </span>
                                                    )}
                                                </div>
                                                {Array.isArray(dia.torresDetalhadas) && dia.torresDetalhadas.length > 0 && (
                                                    <div className="space-y-1">
                                                        {dia.torresDetalhadas.map((t) => (
                                                            <div key={`${dia.data}-${t.numero}`} className={`text-sm border rounded p-2 ${t.temErosao ? 'border-red-200 bg-red-50' : 'border-slate-200 bg-white'}`}>
                                                                <strong>{formatTowerLabel(t.numero)}</strong>
                                                                {t.obs ? ` - ${t.obs}` : ' - sem observações'}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                {hasHotelData(dia) && (
                                                    <div className="mt-2 text-xs text-slate-700 bg-blue-50 border border-blue-100 rounded p-2">
                                                        <div className="font-semibold text-blue-700 mb-1">Dados de hospedagem</div>
                                                        <div><strong>Hotel:</strong> {dia.hotelNome || '-'}</div>
                                                        <div><strong>Município:</strong> {dia.hotelMunicipio || '-'}</div>
                                                        <div><strong>Torre base da hospedagem:</strong> {dia.hotelTorreBase || '-'}</div>
                                                        <div>
                                                            <strong>Notas:</strong>
                                                            {' '}Logística {Number.isFinite(Number(dia.hotelLogisticaNota)) ? Number(dia.hotelLogisticaNota) : '-'}
                                                            {' | '}Reserva {Number.isFinite(Number(dia.hotelReservaNota)) ? Number(dia.hotelReservaNota) : '-'}
                                                            {' | '}Estadia {Number.isFinite(Number(dia.hotelEstadiaNota)) ? Number(dia.hotelEstadiaNota) : '-'}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="bg-slate-50 rounded-lg p-4">
                                <h4 className="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2">
                                    <AlertTriangle className="w-4 h-4" /> Erosões Identificadas ({relatedErosions.length})
                                </h4>
                                {relatedErosions.length > 0 ? (
                                    <div className="space-y-2">
                                        {relatedErosions.map(e => (
                                            <div key={e.id} className="flex items-center justify-between bg-white p-3 rounded-lg border">
                                                <div className="flex-1">
                                                    <div className="font-medium text-slate-800">{e.id}</div>
                                                    <div className="text-sm text-slate-600">
                                                        {String(e.torreRef ?? '').trim() && `${formatTowerLabel(e.torreRef)} • `}
                                                        {e.tipo} • {e.estagio}
                                                    </div>
                                                </div>
                                                <span className={`px-2 py-1 rounded-full text-xs font-bold ${
                                                    e.impacto === 'Muito Alto' ? 'bg-red-100 text-red-700' :
                                                    e.impacto === 'Alto' ? 'bg-orange-100 text-orange-700' :
                                                    e.impacto === 'Médio' ? 'bg-yellow-100 text-yellow-700' :
                                                    'bg-green-100 text-green-700'
                                                }`}>
                                                    {e.impacto}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <p className="text-sm text-slate-500">Nenhuma erosão vinculada a esta vistoria.</p>
                                )}
                            </div>

                            {inspection.ultimaAtualizacao && (
                                <div className="text-xs text-slate-500 border-t pt-4">
                                    <div><strong>Última atualização:</strong> {new Date(inspection.ultimaAtualizacao).toLocaleString('pt-BR')}</div>
                                    {inspection.atualizadoPor && <div><strong>Por:</strong> {inspection.atualizadoPor}</div>}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ErosionsView({ erosions, projects, inspections, searchTerm, saveToFirestore, deleteFromFirestore, pendingDraft, onDraftConsumed, rulesConfig, currentUserName }) {
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState({});
            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [detailsModal, setDetailsModal] = useState(null);
            const currentYear = new Date().getFullYear();
            const [reportFilters, setReportFilters] = useState({
                projetoId: '',
                ano: '',
                mostrarMultiAno: false,
                anosExtras: []
            });

            const getInspectionDateScore = (inspection) => {
                const candidates = [inspection?.dataFim, inspection?.dataInicio, inspection?.data];
                for (let i = 0; i < candidates.length; i += 1) {
                    const d = new Date(candidates[i]);
                    if (!Number.isNaN(d.getTime())) return d.getTime();
                }
                return null;
            };

            const resolvePrimaryInspectionId = (inspectionIds) => {
                if (!inspectionIds || inspectionIds.length === 0) return '';
                const inspectionById = new Map((inspections || []).map((item) => [String(item?.id || '').trim(), item]));
                return [...inspectionIds].sort((a, b) => {
                    const ia = inspectionById.get(String(a || '').trim());
                    const ib = inspectionById.get(String(b || '').trim());
                    const da = getInspectionDateScore(ia);
                    const db = getInspectionDateScore(ib);
                    if (da !== null && db !== null) return db - da;
                    if (da !== null) return -1;
                    if (db !== null) return 1;
                    return String(b || '').localeCompare(String(a || ''));
                })[0];
            };

            const reportYears = useMemo(() => {
                if (!reportFilters.projetoId) return [currentYear];
                const inspectionsById = new Map((inspections || []).map((item) => [String(item?.id || '').trim(), item]));
                const yearsSet = new Set();
                (erosions || []).forEach((item) => {
                    if (resolveErosionProjectId(item, inspectionsById) !== normalizeProjectKey(reportFilters.projetoId)) return;
                    const rowDate = resolveErosionDate(item, inspectionsById);
                    if (!rowDate) return;
                    const year = Number(String(rowDate).slice(0, 4));
                    if (Number.isInteger(year) && year >= 1900 && year <= 9999) yearsSet.add(year);
                });
                const sorted = [...yearsSet].sort((a, b) => b - a);
                return sorted.length > 0 ? sorted : [currentYear];
            }, [erosions, inspections, reportFilters.projetoId, currentYear]);

            const selectedReportYears = useMemo(() => {
                const baseYearText = String(reportFilters.ano || '').trim();
                const hasBaseYear = baseYearText !== '';
                const baseYear = hasBaseYear ? Number(baseYearText) : null;
                const extras = (reportFilters.anosExtras || [])
                    .map((year) => Number(year))
                    .filter((year) => Number.isInteger(year) && year >= 1900 && year <= 9999 && year !== baseYear);
                if (!reportFilters.mostrarMultiAno) {
                    if (!hasBaseYear) return [];
                    return [baseYear];
                }
                if (!hasBaseYear) return [...new Set(extras)].sort((a, b) => a - b);
                return [...new Set([baseYear, ...extras])].sort((a, b) => a - b);
            }, [reportFilters]);

            const filtered = erosions.filter(e => {
                const t = searchTerm.toLowerCase();
                if (!t) return true;
                return String(e.id || '').toLowerCase().includes(t) ||
                       String(e.projetoId || '').toLowerCase().includes(t) ||
                       String(e.torreRef ?? '').toLowerCase().includes(t);
            });

            const openNew = () => {
                const newId = `E${Date.now().toString().slice(-8)}`;
                setFormData({ 
                    id: newId, 
                    projetoId: '', 
                    vistoriaId: '',
                    vistoriaIds: [],
                    torreRef: '',
                    localTipo: '',
                    localDescricao: '',
                    tipo: '',
                    estagio: '',
                    profundidade: '',
                    declividade: '',
                    largura: '',
                    latitude: '',
                    longitude: '',
                    status: 'Ativo',
                    obs: '',
                    acompanhamentosResumo: []
                });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            const openEdit = (e) => {
                const inspectionIds = normalizeErosionInspectionIds(e);
                setFormData({
                    ...e,
                    status: normalizeErosionStatus(e.status),
                    vistoriaId: resolvePrimaryInspectionId(inspectionIds),
                    vistoriaIds: inspectionIds,
                    localTipo: e.localTipo || '',
                    localDescricao: e.localDescricao || '',
                    acompanhamentosResumo: normalizeFollowupHistory(e.acompanhamentosResumo)
                });
                setIsEditing(true);
                setIsFormOpen(true);
            };

            useEffect(() => {
                if (!pendingDraft) return;
                const newId = `E${Date.now().toString().slice(-8)}`;
                setFormData({
                    id: newId,
                    projetoId: pendingDraft.projetoId || '',
                    vistoriaId: pendingDraft.vistoriaId || '',
                    vistoriaIds: pendingDraft.vistoriaId ? [pendingDraft.vistoriaId] : [],
                    torreRef: pendingDraft.torreRef || '',
                    localTipo: '',
                    localDescricao: '',
                    tipo: '',
                    estagio: '',
                    profundidade: '',
                    declividade: '',
                    largura: '',
                    latitude: pendingDraft.latitude || '',
                    longitude: pendingDraft.longitude || '',
                    status: 'Ativo',
                    obs: pendingDraft.origemDia ? `Origem da vistoria (${pendingDraft.origemDia}).` : '',
                    acompanhamentosResumo: []
                });
                setIsEditing(false);
                setIsFormOpen(true);
                onDraftConsumed?.();
            }, [pendingDraft, onDraftConsumed]);

            const handleSave = async () => {
                if (!formData.id || !formData.projetoId) {
                    alert('Preencha ID e Projeto');
                    return;
                }
                const locationValidation = validateErosionLocation(formData);
                if (!locationValidation.ok) {
                    alert(locationValidation.message);
                    return;
                }
                
                const previous = erosions.find((item) => item.id === formData.id) || null;
                const nextStatus = normalizeErosionStatus(formData.status);
                const currentIds = normalizeErosionInspectionIds(formData);
                const previousIds = normalizeErosionInspectionIds(previous);
                const vistoriaIds = [...new Set([...currentIds, ...previousIds])];
                const vistoriaId = resolvePrimaryInspectionId(vistoriaIds);
                const payload = {
                    ...formData,
                    status: nextStatus,
                    vistoriaId,
                    vistoriaIds
                };
                const criticality = calculateCriticality(payload, rulesConfig);
                const origem = !previous && String(payload.obs || '').includes('Origem da vistoria') ? 'vistoria' : undefined;
                const followupEvent = buildFollowupEvent(previous, payload, {
                    updatedBy: currentUserName || '',
                    isCreate: !previous,
                    origem
                });
                const dataToSave = {
                    ...payload,
                    impacto: criticality.impacto,
                    score: criticality.score,
                    frequencia: criticality.frequencia,
                    intervencao: criticality.intervencao,
                    acompanhamentosResumo: appendFollowupEvent(previous?.acompanhamentosResumo, followupEvent)
                };
                
                await saveToFirestore('erosions', formData.id, dataToSave);
                setIsFormOpen(false);
            };

            const handleDelete = async (id) => {
                await deleteFromFirestore('erosions', id);
                setConfirmDelete(null);
            };

            const openGoogleMapsRoute = (lat, lng) => {
                if (!lat || !lng) {
                    alert('Coordenadas não informadas');
                    return;
                }
                const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
                window.open(url, '_blank');
            };

            const handleExportCsv = () => {
                if (!reportFilters.projetoId) {
                    alert('Selecione um empreendimento para exportar.');
                    return;
                }
                const rows = buildReportRows(filterErosionsForReport(erosions, {
                    ...reportFilters,
                    anos: selectedReportYears
                }, inspections));
                const csv = buildErosionsCsv(rows);
                const yearLabel = selectedReportYears.length > 0 ? selectedReportYears.join('-') : 'todos-os-anos';
                downloadTextFile(`relatorio-erosoes-${reportFilters.projetoId}-${yearLabel}-${new Date().toISOString().slice(0, 10)}.csv`, csv, 'text/csv;charset=utf-8');
            };

            const handleExportPdf = () => {
                if (!reportFilters.projetoId) {
                    alert('Selecione um empreendimento para exportar.');
                    return;
                }
                const rows = buildReportRows(filterErosionsForReport(erosions, {
                    ...reportFilters,
                    anos: selectedReportYears
                }, inspections));
                const summary = rows.reduce((acc, row) => {
                    acc.status[row.status || 'Não informado'] = (acc.status[row.status || 'Não informado'] || 0) + 1;
                    acc.impacto[row.impacto || 'Não informado'] = (acc.impacto[row.impacto || 'Não informado'] || 0) + 1;
                    return acc;
                }, { status: {}, impacto: {} });
                const windowRef = window.open('', '_blank');
                if (!windowRef) return;
                const statusHtml = Object.entries(summary.status).map(([k, v]) => `<li><strong>${k}</strong>: ${v}</li>`).join('');
                const impactoHtml = Object.entries(summary.impacto).map(([k, v]) => `<li><strong>${k}</strong>: ${v}</li>`).join('');
                const tableHtml = rows.map((row) => `<tr><td>${row.id}</td><td>${row.vistoriaId || '-'}</td><td>${row.torreRef || '-'}</td><td>${row.localTipo || '-'}</td><td>${row.status || '-'}</td><td>${row.impacto || '-'}</td><td>${row.ultimaAtualizacao || '-'}</td></tr>`).join('');
                const selectedYearsLabel = selectedReportYears.length > 0 ? selectedReportYears.join(', ') : 'Todos';
                const periodLabel = selectedReportYears.length > 0
                    ? `${selectedReportYears[0]}-01-01 até ${selectedReportYears[selectedReportYears.length - 1]}-12-31`
                    : 'Histórico completo do empreendimento';
                windowRef.document.write(`
                    <html><head><title>Relatório de Erosões</title>
                    <style>body{font-family:Arial,sans-serif;padding:24px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px;font-size:12px}th{background:#f5f5f5}</style>
                    </head><body>
                    <h1>Relatório de Processos Erosivos</h1>
                    <div><strong>Empreendimento:</strong> ${reportFilters.projetoId}</div>
                    <div><strong>Ano(s):</strong> ${selectedYearsLabel}</div>
                    <div><strong>Período consolidado:</strong> ${periodLabel}</div>
                    <div><strong>Gerado em:</strong> ${new Date().toLocaleString('pt-BR')}</div>
                    <h3>Totais por Status</h3><ul>${statusHtml || '<li>Sem dados</li>'}</ul>
                    <h3>Totais por Impacto</h3><ul>${impactoHtml || '<li>Sem dados</li>'}</ul>
                    <table><thead><tr><th>ID</th><th>Vistoria</th><th>Torre</th><th>Local</th><th>Status</th><th>Impacto</th><th>Atualização</th></tr></thead><tbody>${tableHtml || '<tr><td colspan=\"7\">Sem dados.</td></tr>'}</tbody></table>
                    </body></html>
                `);
                windowRef.document.close();
                windowRef.print();
            };

            const handleAddManualHistoryEvent = async (erosionId, eventData) => {
                const target = erosions.find((item) => item.id === erosionId);
                if (!target) {
                    alert('Erosão não encontrada para atualizar histórico.');
                    return false;
                }
                const event = buildManualFollowupEvent(eventData, { updatedBy: currentUserName || '' });
                if (!event) {
                    alert('Dados do evento inválidos.');
                    return false;
                }
                const etapa = String(event.obraEtapa || '').trim().toLowerCase();
                const shouldStabilize = event.tipoEvento === 'obra' && (etapa === 'concluída' || etapa === 'concluida');
                const status = shouldStabilize ? 'Estabilizado' : normalizeErosionStatus(target?.status);
                const vistoriaIds = normalizeErosionInspectionIds(target);
                const dataToSave = {
                    ...target,
                    status,
                    vistoriaIds,
                    vistoriaId: resolvePrimaryInspectionId(vistoriaIds),
                    acompanhamentosResumo: appendFollowupEvent(target?.acompanhamentosResumo, event)
                };
                await saveToFirestore('erosions', target.id, dataToSave);
                setDetailsModal((prev) => {
                    if (!prev || prev.id !== target.id) return prev;
                    return {
                        ...dataToSave,
                        ultimaAtualizacao: new Date().toISOString(),
                        atualizadoPor: currentUserName || prev.atualizadoPor || ''
                    };
                });
                return true;
            };

            const activeDetailsErosion = detailsModal
                ? (erosions.find((item) => item.id === detailsModal.id) || detailsModal)
                : null;

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <AlertTriangle /> Erosões
                        </h2>
                        <button onClick={openNew} className="bg-blue-600 text-white px-4 py-2 rounded-md flex items-center gap-2 hover:bg-blue-700">
                            <Plus /> Nova Erosão
                        </button>
                    </div>

                    <div className="bg-white rounded-xl border shadow-sm p-4">
                        <h3 className="font-bold text-slate-800 mb-3">Exportar relatório de erosões</h3>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                            <select className="border p-2 rounded text-sm" value={reportFilters.projetoId} onChange={(e) => setReportFilters((prev) => ({ ...prev, projetoId: e.target.value, anosExtras: [] }))}>
                                <option value="">Empreendimento...</option>
                                {projects.map((p) => (
                                    <option key={p.id} value={p.id}>{p.id} - {p.nome}</option>
                                ))}
                            </select>
                            <select className="border p-2 rounded text-sm" value={String(reportFilters.ano)} onChange={(e) => setReportFilters((prev) => ({ ...prev, ano: e.target.value, anosExtras: (prev.anosExtras || []).filter((y) => Number(y) !== Number(e.target.value)) }))}>
                                <option value="">Todos os anos</option>
                                {reportYears.map((year) => (
                                    <option key={year} value={year}>{year}</option>
                                ))}
                            </select>
                            <button
                                className="border p-2 rounded text-sm text-left hover:bg-slate-50"
                                onClick={() => setReportFilters((prev) => ({ ...prev, mostrarMultiAno: !prev.mostrarMultiAno }))}
                            >
                                {reportFilters.mostrarMultiAno ? 'Ocultar seleção de mais anos' : 'Selecionar mais de um ano'}
                            </button>
                            <div className="flex gap-2">
                                <button className="flex-1 bg-slate-100 text-slate-700 py-2 rounded text-sm hover:bg-slate-200" onClick={handleExportCsv}>Exportar CSV</button>
                                <button className="flex-1 bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700" onClick={handleExportPdf}>Exportar PDF</button>
                            </div>
                        </div>
                        {reportFilters.mostrarMultiAno && (
                            <div className="mt-3 border rounded-lg p-3 bg-slate-50">
                                <div className="text-xs font-medium text-slate-700 mb-2">Anos adicionais (além do ano principal)</div>
                                <div className="flex flex-wrap gap-2">
                                    {reportYears.filter((year) => String(reportFilters.ano || '') === '' || Number(year) !== Number(reportFilters.ano)).map((year) => {
                                        const checked = (reportFilters.anosExtras || []).includes(year);
                                        return (
                                            <label key={year} className="inline-flex items-center gap-1 text-sm border rounded px-2 py-1 bg-white">
                                                <input
                                                    type="checkbox"
                                                    checked={checked}
                                                    onChange={(e) => {
                                                        setReportFilters((prev) => {

            const [isEditing, setIsEditing] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);

            const filtered = users.filter(u => {
                const t = searchTerm.toLowerCase();
                if (!t) return true;
                return String(u.nome || '').toLowerCase().includes(t) ||
                       String(u.email || '').toLowerCase().includes(t) ||
                       String(u.cargo || '').toLowerCase().includes(t) ||
                       normalizeUserStatus(u.status).toLowerCase().includes(t);
            });

            const openNew = () => {
                setFormData({ id: '', nome: '', email: '', cargo: '', departamento: '', telefone: '', perfil: 'Utilizador', status: 'Pendente', dataCadastro: new Date().toISOString().split('T')[0] });
                setIsEditing(false);
                setIsFormOpen(true);
            };

            const openEdit = (u) => {
                setFormData({ ...u, status: normalizeUserStatus(u.status) });
                setIsEditing(true);
                setIsFormOpen(true);
            };

            const handleSave = async () => {
                if (!formData.id || !formData.nome || !formData.email) {
                    alert('Preencha UID, Nome e Email');
                    return;
                }
                const uid = String(formData.id).trim();
                if (!uid) {
                    alert('UID inválido.');
                    return;
                }
                const dataToSave = {
                    ...formData,

            const [selectedCriterio, setSelectedCriterio] = useState('tipo');

            const [saving, setSaving] = useState(false);

            const criterios = {
                tipo: ['sulco', 'ravina', 'voçoroca', 'deslizamento'],
                estagio: ['inicial', 'intermediario', 'avancado', 'critico'],
                profundidade: ['<0.5', '0.5-1.5', '1.5-3.0', '>3.0'],
                declividade: ['<15', '15-30', '30-45', '>45'],
                largura: ['<1', '1-3', '3-5', '>5']
            };

            useEffect(() => {
                setDraftRules(normalizeRulesConfig(rulesConfig));
            }, [rulesConfig]);

            const patchRule = (key, patch) => {
                setDraftRules(prev => ({
                    ...prev,
                    [key]: {
                        ...(prev[key] || {}),
                        ...patch
                    }
                }));
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    await saveRulesConfig(draftRules);
                } finally {
                    setSaving(false);

                                                        className="w-full border p-2 rounded text-xs"
                                                        value={regra.impacto}
                                                        onChange={(e) => patchRule(key, { impacto: e.target.value })}
                                                    >
                                                        <option value="Baixo">Baixo</option>
                                                        <option value="Médio">Médio</option>
                                                        <option value="Alto">Alto</option>
                                                        <option value="Muito Alto">Muito Alto</option>
                                                    </select>
                                                </td>
                                                <td className="p-3">
                                                    <input
                                                        type="number"
                                                        min="1"
                                                        max="4"
                                                        className="w-20 border p-2 rounded text-center mx-auto block"
                                                        value={regra.score}
                                                        onChange={(e) => patchRule(key, { score: Number(e.target.value || 1) })}
                                                    />
                                                </td>
                                                <td className="p-3">
                                                    <input
                                                        className="w-full border p-2 rounded text-xs"
                                                        value={regra.frequencia}
                                                        onChange={(e) => patchRule(key, { frequencia: e.target.value })}
                                                    />
                                                </td>
                                                <td className="p-3">
                                                    <input
                                                        className="w-full border p-2 rounded text-xs"
                                                        value={regra.intervencao}
                                                        onChange={(e) => patchRule(key, { intervencao: e.target.value })}
                                                    />
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-5">
                        <h4 className="font-semibold text-blue-900 mb-2 flex items-center gap-2">
                            <AlertTriangle className="w-4 h-4" />
                            Princípio do Pior Caso
                        </h4>
                        <p className="text-sm text-blue-800 leading-relaxed">
                            Quando uma erosão possui múltiplos critérios avaliados, o sistema adota automaticamente o
                            <strong> critério de maior criticidade</strong>.
                        </p>
                    </div>
                </div>
            );
        }

        function MandatoryProfileUpdateView({ authUser, currentUserProfile, saveToFirestore }) {
            const [formData, setFormData] = useState({
                nome: currentUserProfile?.nome || '',
                cargo: currentUserProfile?.cargo || '',
                departamento: currentUserProfile?.departamento || '',
                telefone: currentUserProfile?.telefone || ''
            });
            const [saving, setSaving] = useState(false);

            const handleSave = async () => {
                const required = ['nome', 'cargo', 'departamento', 'telefone'];
                const missing = required.some(k => String(formData[k] || '').trim().length === 0);
                if (missing) {
                    alert('Preencha nome, cargo, departamento e telefone.');
                    return;
                }

                setSaving(true);
                try {
                    await saveToFirestore('users', authUser.uid, {
                        id: authUser.uid,
                        nome: formData.nome.trim(),
                        email: currentUserProfile?.email || authUser.email,
                        cargo: formData.cargo.trim(),
                        departamento: formData.departamento.trim(),
                        telefone: formData.telefone.trim(),
                        perfil: currentUserProfile?.perfil || 'Utilizador',
                        status: currentUserProfile?.status || 'Ativo',
                        perfilAtualizadoPrimeiroLogin: true,
                        createdAt: currentUserProfile?.createdAt || new Date().toISOString()
                    });
                } finally {
                    setSaving(false);
                }
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-slate-100 p-6">
                    <div className="bg-white rounded-xl shadow-2xl border w-full max-w-2xl p-8">
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Complete seu perfil</h2>
                        <p className="text-sm text-slate-600 mb-6">
                            Antes de acessar o sistema, atualize os dados obrigatórios do seu perfil.
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Nome *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.nome}
                                    onChange={(e) => setFormData({...formData, nome: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Cargo *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.cargo}
                                    onChange={(e) => setFormData({...formData, cargo: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Departamento *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.departamento}
                                    onChange={(e) => setFormData({...formData, departamento: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Telefone *</label>
                                <input
                                    className="w-full border border-slate-300 p-2.5 rounded-lg text-sm"
                                    value={formData.telefone}
                                    onChange={(e) => {
                                        const formatted = formatPhone(e.target.value);
                                        setFormData({...formData, telefone: formatted});
                                    }}
                                />
                            </div>
                        </div>

                        <div className="flex gap-3 pt-6">
                            <button
                                onClick={handleSave}
                                disabled={saving}
                                className="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 disabled:opacity-60 font-semibold"
                            >
                                {saving ? 'Salvando...' : 'Salvar e continuar'}
                            </button>
                            <button
                                className="px-6 bg-slate-100 text-slate-700 py-3 rounded-lg hover:bg-slate-200 font-semibold"
                                onClick={async () => {
                                    const { signOut } = window.firebaseModules;
                                    await signOut(auth);
                                }}
                            >
                                Sair
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeoMonitorApp />);
    </script>
</body>
</html>
