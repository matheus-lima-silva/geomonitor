        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCpXON4jDLv08olhQlgMFA6vCyAguYiLvU",

            messagingSenderId: "475025720665",

        };

        const APP_ID = "geomonitor-production-v1";

        // Variáveis globais base
        let app, auth, db;
        
        const RULES_DATABASE = {
            'tipo|sulco': { impacto: 'Baixo', score: 1, frequencia: '24 meses', intervencao: 'Monitoramento visual' },
            'tipo|ravina': { impacto: 'Médio', score: 2, frequencia: '12 meses', intervencao: 'Reconformação + revegetação' },
            'tipo|voçoroca': { impacto: 'Alto', score: 3, frequencia: '6 meses', intervencao: 'Obra de contenção' },
            'tipo|deslizamento': { impacto: 'Muito Alto', score: 4, frequencia: '3 meses', intervencao: 'Obra emergencial' },
            'estagio|inicial': { impacto: 'Baixo', score: 1, frequencia: '24 meses', intervencao: 'Monitoramento preventivo' },
            'estagio|intermediario': { impacto: 'Médio', score: 2, frequencia: '12 meses', intervencao: 'Intervenção moderada' },
            'estagio|avancado': { impacto: 'Alto', score: 3, frequencia: '6 meses', intervencao: 'Obra corretiva' },
            'estagio|critico': { impacto: 'Muito Alto', score: 4, frequencia: '3 meses', intervencao: 'Intervenção imediata' },
            'profundidade|<0.5': { impacto: 'Baixo', score: 1, frequencia: '24 meses', intervencao: 'Monitoramento' },
            'profundidade|0.5-1.5': { impacto: 'Médio', score: 2, frequencia: '12 meses', intervencao: 'Revegetação' },
            'profundidade|1.5-3.0': { impacto: 'Alto', score: 3, frequencia: '6 meses', intervencao: 'Contenção necessária' },
            'profundidade|>3.0': { impacto: 'Muito Alto', score: 4, frequencia: '3 meses', intervencao: 'Obra urgente' },
            'declividade|<15': { impacto: 'Baixo', score: 1, frequencia: '24 meses', intervencao: 'Baixo risco' },
            'declividade|15-30': { impacto: 'Médio', score: 2, frequencia: '12 meses', intervencao: 'Risco moderado' },
            'declividade|30-45': { impacto: 'Alto', score: 3, frequencia: '6 meses', intervencao: 'Alto risco' },
            'declividade|>45': { impacto: 'Muito Alto', score: 4, frequencia: '3 meses', intervencao: 'Risco crítico' },
            'largura|<1': { impacto: 'Baixo', score: 1, frequencia: '24 meses', intervencao: 'Monitoramento' },
            'largura|1-3': { impacto: 'Médio', score: 2, frequencia: '12 meses', intervencao: 'Atenção necessária' },
            'largura|3-5': { impacto: 'Alto', score: 3, frequencia: '6 meses', intervencao: 'Intervenção prioritária' },
            'largura|>5': { impacto: 'Muito Alto', score: 4, frequencia: '3 meses', intervencao: 'Ação imediata' }
        };

        function normalizeRulesConfig(rawRules) {
            const normalized = {};
            Object.keys(RULES_DATABASE).forEach((key) => {
                const defaultRule = RULES_DATABASE[key];
                const inputRule = rawRules?.[key] || {};
                const impacto = String(inputRule.impacto || defaultRule.impacto);
                const scoreValue = Number(inputRule.score ?? defaultRule.score);
                const score = Number.isFinite(scoreValue) ? Math.min(4, Math.max(1, scoreValue)) : defaultRule.score;
                normalized[key] = {
                    impacto,
                    score,
                    frequencia: String(inputRule.frequencia || defaultRule.frequencia),
                    intervencao: String(inputRule.intervencao || defaultRule.intervencao)
                };
            });
            return normalized;
        }

        function normalizeUserStatus(value) {
            const normalized = String(value || '').trim().toLowerCase();
            if (['pendente', 'pending', 'aguardando'].includes(normalized)) return 'Pendente';
            if (['inativo', 'inactive', 'desativado', 'off'].includes(normalized)) return 'Inativo';
            return 'Ativo';
        }

        function canAccessAdminMenu(profile) {
            if (!profile) return false;
            if (normalizeUserStatus(profile.status) !== 'Ativo') return false;
            const perfil = String(profile.perfil || '').trim();
            return perfil === 'Administrador' || perfil === 'Gerente';
        }

        function formatTowerLabel(towerRef) {
            const ref = String(towerRef ?? '').trim();
            if (!ref) return 'Não informado';
            if (ref === '0') return 'Pórtico (T0)';
            return `Torre ${ref}`;
        }

        const MONTH_OPTIONS_PT = [
            { value: 1, label: 'Jan' },
            { value: 2, label: 'Fev' },
            { value: 3, label: 'Mar' },
            { value: 4, label: 'Abr' },
            { value: 5, label: 'Mai' },
            { value: 6, label: 'Jun' },
            { value: 7, label: 'Jul' },
            { value: 8, label: 'Ago' },
            { value: 9, label: 'Set' },
            { value: 10, label: 'Out' },
            { value: 11, label: 'Nov' },
            { value: 12, label: 'Dez' }
        ];
        const TRANSMISSION_VOLTAGE_OPTIONS = ['13', '138', '230', '345', '500', '600', '750'];

        function getMonthLabel(month) {
            const num = Number(month);
            const found = MONTH_OPTIONS_PT.find((m) => m.value === num);
            return found ? found.label : String(month || '');
        }

        function normalizeReportPeriodicity(value) {
            const v = String(value || '').trim().toLowerCase();
            if (v === 'trimestral') return 'Trimestral';
            if (v === 'semestral') return 'Semestral';
            if (v === 'bienal' || v === 'bi anual' || v === 'bianual') return 'Bienal';
            return 'Anual';
        }

        function requiredMonthCount(periodicidade) {
            const periodicity = normalizeReportPeriodicity(periodicidade);
            if (periodicity === 'Trimestral') return 4;
            if (periodicity === 'Semestral') return 2;
            return 1;
        }

        function normalizeReportMonths(meses) {
            const arr = Array.isArray(meses) ? meses : [];
            const normalized = arr
                .map((m) => Number(m))
                .filter((m) => Number.isInteger(m) && m >= 1 && m <= 12);
            return [...new Set(normalized)].sort((a, b) => a - b);
        }

        function getLegacyReportMonth(dataEntregaRelatorio) {
            if (!dataEntregaRelatorio) return null;
            const parsed = new Date(`${dataEntregaRelatorio}T00:00:00`);
            if (Number.isNaN(parsed.getTime())) return null;
            return parsed.getMonth() + 1;
        }

        function getLegacyReportYear(dataEntregaRelatorio) {
            if (!dataEntregaRelatorio) return null;
            const parsed = new Date(`${dataEntregaRelatorio}T00:00:00`);
            if (Number.isNaN(parsed.getTime())) return null;
            return parsed.getFullYear();
        }

        function getProjectReportConfig(project) {
            const periodicidadeRelatorio = normalizeReportPeriodicity(project?.periodicidadeRelatorio);
            const mesesConfig = normalizeReportMonths(project?.mesesEntregaRelatorio);
            const legacyMonth = getLegacyReportMonth(project?.dataEntregaRelatorio);
            const mesesEntregaRelatorio = mesesConfig.length > 0
                ? mesesConfig
                : (legacyMonth ? [legacyMonth] : []);
            const rawYear = Number(project?.anoBaseBienal);
            const legacyYear = getLegacyReportYear(project?.dataEntregaRelatorio);
            const anoBaseBienal = Number.isInteger(rawYear) && rawYear >= 2000
                ? rawYear
                : (legacyYear || null);
            return { periodicidadeRelatorio, mesesEntregaRelatorio, anoBaseBienal };
        }

        function validateReportSchedule({ periodicidadeRelatorio, mesesEntregaRelatorio, anoBaseBienal }) {
            const periodicidade = normalizeReportPeriodicity(periodicidadeRelatorio);
            const months = normalizeReportMonths(mesesEntregaRelatorio);
            const required = requiredMonthCount(periodicidade);
            if (months.length !== required) {
                return {
                    ok: false,
                    message: `Para periodicidade ${periodicidade}, selecione exatamente ${required} mês(es) de entrega.`
                };
            }
            if (periodicidade === 'Bienal') {
                const ano = Number(anoBaseBienal);
                if (!Number.isInteger(ano) || ano < 2000) {
                    return {
                        ok: false,
                        message: 'Informe um ano base válido (>= 2000) para periodicidade bienal.'
                    };
                }
            }
            return { ok: true, message: '' };
        }

        function formatReportMonths(meses) {
            const months = normalizeReportMonths(meses);
            if (months.length === 0) return 'Não definido';
            return months.map(getMonthLabel).join(', ');
        }

        function buildProjectReportOccurrences(project, fromYear, toYear) {
            const occurrences = [];
            const hasStructuredSchedule = !!project?.periodicidadeRelatorio || normalizeReportMonths(project?.mesesEntregaRelatorio).length > 0;
            if (!hasStructuredSchedule && project?.dataEntregaRelatorio) {
                const legacyDate = new Date(`${project.dataEntregaRelatorio}T00:00:00`);
                if (!Number.isNaN(legacyDate.getTime())) {
                    const legacyYear = legacyDate.getFullYear();
                    const legacyMonth = legacyDate.getMonth() + 1;
                    if (legacyYear >= fromYear && legacyYear <= toYear) {
                        occurrences.push({
                            projectId: project.id,
                            projectName: project.nome || project.id,
                            periodicidadeRelatorio: 'Legado',
                            month: legacyMonth,
                            year: legacyYear,
                            monthKey: `${legacyYear}-${String(legacyMonth).padStart(2, '0')}`,
                            sortDate: new Date(legacyYear, legacyMonth - 1, 1)
                        });
                    }
                }
                return occurrences;
            }

            const config = getProjectReportConfig(project);
            const months = normalizeReportMonths(config.mesesEntregaRelatorio);
            if (months.length === 0) return occurrences;

            const startYear = Number(fromYear);
            const endYear = Number(toYear);
            if (!Number.isInteger(startYear) || !Number.isInteger(endYear) || endYear < startYear) {
                return occurrences;
            }

            for (let year = startYear; year <= endYear; year += 1) {
                if (config.periodicidadeRelatorio === 'Bienal') {
                    const base = Number(config.anoBaseBienal);
                    if (!Number.isInteger(base) || base < 2000) continue;
                    if ((year - base) % 2 !== 0) continue;
                }
                months.forEach((month) => {
                    occurrences.push({
                        projectId: project.id,
                        projectName: project.nome || project.id,
                        periodicidadeRelatorio: config.periodicidadeRelatorio,
                        month,
                        year,
                        monthKey: `${year}-${String(month).padStart(2, '0')}`,
                        sortDate: new Date(year, month - 1, 1)
                    });
                });
            }
            return occurrences;
        }

        function normalizeAgencyName(value) {
            return String(value || '').trim().replace(/\s+/g, ' ');
        }

        function getAgencyOptions({ licenses, erosions }) {
            const map = new Map();
            const upsert = (value, source) => {
                const cleaned = normalizeAgencyName(value);
                if (!cleaned) return;
                const key = cleaned.toLowerCase();
                const current = map.get(key);
                if (!current) {
                    map.set(key, { value: cleaned, source });
                    return;
                }
                if (current.source === 'history' && source === 'catalog') {
                    map.set(key, { value: current.value, source: 'catalog' });
                }
            };

            ENVIRONMENTAL_AGENCY_CATALOG.forEach((item) => upsert(item, 'catalog'));
            (licenses || []).forEach((item) => upsert(item?.orgaoAmbiental, 'history'));
            (erosions || []).forEach((erosion) => {
                (Array.isArray(erosion?.acompanhamentosResumo) ? erosion.acompanhamentosResumo : []).forEach((event) => {
                    if (normalizeFollowupEventType(event) !== 'autuacao') return;
                    upsert(event?.orgao, 'history');
                });
            });

            return [...map.values()].sort((a, b) => a.value.localeCompare(b.value, 'pt-BR'));
        }

        function buildLicenseReportOccurrences(license, projectsById, startYear, endYear) {
            const rows = [];
            const coverage = (Array.isArray(license?.cobertura) ? license.cobertura : [])
                .map((item) => ({
                    projetoId: String(item?.projetoId || '').trim(),
                    torres: [...new Set((Array.isArray(item?.torres) ? item.torres : []).map((tower) => String(tower || '').trim()).filter(Boolean))]
                }))
                .filter((item) => item.projetoId);
            if (coverage.length === 0) return rows;
            if (String(license?.status || '').trim().toLowerCase() === 'inativa') return rows;
            const periodicidade = normalizeReportPeriodicity(license?.periodicidadeRelatorio);
            const months = normalizeReportMonths(license?.mesesEntregaRelatorio);
            if (months.length === 0) return rows;

            for (let year = startYear; year <= endYear; year += 1) {
                if (periodicidade === 'Bienal') {
                    const base = Number(license?.anoBaseBienal);
                    if (!Number.isInteger(base) || base < 2000) continue;
                    if ((year - base) % 2 !== 0) continue;
                }
                months.forEach((month) => {
                    const ref = new Date(year, month - 1, 1);
                    const start = license?.inicioVigencia ? new Date(`${license.inicioVigencia}T00:00:00`) : null;
                    const end = license?.fimVigencia ? new Date(`${license.fimVigencia}T23:59:59`) : null;
                    if (start && !Number.isNaN(start.getTime()) && ref < start) return;
                    if (end && !Number.isNaN(end.getTime()) && ref > end) return;

                    const projectIds = [...new Set(coverage.map((item) => item.projetoId))];
                    const projectNames = projectIds.map((id) => projectsById.get(id)?.nome || id);
                    const scopeSummary = coverage.map((item) => `${item.projetoId}: ${item.torres.join(', ')}`).join(' | ');

                    rows.push({
                        scopeType: 'lo',
                        scopeId: String(license?.id || '').trim(),
                        loId: String(license?.id || '').trim(),
                        loNumero: String(license?.numero || '').trim(),
                        orgaoAmbiental: String(license?.orgaoAmbiental || '').trim(),
                        esfera: String(license?.esfera || 'Federal').trim(),
                        uf: String(license?.uf || '').trim(),
                        projectIds,
                        projectNames,
                        scopeSummary,
                        month,
                        year,
                        monthKey: `${year}-${String(month).padStart(2, '0')}`,
                        sortDate: new Date(year, month - 1, 1).getTime()
                    });
                });
            }
            return rows;
        }

        function buildEffectiveReportOccurrences({ projects, licenses, startYear, endYear }) {
            const projectsById = new Map((projects || []).map((item) => [String(item?.id || '').trim(), item]));
            const loOccurrences = (licenses || []).flatMap((license) =>
                buildLicenseReportOccurrences(license, projectsById, startYear, endYear)
            );
            const coveredProjectMonth = new Set();
            loOccurrences.forEach((occ) => {
                (occ.projectIds || []).forEach((projectId) => coveredProjectMonth.add(`${projectId}|${occ.monthKey}`));
            });

            const fallback = (projects || [])
                .flatMap((project) => buildProjectReportOccurrences(project, startYear, endYear))
                .filter((occ) => !coveredProjectMonth.has(`${occ.projectId}|${occ.monthKey}`))
                .map((occ) => ({
                    scopeType: 'project_fallback',
                    scopeId: occ.projectId,
                    projectIds: [occ.projectId],
                    projectNames: [occ.projectName],
                    scopeSummary: occ.projectName ? `${occ.projectId}: ${occ.projectName}` : occ.projectId,
                    month: occ.month,
                    year: occ.year,
                    monthKey: occ.monthKey,
                    sortDate: occ.sortDate.getTime ? occ.sortDate.getTime() : Number(occ.sortDate)
                }));

            return [...loOccurrences, ...fallback].sort((a, b) => a.sortDate - b.sortDate);
        }

        function calculateCriticality(dados, rulesConfig = RULES_DATABASE) {
            let maxScore = 0;
            let resultado = { impacto: 'Baixo', score: 1, frequencia: '24 meses', intervencao: 'Monitoramento visual' };
            const sourceRules = normalizeRulesConfig(rulesConfig);
            
            const criterios = [
                { campo: 'tipo', valor: dados.tipo?.toLowerCase() },
                { campo: 'estagio', valor: dados.estagio?.toLowerCase() },
                { campo: 'profundidade', valor: dados.profundidade },
                { campo: 'declividade', valor: dados.declividade },
                { campo: 'largura', valor: dados.largura }
            ];
            
            criterios.forEach(c => {
                if (!c.valor) return;
                const chave = `${c.campo}|${c.valor}`;
                const regra = sourceRules[chave];
                if (regra && regra.score > maxScore) {
                    maxScore = regra.score;
                    resultado = regra;
                }
            });
            
            return resultado;
        }

        function formatCoordinates(lat, lng) {
            if (!lat || !lng) return 'Não informado';
            const latDir = lat >= 0 ? 'N' : 'S';
            const lngDir = lng >= 0 ? 'E' : 'W';
            return `${Math.abs(lat).toFixed(6)}° ${latDir}, ${Math.abs(lng).toFixed(6)}° ${lngDir}`;
        }

        function normalizeFollowupHistory(value) {
            return Array.isArray(value) ? value.filter(Boolean) : [];

        function normalizeErosionStatus(value) {
            const normalized = String(value || '').trim().toLowerCase();
            if (['monitorado', 'monitoramento', 'monitoring'].includes(normalized)) return 'Monitoramento';
            if (['estabilizado', 'stabilized', 'resolvido', 'resolvida', 'resolved'].includes(normalized)) return 'Estabilizado';
            return 'Ativo';
        }

        function normalizeErosionInspectionIds(erosion) {
            const primary = String(erosion?.vistoriaId || '').trim();
            const list = Array.isArray(erosion?.vistoriaIds) ? erosion.vistoriaIds : [];
            const pendencies = Array.isArray(erosion?.pendenciasVistoria) ? erosion.pendenciasVistoria : [];
            const fromPendencies = pendencies.map((item) => String(item?.vistoriaId || '').trim());
            return [...new Set([primary, ...list.map((item) => String(item || '').trim()), ...fromPendencies].filter(Boolean))];
        }

        function normalizeInspectionPendencies(value) {
            const raw = Array.isArray(value) ? value : [];
            const dedup = new Map();
            raw.forEach((item) => {
                const vistoriaId = String(item?.vistoriaId || '').trim();
                if (!vistoriaId) return;
                dedup.set(vistoriaId, {
                    vistoriaId,
                    status: String(item?.status || '').trim().toLowerCase() === 'visitada' ? 'visitada' : 'pendente',
                    dia: String(item?.dia || '').trim()
                });
            });
            return [...dedup.values()];
        }

        function upsertInspectionPendency(erosion, inspectionId, patch = {}) {
            const vistoriaId = String(inspectionId || '').trim();
            if (!vistoriaId) return normalizeInspectionPendencies(erosion?.pendenciasVistoria);
            const current = normalizeInspectionPendencies(erosion?.pendenciasVistoria);
            const map = new Map(current.map((item) => [item.vistoriaId, item]));
            const prev = map.get(vistoriaId) || { vistoriaId, status: 'pendente', dia: '' };
            map.set(vistoriaId, { ...prev, ...patch, vistoriaId });
            return [...map.values()];
        }

        function getInspectionPendency(erosion, inspectionId) {
            const vistoriaId = String(inspectionId || '').trim();
            if (!vistoriaId) return null;
            return normalizeInspectionPendencies(erosion?.pendenciasVistoria)
                .find((item) => item.vistoriaId === vistoriaId) || null;
        }

        function toBrDate(value) {
            const text = String(value || '').trim();
            if (!text) return '';
            const isoMatch = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (isoMatch) return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;
            const brMatch = text.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
            if (brMatch) return text;
            return '';
        }

        function isBrDateValid(value) {
            const text = String(value || '').trim();
            const match = text.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
            if (!match) return false;
            const day = Number(match[1]);
            const month = Number(match[2]);
            const year = Number(match[3]);
            if (!Number.isInteger(day) || !Number.isInteger(month) || !Number.isInteger(year)) return false;
            if (month < 1 || month > 12 || day < 1 || day > 31) return false;
            const date = new Date(year, month - 1, day);
            return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
        }

        function validateErosionLocation(data) {
            const localTipo = String(data?.localTipo || '').trim();
            const localDescricao = String(data?.localDescricao || '').trim();
            if (!localTipo) return { ok: false, message: 'Selecione o local da erosão.' };
            if (!EROSION_LOCATION_OPTIONS.includes(localTipo)) return { ok: false, message: 'Opção de local inválida.' };
            if (localTipo === 'Outros' && !localDescricao) return { ok: false, message: 'Descreva o local quando selecionar "Outros".' };
            return { ok: true, message: '' };
        }

        function buildFollowupEvent(previous, next, meta = {}) {
            const origem = meta.origem || (meta.isCreate ? 'cadastro' : 'edicao');
            const statusAnterior = previous ? normalizeErosionStatus(previous.status) : undefined;
            const statusNovo = normalizeErosionStatus(next.status);
            const changedStatus = statusAnterior !== statusNovo;
            const changedTower = String(previous?.torreRef || '') !== String(next?.torreRef || '');
            const changedLocal = String(previous?.localTipo || '') !== String(next?.localTipo || '');
            const changedObs = String(previous?.obs || '') !== String(next?.obs || '');
            const relevant = origem === 'cadastro' || origem === 'vistoria' || changedStatus || changedTower || changedLocal || changedObs;
            if (!relevant) return null;

            let resumo = 'Atualização da erosão.';
            if (origem === 'cadastro') resumo = 'Cadastro inicial da erosão.';
            if (origem === 'vistoria') resumo = 'Erosão registrada durante vistoria.';
            if (origem === 'edicao') {
                const pieces = [];
                if (changedStatus) pieces.push(`status alterado de ${statusAnterior} para ${statusNovo}`);
                if (changedTower) pieces.push('torre alterada');
                if (changedLocal) pieces.push('local alterado');
                if (changedObs) pieces.push('observações atualizadas');
                if (pieces.length > 0) resumo = pieces.join(' | ');
            }

            return {
                timestamp: new Date().toISOString(),
                usuario: meta.updatedBy || '',
                origem,
                tipoEvento: 'sistema',
                ...(next.vistoriaId ? { vistoriaId: String(next.vistoriaId) } : {}),
                ...(statusAnterior ? { statusAnterior } : {}),
                statusNovo,
                resumo
            };
        }

        function normalizeFollowupEventType(item) {
            const raw = String(item?.tipoEvento || '').trim().toLowerCase();
            if (raw === 'obra') return 'obra';
            if (raw === 'autuacao') return 'autuacao';
            return 'sistema';
        }

        function buildManualFollowupEvent(data, meta = {}) {
            const tipoEvento = String(data?.tipoEvento || '').trim().toLowerCase();
            const usuario = String(meta?.updatedBy || '').trim();
            if (tipoEvento === 'obra') {
                const obraEtapa = String(data?.obraEtapa || '').trim();
                const descricao = String(data?.descricao || '').trim();
                if (!obraEtapa || !descricao) return null;
                const etapa = obraEtapa.toLowerCase();
                return {
                    timestamp: new Date().toISOString(),
                    usuario,
                    origem: 'manual',
                    tipoEvento: 'obra',
                    obraEtapa,
                    descricao,
                    ...((etapa === 'concluída' || etapa === 'concluida') ? { statusNovo: 'Estabilizado' } : {}),
                    resumo: `Obra - ${obraEtapa}: ${descricao}`
                };
            }
            if (tipoEvento === 'autuacao') {
                const orgao = String(data?.orgao || '').trim();
                const numeroOuDescricao = String(data?.numeroOuDescricao || '').trim();
                const autuacaoStatus = String(data?.autuacaoStatus || '').trim();
                if (!orgao || !numeroOuDescricao || !autuacaoStatus) return null;
                return {
                    timestamp: new Date().toISOString(),
                    usuario,
                    origem: 'manual',
                    tipoEvento: 'autuacao',
                    orgao,
                    numeroOuDescricao,
                    autuacaoStatus,
                    resumo: `Autuação (${orgao}) - ${autuacaoStatus}: ${numeroOuDescricao}`
                };
            }
            return null;
        }

        function appendFollowupEvent(history, event) {
            const base = normalizeFollowupHistory(history);
            if (!event) return base;
            return [...base, event].slice(-100);
        }

        function toIsoDate(value) {
            if (!value) return null;
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return null;
            return d.toISOString().slice(0, 10);
        }

        function normalizeProjectKey(value) {
            return String(value || '').trim().toLowerCase();
        }

        function resolveErosionProjectId(erosion, inspectionsById = new Map()) {
            const explicit = normalizeProjectKey(erosion?.projetoId);
            if (explicit) return explicit;
            const inspectionIds = normalizeErosionInspectionIds(erosion);
            for (let i = 0; i < inspectionIds.length; i += 1) {
                const inspection = inspectionsById.get(inspectionIds[i]);
                const project = normalizeProjectKey(inspection?.projetoId);
                if (project) return project;
            }
            return '';
        }

        function resolveErosionDate(erosion, inspectionsById = new Map()) {
            const candidates = [
                erosion?.ultimaAtualizacao,
                erosion?.updatedAt,
                erosion?.createdAt,
                erosion?.dataCadastro,
                erosion?.data
            ];
            normalizeErosionInspectionIds(erosion).forEach((inspectionId) => {
                const inspection = inspectionsById.get(inspectionId);
                if (inspection) candidates.push(inspection?.dataFim, inspection?.dataInicio, inspection?.data);
            });
            for (let i = 0; i < candidates.length; i += 1) {
                const parsed = toIsoDate(candidates[i]);
                if (parsed) return parsed;
            }
            return null;
        }

        function filterErosionsForReport(erosions, filters, inspections = []) {
            const projectId = normalizeProjectKey(filters?.projetoId);
            const selectedYearsRaw = Array.isArray(filters?.anos) ? filters.anos : [];
            const selectedYears = new Set(
                selectedYearsRaw
                    .map((year) => Number(year))
                    .filter((year) => Number.isInteger(year) && year >= 1900 && year <= 9999)
            );
            const inspectionsById = new Map((inspections || []).map((item) => [String(item?.id || '').trim(), item]));
            return (erosions || []).filter((item) => {
                if (resolveErosionProjectId(item, inspectionsById) !== projectId) return false;
                if (selectedYears.size === 0) return true;
                const rowDate = resolveErosionDate(item, inspectionsById);
                if (!rowDate) return false;
                const year = Number(String(rowDate).slice(0, 4));
                return selectedYears.has(year);
            });
        }

        function buildReportRows(erosions) {
            return (erosions || []).map((item) => ({
                id: item.id || '',
                projetoId: item.projetoId || '',
                vistoriaId: item.vistoriaId || '',
                torreRef: item.torreRef || '',
                localTipo: item.localTipo || '',
                localDescricao: item.localDescricao || '',
                tipo: item.tipo || '',
                estagio: item.estagio || '',
                profundidade: item.profundidade || '',
                declividade: item.declividade || '',
                largura: item.largura || '',
                status: normalizeErosionStatus(item.status),
                impacto: item.impacto || '',
                score: item.score || '',
                frequencia: item.frequencia || '',
                intervencao: item.intervencao || '',
                latitude: item.latitude || '',
                longitude: item.longitude || '',

        function buildErosionsCsv(rows) {
            const headers = ['id', 'projetoId', 'vistoriaId', 'torreRef', 'localTipo', 'localDescricao', 'tipo', 'estagio', 'profundidade', 'declividade', 'largura', 'status', 'impacto', 'score', 'frequencia', 'intervencao', 'latitude', 'longitude', 'ultimaAtualizacao', 'atualizadoPor'];
            const escapeValue = (value) => {
                const text = String(value ?? '');
                if (!/[",\n;]/.test(text)) return text;
                return `"${text.replace(/"/g, '""')}"`;
            };
            const lines = [headers.join(';')];
            rows.forEach((row) => lines.push(headers.map((key) => escapeValue(row[key])).join(';')));
            return lines.join('\n');
        }

        function downloadTextFile(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function computeVisitPlanning({ project, inspections, erosions, year = new Date().getFullYear() }) {
            const projectId = String(project?.id || '').trim();
            if (!projectId) {
                return {
                    obrigatorias: [],
                    amostragemSelecionada: [],
                    naoPriorizar: [],
                    metaAmostragem: 0,
                    totalTorres: 0,
                    seed: ''
                };
            }

            const normalizeTower = (value) => String(value ?? '').trim();
            const toDate = (value) => {
                if (!value) return null;
                const d = new Date(`${value}T00:00:00`);
                return Number.isNaN(d.getTime()) ? null : d;
            };
            const samplingRate = (total) => {
                if (total <= 100) return 0.30;
                if (total <= 200) return 0.20;
                if (total <= 400) return 0.18;
                return 0.15;
            };
            const hashStringSeed = (input) => {
                const text = String(input || '');
                let hash = 2166136261;
                for (let i = 0; i < text.length; i += 1) {
                    hash ^= text.charCodeAt(i);
                    hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
                }
                return hash >>> 0;
            };
            const createPrng = (seedNumber) => {
                let t = seedNumber >>> 0;
                return () => {
                    t += 0x6D2B79F5;
                    let n = Math.imul(t ^ (t >>> 15), 1 | t);
                    n ^= n + Math.imul(n ^ (n >>> 7), 61 | n);
                    return ((n ^ (n >>> 14)) >>> 0) / 4294967296;
                };
            };
            const shuffled = (values, seedValue) => {
                const list = [...values];
                const rand = createPrng(hashStringSeed(seedValue));
                for (let i = list.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(rand() * (i + 1));
                    [list[i], list[j]] = [list[j], list[i]];
                }
                return list;
            };
            const sortTowers = (values) => [...values].sort((a, b) => compareTowerNumbers(a, b));
            const collectVisitedTowers = (inspection) => {
                const set = new Set();
                (inspection?.detalhesDias || []).forEach((day) => {
                    (day?.torresDetalhadas || []).forEach((tower) => {
                        const normalized = normalizeTower(tower?.numero);
                        if (normalized) set.add(normalized);
                    });
                });
                return set;
            };

            const projectInspections = (inspections || [])
                .filter((item) => String(item?.projetoId || '').trim() === projectId)
                .sort((a, b) => (toDate(b?.dataInicio || b?.data)?.getTime() || 0) - (toDate(a?.dataInicio || a?.data)?.getTime() || 0));
            const projectErosions = (erosions || []).filter((item) => String(item?.projetoId || '').trim() === projectId);
            const mandatorySet = new Set(projectErosions.map((item) => normalizeTower(item?.torreRef)).filter(Boolean));

            const towerSet = new Set();
            const total = Number(project?.torres || 0);
            if (Number.isInteger(total) && total > 0 && total <= 5000) {
                for (let i = 1; i <= total; i += 1) towerSet.add(String(i));
            }
            projectInspections.forEach((inspection) => {
                collectVisitedTowers(inspection).forEach((tower) => towerSet.add(tower));
            });
            projectErosions.forEach((item) => {
                const tower = normalizeTower(item?.torreRef);
                if (tower) towerSet.add(tower);
            });

            const allTowers = sortTowers([...towerSet]);
            const totalTorres = allTowers.length;
            const metaAmostragem = Math.ceil(totalTorres * samplingRate(totalTorres));
            const extraWhenOverflow = Math.ceil(totalTorres * 0.05);
            const seed = `${projectId}|${year}|${totalTorres}|${projectInspections.length}|${projectErosions.length}`;
            const lastTwo = projectInspections.slice(0, 2);

            const collectTowerComments = (tower, limit = 5) => {
                const comments = [];
                projectInspections.forEach((inspection) => {
                    (inspection?.detalhesDias || []).forEach((day) => {
                        (day?.torresDetalhadas || []).forEach((t) => {
                            if (normalizeTower(t?.numero) !== tower) return;
                            const obs = String(t?.obs || '').trim();
                            if (!obs) return;
                            comments.push({
                                inspectionId: inspection?.id || '',
                                data: day?.data || inspection?.dataInicio || inspection?.data || '',
                                obs
                            });
                        });
                    });
                });
                return comments.sort((a, b) => String(b.data || '').localeCompare(String(a.data || ''))).slice(0, limit);
            };

            const getTowerMapsLink = (tower) => {
                const coords = Array.isArray(project?.torresCoordenadas) ? project.torresCoordenadas : [];
                const projectTower = coords.find((item) => normalizeTower(item?.numero) === tower);
                const lat = Number(projectTower?.latitude);
                const lng = Number(projectTower?.longitude);
                if (Number.isFinite(lat) && Number.isFinite(lng)) return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;

                const fallback = [...projectErosions]
                    .filter((item) => normalizeTower(item?.torreRef) === tower)
                    .sort((a, b) => String(b?.ultimaAtualizacao || '').localeCompare(String(a?.ultimaAtualizacao || '')))[0];
                const flat = Number(fallback?.latitude);
                const flng = Number(fallback?.longitude);
                if (Number.isFinite(flat) && Number.isFinite(flng)) return `https://www.google.com/maps/search/?api=1&query=${flat},${flng}`;
                return '';
            };

            const buildItem = (tower, motivo, categoria) => ({
                torre: tower,
                motivo,
                categoria,
                comentariosAnteriores: collectTowerComments(tower),
                mapsLink: getTowerMapsLink(tower)
            });

            const obrigatorias = sortTowers([...mandatorySet]).map((tower) => buildItem(tower, 'Possui histórico de erosão cadastrado.', 'obrigatoria'));
            const candidatesNotVisited = [];
            const candidatesInsufficient = [];
            const candidatesNaoPriorizar = [];

            allTowers.forEach((tower) => {
                if (mandatorySet.has(tower)) return;
                if (lastTwo.length < 2) {
                    candidatesInsufficient.push(buildItem(tower, 'Histórico insuficiente (menos de 2 vistorias recentes).', 'nao_priorizar'));
                    return;
                }
                const visitedCount = lastTwo.reduce((acc, inspection) => acc + (collectVisitedTowers(inspection).has(tower) ? 1 : 0), 0);
                if (visitedCount === 0) {
                    candidatesNotVisited.push(buildItem(tower, 'Não foi visitada nas 2 últimas vistorias.', 'amostragem'));
                    return;
                }
                candidatesNaoPriorizar.push(buildItem(
                    tower,
                    visitedCount === 1
                        ? 'Visitada em 1 das 2 últimas vistorias (sem erosão recente).'
                        : 'Visitada nas 2 últimas vistorias (sem erosão recente).',
                    'nao_priorizar'
                ));
            });

            const selectFromGroups = (groups, count) => {
                const selected = [];
                for (let g = 0; g < groups.length; g += 1) {
                    if (selected.length >= count) break;
                    const group = groups[g];
                    if (!group || group.length === 0) continue;
                    const shuffledGroup = shuffled(group, `${seed}|g${g}`);
                    for (let i = 0; i < shuffledGroup.length; i += 1) {
                        if (selected.length >= count) break;
                        selected.push(shuffledGroup[i]);
                    }
                }
                return selected;
            };

            const fillTarget = obrigatorias.length > metaAmostragem
                ? obrigatorias.length + extraWhenOverflow
                : metaAmostragem;
            const needNonMandatory = Math.max(0, fillTarget - obrigatorias.length);
            const amostragemSelecionada = selectFromGroups(
                [candidatesNotVisited, candidatesInsufficient, candidatesNaoPriorizar],
                needNonMandatory
            )
                .map((item) => ({ ...item, categoria: 'amostragem' }))
                .sort((a, b) => Number(a.torre) - Number(b.torre));

            const sampledSet = new Set(amostragemSelecionada.map((item) => item.torre));
            const naoPriorizar = [...candidatesInsufficient, ...candidatesNaoPriorizar].filter((item) => !sampledSet.has(item.torre));

            return {
                obrigatorias,
                amostragemSelecionada,
                naoPriorizar,
                metaAmostragem,
                totalTorres,
                seed
            };
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function formatPhone(value) {
            const cleaned = value.replace(/\D/g, '');
            if (cleaned.length <= 10) {
                return cleaned.replace(/(\d{2})(\d{4})(\d{0,4})/, (match, p1, p2, p3) => {
                    if (p3) return `(${p1}) ${p2}-${p3}`;
                    if (p2) return `(${p1}) ${p2}`;
                    if (p1) return `(${p1}`;
                    return match;
                });
            } else {
                return cleaned.replace(/(\d{2})(\d{5})(\d{0,4})/, (match, p1, p2, p3) => {
                    if (p3) return `(${p1}) ${p2}-${p3}`;
                    if (p2) return `(${p1}) ${p2}`;
                    if (p1) return `(${p1}`;
                    return match;
                });
            }
        }

        function generateDaysList(dataInicio, dataFim, previousDays = []) {
            if (!dataInicio) return [];

            const start = new Date(`${dataInicio}T00:00:00`);
            const rawEnd = dataFim ? new Date(`${dataFim}T00:00:00`) : start;
            const end = rawEnd >= start ? rawEnd : start;
            const dayMs = 24 * 60 * 60 * 1000;
            const maxDays = 90;
            const result = [];

            const existingByDate = new Map(
                (previousDays || []).map((d) => [d.data, d])
            );

            for (let cursor = start.getTime(), i = 0; cursor <= end.getTime() && i < maxDays; cursor += dayMs, i += 1) {
                const date = new Date(cursor).toISOString().split('T')[0];
                const prev = existingByDate.get(date) || {};
                const torresInput = prev.torresInput ?? prev.torres ?? '';
                result.push({
                    data: date,
                    clima: prev.clima || '',
                    torresInput,
                    torres: torresInput,
                    torresDetalhadas: Array.isArray(prev.torresDetalhadas) ? prev.torresDetalhadas : [],
                    hotelNome: prev.hotelNome || '',
                    hotelMunicipio: prev.hotelMunicipio || '',
                    hotelLogisticaNota: prev.hotelLogisticaNota ?? '',
                    hotelReservaNota: prev.hotelReservaNota ?? '',
                    hotelEstadiaNota: prev.hotelEstadiaNota ?? '',
                    hotelTorreBase: prev.hotelTorreBase || ''
                });
            }

            return result;
        }

        function parseTowerInput(input, maxExpansions = 300) {
            const cleaned = String(input || '').trim();
            if (!cleaned) {
                return { numbers: [], exceededLimit: false, invalidTokens: [] };
            }

            const unique = new Set();
            const invalidTokens = [];
            let exceededLimit = false;

            const tokens = cleaned.split(',').map(t => t.trim()).filter(Boolean);
            for (const token of tokens) {
                if (/^\d+$/.test(token)) {
                    unique.add(Number(token));
                    if (unique.size > maxExpansions) {
                        exceededLimit = true;
                        break;
                    }
                    continue;
                }

                if (/^\d+\s*-\s*\d+$/.test(token)) {
                    const [a, b] = token.split('-').map(v => Number(v.trim()));
                    const start = Math.min(a, b);
                    const end = Math.max(a, b);
                    for (let n = start; n <= end; n += 1) {
                        unique.add(n);
                        if (unique.size > maxExpansions) {
                            exceededLimit = true;
                            break;
                        }
                    }
                    if (exceededLimit) break;
                    continue;
                }

                invalidTokens.push(token);
            }

            return {
                numbers: [...unique].filter(n => Number.isFinite(n)).sort((a, b) => a - b),
                exceededLimit,
                invalidTokens
            };
        }

        function getTowerCoords(project, towerNumber) {
            if (!project || towerNumber === undefined || towerNumber === null || towerNumber === '') return null;
            const ref = String(towerNumber).trim();

            const readPoint = (point) => {
                if (!point) return null;
                const latitude = point.latitude ?? point.lat;
                const longitude = point.longitude ?? point.lng ?? point.lon;
                if (latitude === undefined || longitude === undefined) return null;
                return { latitude: String(latitude), longitude: String(longitude) };
            };

            const candidates = [
                project.torresCoordenadas,
                project.towerCoordinates,
                project.torresDetalhes,
                project.torresDetalhadas
            ];

            for (const c of candidates) {
                if (!c) continue;

                if (Array.isArray(c)) {
                    const found = c.find((item) => {
                        const tag = item?.numero ?? item?.torre ?? item?.id;
                        return String(tag || '').trim() === ref;
                    });
                    const point = readPoint(found);
                    if (point) return point;
                } else if (typeof c === 'object') {
                    const direct = readPoint(c[ref]);
                    if (direct) return direct;
                }
            }

            return null;
        }

        function normalizeCoordinateString(value) {
            const raw = String(value ?? '').trim();
            if (!raw) return '';
            const normalized = raw.replace(',', '.');
            const num = Number(normalized);
            if (!Number.isFinite(num)) return '';
            return String(num);
        }

        function normalizeForSearch(text) {
            return String(text ?? '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        function hasPorticoMarker(text) {
            const raw = String(text ?? '').toLowerCase();
            if (!raw) return false;

            const normalized = normalizeForSearch(raw);
            if (normalized.includes('portico')) return true;

            const asciiOnly = raw.replace(/[^a-z]/g, '');
            return asciiOnly.includes('portico') || asciiOnly.includes('prtico');
        }

        function formatTowerId(numberPart, suffixPart = '') {
            const base = Number.parseInt(String(numberPart ?? '').replace(/^0+/, '') || '0', 10);
            if (!Number.isFinite(base) || base < 0) return '';
            return `${base}${String(suffixPart || '').toUpperCase()}`;
        }

        function normalizeTowerToken(raw) {
            const token = String(raw ?? '').trim();
            if (!token) return '';
            if (hasPorticoMarker(token)) return '0';

            const compact = token.replace(/\s+/g, '').toUpperCase();
            const match = compact.match(/^0*(\d+)([A-Z]?)$/);
            if (!match) return '';
            return formatTowerId(match[1], match[2]);
        }

        function normalizeTowerNumber(raw) {
            const text = String(raw ?? '').trim();
            if (!text) return '';
            if (hasPorticoMarker(text)) return '0';
            const explicit = text.match(/^(?:torre|tor|t)\s*[-_: ]?\s*0*(\d+)([a-zA-Z]?)$/i);
            if (explicit) return formatTowerId(explicit[1], explicit[2]);
            return normalizeTowerToken(text);
        }

        function findTowerIdFromSource(source) {
            const text = String(source ?? '').trim();
            if (!text) return '';
            if (hasPorticoMarker(text)) return '0';

            const explicit = text.match(/(?:torre|tor|t)\s*[-_: ]?\s*0*(\d+)([a-zA-Z]?)/i);
            if (explicit) return formatTowerId(explicit[1], explicit[2]);

            const tokens = text.match(/[A-Za-z0-9]+/g) || [];
            for (let i = tokens.length - 1; i >= 0; i -= 1) {
                const token = tokens[i];
                const normalized = normalizeTowerToken(token);
                if (!normalized) continue;

                const isSingleMixedToken =
                    tokens.length === 1 && /[A-Za-z]/.test(token) && /\d/.test(token);
                if (isSingleMixedToken) continue;

                return normalized;
            }

            return '';
        }

        function extractTowerNumberFromText(...sources) {
            for (const source of sources) {
                const found = findTowerIdFromSource(source);
                if (found) return found;
            }
            return '';
        }

        function parseTowerSortParts(value) {
            const normalized = normalizeTowerNumber(value);
            if (!normalized) return null;
            const match = normalized.match(/^(\d+)([A-Z]?)$/);
            if (!match) return null;

            return {
                base: Number(match[1]),
                suffix: match[2] || '',
                normalized
            };
        }

        function sanitizeProjectId(raw) {
            return String(raw ?? '')
                .replace(/\.[^/.]+$/, '')
                .toUpperCase()
                .replace(/[^A-Z0-9]/g, '')
                .slice(0, 12);
        }

        function parseCoordinateTuple(raw) {
            const tuple = String(raw ?? '').trim();
            if (!tuple) return null;
            const [lonRaw, latRaw, altRaw] = tuple.split(',');
            const lat = Number(String(latRaw ?? '').trim().replace(',', '.'));
            const lon = Number(String(lonRaw ?? '').trim().replace(',', '.'));
            if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            const alt = Number(String(altRaw ?? '').trim().replace(',', '.'));
            return { lat, lon, alt: Number.isFinite(alt) ? alt : null };
        }

        function parseCoordinatePath(raw) {
            return String(raw ?? '')
                .trim()
                .split(/\s+/)
                .map(parseCoordinateTuple)
                .filter(Boolean);
        }

        function haversineDistanceKm(a, b) {
            const earthRadiusKm = 6371.0088;
            const lat1 = (a.lat * Math.PI) / 180;
            const lat2 = (b.lat * Math.PI) / 180;
            const dLat = ((b.lat - a.lat) * Math.PI) / 180;
            const dLon = ((b.lon - a.lon) * Math.PI) / 180;
            const sinDLat = Math.sin(dLat / 2);
            const sinDLon = Math.sin(dLon / 2);
            const h = sinDLat * sinDLat + Math.cos(lat1) * Math.cos(lat2) * sinDLon * sinDLon;
            return 2 * earthRadiusKm * Math.asin(Math.min(1, Math.sqrt(h)));
        }

        function getPathLengthKm(path) {
            if (!Array.isArray(path) || path.length < 2) return 0;
            let total = 0;
            for (let i = 0; i < path.length - 1; i += 1) {
                total += haversineDistanceKm(path[i], path[i + 1]);
            }
            return total;
        }

        function extractDocumentName(xml) {
            return (
                xml.getElementsByTagName('Document')?.[0]
                    ?.getElementsByTagName('name')?.[0]
                    ?.textContent
                || xml.getElementsByTagName('name')?.[0]?.textContent
                || ''
            ).trim();
        }

        function extractProjectNameFromDocument(documentName) {
            return String(documentName ?? '')
                .trim()
                .replace(/\.(kml|kmz)$/i, '');
        }

        function stripCircuitSuffix(rawName) {
            return String(rawName ?? '')
                .trim()
                .replace(/\s*[-_/]?\s*C\d+[A-Z]?$/i, '')
                .trim();
        }

        function extractSiglaFromDescription(descriptionRaw) {
            const description = String(descriptionRaw ?? '').replace(/<[^>]*>/g, ' ');
            const token = description.match(/[A-Za-z][A-Za-z0-9]*/)?.[0] || '';
            if (!token) return '';
            let sigla = sanitizeProjectId(token);
            if (/^[A-Z]+\d+$/.test(sigla)) sigla = sigla.replace(/\d+$/, '');
            return sigla || '';
        }

        function inferSiglaFromRows(rows = []) {
            const prefixCount = new Map();
            const increment = (value) => {
                if (!value) return;
                prefixCount.set(value, (prefixCount.get(value) || 0) + 1);
            };

            rows.forEach((row) => {
                const name = String(row?.sourceName ?? '').trim();
                if (!name) return;
                const tokens = name.split(/\s+/).map((token) => token.trim()).filter(Boolean);
                if (tokens.length === 0) return;

                let prefix = sanitizeProjectId(tokens[0]);
                const second = String(tokens[1] || '');
                const secondLooksLikeTower = !!(normalizeTowerToken(second) || hasPorticoMarker(second));
                if (/\d+$/.test(prefix) && secondLooksLikeTower) {
                    prefix = prefix.replace(/\d+$/, '');
                }

                increment(sanitizeProjectId(prefix));
            });

            let best = '';
            let bestCount = -1;
            prefixCount.forEach((count, value) => {
                if (count > bestCount) {
                    best = value;
                    bestCount = count;
                }
            });
            return best;
        }

        function normalizeLineCoordinates(path = []) {
            return path
                .map((point) => ({
                    latitude: normalizeCoordinateString(point?.lat),
                    longitude: normalizeCoordinateString(point?.lon),
                    altitude: normalizeCoordinateString(point?.alt)
                }))
                .filter((point) => point.latitude && point.longitude);
        }

        function extractLongestLineStringMeta(placemarks = []) {
            let lineStringFound = false;
            let bestLengthKm = -1;
            let bestMeta = null;

            for (const placemark of placemarks) {
                const lineNode = placemark.getElementsByTagName('LineString')?.[0];
                if (!lineNode) continue;
                lineStringFound = true;

                const coordinatesText = lineNode.getElementsByTagName('coordinates')?.[0]?.textContent || '';
                const path = parseCoordinatePath(coordinatesText);
                const lengthKm = getPathLengthKm(path);
                if (lengthKm <= bestLengthKm) continue;

                const placemarkName = placemark.getElementsByTagName('name')?.[0]?.textContent || '';
                const lineName = stripCircuitSuffix(placemarkName);
                const descriptionRaw = placemark.getElementsByTagName('description')?.[0]?.textContent || '';
                bestLengthKm = lengthKm;
                bestMeta = {
                    extensao: path.length >= 2 ? lengthKm.toFixed(2) : '',
                    linhaCoordenadas: normalizeLineCoordinates(path),
                    linhaNome: lineName,
                    linhaFonteKml: String(placemarkName || '').trim(),
                    siglaFromLine: extractSiglaFromDescription(descriptionRaw)
                };
            }

            if (!lineStringFound) {
                return {
                    lineStringFound: false,
                    extensao: '',
                    linhaCoordenadas: [],
                    linhaNome: '',
                    linhaFonteKml: '',
                    siglaFromLine: ''
                };
            }

            return {
                lineStringFound: true,
                extensao: bestMeta?.extensao || '',
                linhaCoordenadas: bestMeta?.linhaCoordenadas || [],
                linhaNome: bestMeta?.linhaNome || '',
                linhaFonteKml: bestMeta?.linhaFonteKml || '',
                siglaFromLine: bestMeta?.siglaFromLine || ''
            };
        }

        function compareTowerNumbers(a, b) {
            const aParts = parseTowerSortParts(a);
            const bParts = parseTowerSortParts(b);

            if (aParts && bParts) {
                if (aParts.base !== bParts.base) return aParts.base - bParts.base;
                if (aParts.suffix === bParts.suffix) return 0;
                if (!aParts.suffix) return -1;
                if (!bParts.suffix) return 1;
                return aParts.suffix.localeCompare(bParts.suffix);
            }

            if (aParts) return -1;
            if (bParts) return 1;
            return String(a ?? '').localeCompare(String(b ?? ''));
        }

        function parseKmlTowers(kmlText) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(String(kmlText || ''), 'application/xml');
            const baseMeta = {
                sigla: '',
                nome: '',
                torres: 0,
                extensao: '',
                lineStringFound: false,
                sourceLabel: '',
                linhaCoordenadas: [],
                linhaNome: '',
                linhaFonteKml: ''
            };
            if (xml.querySelector('parsererror')) {
                return { rows: [], errors: ['Arquivo KML invalido ou corrompido.'], meta: baseMeta };
            }

            const documentName = extractDocumentName(xml);
            baseMeta.sourceLabel = documentName;
            const placemarks = Array.from(xml.getElementsByTagName('Placemark'));
            if (placemarks.length === 0) {
                return { rows: [], errors: ['Nenhum Placemark encontrado no KML.'], meta: baseMeta };
            }
            const lineMeta = extractLongestLineStringMeta(placemarks);
            const projectName = lineMeta.linhaNome || extractProjectNameFromDocument(documentName);
            baseMeta.nome = projectName;

            const rows = [];
            let ignoredPlacemarks = 0;

            placemarks.forEach((placemark) => {
                const pointNode = placemark.getElementsByTagName('Point')?.[0];
                if (!pointNode) {
                    ignoredPlacemarks += 1;
                    return;
                }

                const name = placemark.getElementsByTagName('name')?.[0]?.textContent || '';
                const description = placemark.getElementsByTagName('description')?.[0]?.textContent || '';
                const coordinatesText = pointNode.getElementsByTagName('coordinates')?.[0]?.textContent || '';
                const firstPoint = coordinatesText.trim().split(/\s+/)[0] || '';
                if (!firstPoint) {
                    ignoredPlacemarks += 1;
                    return;
                }

                const tuple = parseCoordinateTuple(firstPoint);
                if (!tuple) {
                    ignoredPlacemarks += 1;
                    return;
                }

                const numero = extractTowerNumberFromText(name, description);
                const latitude = normalizeCoordinateString(tuple.lat);
                const longitude = normalizeCoordinateString(tuple.lon);
                if (!numero || !latitude || !longitude) {
                    ignoredPlacemarks += 1;
                    return;
                }

                rows.push({
                    key: `kml-${rows.length + 1}`,
                    numero,
                    latitude,
                    longitude,
                    origem: 'kml',
                    sourceName: name || `Placemark ${rows.length + 1}`,
                    error: ''
                });
            });

            const errors = [];
            if (ignoredPlacemarks > 0) {
                errors.push(`${ignoredPlacemarks} Placemark(s) ignorado(s) por tipo de geometria, identificacao ou coordenadas invalidas.`);
            }

            const inferredSigla = inferSiglaFromRows(rows) || lineMeta.siglaFromLine || sanitizeProjectId(documentName);
            const meta = {
                sigla: inferredSigla,
                nome: projectName,
                torres: rows.length,
                extensao: lineMeta.extensao,
                lineStringFound: lineMeta.lineStringFound,
                sourceLabel: documentName,
                linhaCoordenadas: lineMeta.linhaCoordenadas,
                linhaNome: lineMeta.linhaNome,
                linhaFonteKml: lineMeta.linhaFonteKml
            };

            return { rows, errors, meta };
        }

        function validateTowerCoordinatesAsString(list) {
            const rows = (Array.isArray(list) ? list : []).map((row, idx) => {
                const numero = normalizeTowerNumber(row?.numero ?? '');
                const latitude = normalizeCoordinateString(row?.latitude ?? '');
                const longitude = normalizeCoordinateString(row?.longitude ?? '');
                const lat = Number(latitude);
                const lng = Number(longitude);
                const issues = [];

                if (!numero && numero !== '0') issues.push('Torre invalida');
                if (!latitude || Number.isNaN(lat) || lat < -90 || lat > 90) issues.push('Latitude invalida');
                if (!longitude || Number.isNaN(lng) || lng < -180 || lng > 180) issues.push('Longitude invalida');

                return {
                    key: row?.key || `manual-${idx + 1}`,
                    numero,
                    latitude,
                    longitude,
                    origem: row?.origem || 'manual',
                    sourceName: row?.sourceName || '',
                    error: issues.join(' | ')
                };
            });

            const dupCount = {};
            rows.forEach((r) => {
                if (!r.numero && r.numero !== '0') return;
                dupCount[r.numero] = (dupCount[r.numero] || 0) + 1;
            });

            rows.forEach((r) => {
                if (!r.numero && r.numero !== '0') return;
                if (dupCount[r.numero] > 1) {
                    r.error = r.error ? `${r.error} | Torre duplicada` : 'Torre duplicada';
                }
            });

            return {
                rows,
                hasErrors: rows.some((r) => !!r.error)
            };
        }

        function mergeTowerCoordinates(existing, imported) {
            const normalizedExisting = validateTowerCoordinatesAsString(existing || []).rows
                .filter((r) => !r.error)
                .map((r) => ({ numero: r.numero, latitude: r.latitude, longitude: r.longitude, origem: r.origem || 'manual' }));

            const normalizedImported = validateTowerCoordinatesAsString(imported || []).rows
                .filter((r) => !r.error)
                .map((r) => ({ numero: r.numero, latitude: r.latitude, longitude: r.longitude, origem: 'kml' }));

            const mergedMap = new Map();
            normalizedExisting.forEach((row) => mergedMap.set(String(row.numero), row));
            normalizedImported.forEach((row) => mergedMap.set(String(row.numero), row));

            return [...mergedMap.values()].sort((a, b) => compareTowerNumbers(a.numero, b.numero));
        }

        function buildGoogleMapsMultiStopUrl(points, opts = {}) {
            const list = Array.isArray(points) ? points : [];
            if (list.length < 2) return '';
            const origin = opts.origin || '';
            const destination = list[list.length - 1];
            const waypoints = list.slice(0, -1).map((p) => `${p.latitude},${p.longitude}`).join('|');
            const params = new URLSearchParams();
            params.set('api', '1');
            params.set('travelmode', 'driving');
            if (origin) params.set('origin', origin);
            params.set('destination', `${destination.latitude},${destination.longitude}`);
            if (waypoints) params.set('waypoints', waypoints);
            return `https://www.google.com/maps/dir/?${params.toString()}`;
        }

        function chunkRoutePoints(points, maxWaypointsPerUrl = 8) {
            const list = Array.isArray(points) ? points : [];
            if (list.length <= maxWaypointsPerUrl + 1) return [list];
            const maxStopsPerChunk = maxWaypointsPerUrl + 1;
            const chunks = [];
            for (let i = 0; i < list.length; i += maxStopsPerChunk) {
                chunks.push(list.slice(i, i + maxStopsPerChunk));
            }
            return chunks;
        }

        function buildInspectionId(projetoId, dataInicio, inspections = []) {
            if (!projetoId || !dataInicio) return '';

            const [yyyy, mm, dd] = String(dataInicio).split('-');
            if (!yyyy || !mm || !dd) return '';
            const dateTag = `${dd}${mm}${yyyy}`;
            const projectTag = String(projetoId).trim().toUpperCase();
            const prefix = `VS-${projectTag}-${dateTag}-`;
            const pattern = new RegExp(`^${prefix}(\\d{4})$`);

            let maxSeq = 0;
            (inspections || []).forEach((ins) => {
                const match = String(ins.id || '').match(pattern);
                if (match) {
                    const seq = Number(match[1]);
                    if (Number.isFinite(seq) && seq > maxSeq) maxSeq = seq;
                }
            });

            const nextSeq = String(maxSeq + 1).padStart(4, '0');
            return `${prefix}${nextSeq}`;
        }

        function getProjectInspectionStats(projectId, inspections = []) {
            const related = (inspections || []).filter(i => i.projetoId === projectId);
            if (related.length === 0) {
                return { count: 0, start: null, end: null, spanDays: 0, visitedDays: 0, list: [] };
            }

            const toDate = (v) => v ? new Date(`${v}T00:00:00`) : null;
            const starts = related.map(i => toDate(i.dataInicio)).filter(Boolean);
            const ends = related.map(i => toDate(i.dataFim || i.dataInicio)).filter(Boolean);
            const minStart = starts.sort((a, b) => a - b)[0];
            const maxEnd = ends.sort((a, b) => b - a)[0];
            const spanDays = minStart && maxEnd ? Math.floor((maxEnd - minStart) / (24 * 60 * 60 * 1000)) + 1 : 0;
            const visitedDays = related.reduce((acc, i) => {
                if (Array.isArray(i.detalhesDias) && i.detalhesDias.length > 0) return acc + i.detalhesDias.length;
                return acc + 1;
            }, 0);

            return {
                count: related.length,
                start: minStart,
                end: maxEnd,
                spanDays,
                visitedDays,
                list: related.sort((a, b) => new Date(b.dataInicio || '1900-01-01') - new Date(a.dataInicio || '1900-01-01'))
            };
        }

        function isFirstLoginProfileComplete(profile) {
            if (!profile) return false;
            return [
                profile.nome,
                profile.cargo,
                profile.departamento,
                profile.telefone
            ].every(v => String(v || '').trim().length > 0);
        }
