app = 'geomonitor-api'
primary_region = 'gru'

[build]

[env]
  PORT = '8080'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  timeout = '5s'
  path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
