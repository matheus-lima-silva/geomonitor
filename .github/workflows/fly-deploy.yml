name: fly-deploy

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy-main
  cancel-in-progress: true

jobs:
  web-strict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run strict web tests
        run: npm run test:ci:strict

      - name: Build web app
        run: npm run build

  api-strict:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run strict backend tests
        run: npm test

  deploy-api:
    runs-on: ubuntu-latest
    needs: [web-strict, api-strict]
    if: ${{ vars.ENABLE_FLY_DEPLOY == 'true' }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        run: >
          flyctl deploy
          --config deploy/fly/producao/api.toml
          --dockerfile backend/Dockerfile
          --remote-only
          --ha=false
          --strategy rolling

      - name: Enforce single API machine in GRU
        run: flyctl scale count 1 --app geomonitor-api --region gru --yes

      - name: Verify API single-machine policy
        run: |
          flyctl scale show -a geomonitor-api | tee api-scale.txt
          grep -P 'app\s+.?\s*1\s' api-scale.txt || grep 'app' api-scale.txt

      - name: API health check
        run: curl -fsS https://geomonitor-api.fly.dev/health

  deploy-web:
    runs-on: ubuntu-latest
    needs: [web-strict, api-strict, deploy-api]
    if: ${{ vars.ENABLE_FLY_DEPLOY == 'true' }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web to Fly.io
        run: >
          flyctl deploy
          --config deploy/fly/producao/web.toml
          --dockerfile Dockerfile
          --remote-only
          --ha=false
          --strategy rolling

      - name: Enforce single Web machine in GRU
        run: flyctl scale count 1 --app geomonitor-web --region gru --yes

      - name: Verify Web single-machine policy
        run: |
          flyctl scale show -a geomonitor-web | tee web-scale.txt
          grep -P 'app\s+.?\s*1\s' web-scale.txt || grep 'app' web-scale.txt

      - name: Web smoke check
        run: curl -fsS https://geomonitor-web.fly.dev/
