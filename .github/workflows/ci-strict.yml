name: ci-strict

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web-strict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run strict web tests
        run: npm run test:ci:strict

      - name: Build web app
        run: npm run build

  api-strict:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run strict backend tests
        run: npm test

  worker-strict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt

      - name: Run worker tests
        run: python -m pytest worker/tests/ -v
